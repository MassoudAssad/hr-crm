async function saveToSupabase(data) {
  try {
    const { error } = await sb.from('crm_state').upsert({ id: 'main', data, updated_at: new Date().toISOString() });
    if (error) { console.warn('SB save error:', error); return false; }
    return true;
  } catch(e) { console.warn('SB save:', e); return false; }
}

async function loadFromSupabase() {
  try {
    const { data, error } = await sb.from('crm_state').select('data').eq('id','main').single();
    if (error || !data) return null;
    return data.data;
  } catch(e) { console.warn('SB load:', e); return null; }
}

async function uploadImageToStorage(base64, jobId) {
  try {
    const res = await fetch(base64);
    const blob = await res.blob();
    const ext = blob.type.includes('png') ? 'png' : 'jpg';
    const filename = `job-${jobId}.${ext}`;
    const { error } = await sb.storage.from('job-images').upload(filename, blob, { upsert: true, contentType: blob.type });
    if (error) { console.warn('Storage upload error:', error); return null; }
    const { data: urlData } = sb.storage.from('job-images').getPublicUrl(filename);
    return urlData.publicUrl;
  } catch(e) { console.warn('Upload exception:', e); return null; }
}

function FF({label,type='text',value,onChange,options,hint,full=false}){
  const s={width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:9,fontFamily:'Heebo',fontSize:14,color:'#1a1a2e',background:'#fafafa',outline:'none',transition:'border .15s'};

    {label&&<label style={{display:'block',fontSize:12,marginBottom:4,fontWeight:700,color:'#6b7280'}}>{label}</label>}
    {type==='select'
      ?<select value={value} onChange={e=>onChange(e.target.value)} style={s}>{options.map(o=><option key={o}>{o}</option>)}</select>
      :type==='textarea'
      ?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={3} style={{...s,resize:'vertical'}}/>

    {hint&&<div style={{fontSize:11,color:'#9ca3af',marginTop:3}}>{hint}</div>}
  </div>;
}

function MessageModal({ type, person, job, employer, candidate, onClose, initialContactId }) {
  // type: 'candidate' | 'employer'
  // Build contacts list: if employer has contacts array use it, else build from legacy fields
  const contacts = React.useMemo(() => {
    if (type === 'employer') {
      if (person.contacts && person.contacts.length > 0) return person.contacts;
      // fallback: build single contact from legacy fields
      return [{
        id: 'legacy',
        name: person.contact || person.name || '',
        role: '',
        phone: person.phone || '',
        mobile: person.phone || '',
        email: person.email || '',
        isPrimary: true
      }];
    }
    return [];
  }, [person, type]);

  const defaultContactId = initialContactId || contacts.find(c=>c.isPrimary)?.id || contacts[0]?.id || '';
  const [selContactId, setSelContactId] = React.useState(defaultContactId);
  const selContact = type === 'employer' ? (contacts.find(c=>c.id===selContactId) || contacts[0]) : null;

  const templates = MSG_TEMPLATES[type] || [];
  const [selTpl, setSelTpl] = React.useState(templates[0]?.id || '');
  const [channel, setChannel] = React.useState('email'); // 'email' | 'whatsapp'
  const [fromEmail, setFromEmail] = React.useState(FROM_EMAILS[0].email);
  const [subject, setSubject] = React.useState('');
  const [body, setBody] = React.useState('');
  const [sent, setSent] = React.useState(false);

  const tpl = templates.find(t => t.id === selTpl);

  // Effective person for templates (merge contact fields for employer)
  const effectivePerson = React.useMemo(() => {
    if (type === 'employer' && selContact) {
      return { ...person, contact: selContact.name, email: selContact.email, phone: selContact.mobile || selContact.phone };
    }
    return person;
  }, [person, selContact, type]);

  const refreshTemplate = (tplObj, ep) => {
    if (!tplObj) return;
    if (type === 'candidate') {
      setSubject(tplObj.subject(ep, job));
      setBody(tplObj.body(ep, job, employer));
    } else {
      setSubject(tplObj.subject(ep, candidate));
      setBody(tplObj.body(ep, candidate));
    }
  };

  React.useEffect(() => { if (tpl) refreshTemplate(tpl, effectivePerson); }, [selTpl]);
  React.useEffect(() => { if (tpl) refreshTemplate(tpl, effectivePerson); }, [selContactId]);
  React.useEffect(() => { if (tpl) refreshTemplate(tpl, effectivePerson); }, []);

  const phone = ((selContact ? (selContact.mobile||selContact.phone) : person.phone)||'').replace(/[-\s]/g,'').replace(/^0/,'972');
  const email = (selContact ? selContact.email : person.email) || '';

  const handleSend = () => {
    if (channel === 'email') {
      const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}&from=${encodeURIComponent(fromEmail)}`;
      window.open(gmailUrl, '_blank');
    } else {
      const wa = `https://wa.me/${phone}?text=${encodeURIComponent(body)}`;
      window.open(wa, '_blank');
    }
    setSent(true);
    setTimeout(() => { setSent(false); onClose(); }, 1200);
  };

  const hasContact = channel === 'email' ? !!email : !!phone;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:18,width:'100%',maxWidth:780,maxHeight:'96vh',overflow:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.3)'}}>
        {/* Header */}
        <div style={{background:'#1a1a2e',borderRadius:'18px 18px 0 0',padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#e85d26',fontSize:13,fontWeight:700,marginBottom:2}}>
              {type==='candidate'?'📧 שליחת הודעה למועמד':'📧 שליחת הודעה למעסיק'}
            </div>
            <div style={{color:'white',fontWeight:800,fontSize:18}}>{person.name}</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',width:34,height:34,borderRadius:17,cursor:'pointer',fontSize:18}}>✕</button>
        </div>

        <div style={{padding:'20px 24px'}}>
          {/* Contact selector — employer only, more than one contact */}
          {type==='employer' && contacts.length > 1 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:8}}>👤 בחר איש קשר</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {contacts.map(c=>{
                  const hasEmail=!!c.email;
                  const hasMobile=!!(c.mobile||c.phone);
                  const isSelected=selContactId===c.id;
                  return <button key={c.id} onClick={()=>setSelContactId(c.id)}
                    style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                      border:`2px solid ${isSelected?'#e85d26':'#e5e7eb'}`,borderRadius:10,
                      background:isSelected?'#fff5f0':'white',cursor:'pointer',textAlign:'right',
                      fontFamily:'Heebo',transition:'all .15s'}}>
                    <div style={{width:36,height:36,borderRadius:18,background:isSelected?'#e85d26':'#e5e7eb',
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                      color:isSelected?'white':'#6b7280',fontWeight:800,fontSize:14}}>
                      {c.name?c.name[0]:'?'}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontWeight:700,fontSize:14,color:isSelected?'#e85d26':'#1a1a2e'}}>{c.name}</span>
                        {c.isPrimary&&<span style={{fontSize:10,background:'#fef3c7',color:'#92400e',border:'1px solid #fcd34d',borderRadius:4,padding:'1px 6px',fontWeight:700}}>ראשי</span>}
                      </div>
                      {c.role&&<div style={{fontSize:12,color:'#6b7280',marginTop:1}}>{c.role}</div>}
                    </div>
                    <div style={{display:'flex',gap:6,flexShrink:0}}>
                      <span style={{fontSize:12,padding:'3px 7px',borderRadius:6,
                        background:hasEmail?'#eff6ff':'#f3f4f6',
                        color:hasEmail?'#1d4ed8':'#9ca3af',
                        border:`1px solid ${hasEmail?'#bfdbfe':'#e5e7eb'}`}}>
                        📧 {hasEmail?c.email:'אין מייל'}
                      </span>
                      <span style={{fontSize:12,padding:'3px 7px',borderRadius:6,
                        background:hasMobile?'#f0fdf4':'#f3f4f6',
                        color:hasMobile?'#15803d':'#9ca3af',
                        border:`1px solid ${hasMobile?'#86efac':'#e5e7eb'}`}}>
                        📱 {hasMobile?(c.mobile||c.phone):'אין נייד'}
                      </span>
                    </div>
                  </button>;
                })}
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:8,marginBottom:channel==='email'?8:18}}>
            {[{id:'email',icon:'📧',label:'מייל'},{id:'whatsapp',icon:'💬',label:'WhatsApp'}].map(ch=>(
              <button key={ch.id} onClick={()=>setChannel(ch.id)}
                style={{flex:1,padding:'10px 0',border:`2px solid ${channel===ch.id?'#e85d26':'#e5e7eb'}`,borderRadius:10,background:channel===ch.id?'#fff5f0':'white',
                  fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer',color:channel===ch.id?'#e85d26':'#374151',
                  transition:'all .15s'}}>
                {ch.icon} {ch.label}
                {ch.id==='email'&&email&&<span style={{display:'block',fontSize:11,color:'#9ca3af',fontWeight:400,marginTop:2}}>{email}</span>}
                {ch.id==='email'&&!email&&<span style={{display:'block',fontSize:11,color:'#fca5a5',fontWeight:400,marginTop:2}}>אין מייל</span>}
                {ch.id==='whatsapp'&&(selContact?selContact.mobile||selContact.phone:person.phone)&&<span style={{display:'block',fontSize:11,color:'#9ca3af',fontWeight:400,marginTop:2}}>{selContact?selContact.mobile||selContact.phone:person.phone}</span>}
                {ch.id==='whatsapp'&&!(selContact?selContact.mobile||selContact.phone:person.phone)&&<span style={{display:'block',fontSize:11,color:'#fca5a5',fontWeight:400,marginTop:2}}>אין טלפון</span>}
              </button>
            ))}
          </div>

          {channel==='email'&&<div style={{background:'#f8f9fa',border:'1.5px solid #e5e7eb',borderRadius:10,padding:'10px 14px',marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:8}}>📤 שלח מ:</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {FROM_EMAILS.map(f=>(
                <button key={f.email} onClick={()=>setFromEmail(f.email)}
                  style={{padding:'7px 14px',border:`2px solid ${fromEmail===f.email?'#e85d26':'#e5e7eb'}`,borderRadius:8,
                    background:fromEmail===f.email?'#fff5f0':'white',fontFamily:'Heebo',fontSize:13,
                    fontWeight:fromEmail===f.email?700:500,cursor:'pointer',
                    color:fromEmail===f.email?'#e85d26':'#374151',transition:'all .15s'}}>
                  {fromEmail===f.email&&'✓ '}{f.label}
                  <span style={{display:'block',fontSize:11,color:fromEmail===f.email?'#c94d1a':'#9ca3af',fontWeight:400,direction:'ltr'}}>{f.email}</span>
                </button>
              ))}
            </div>
          </div>}

          {/* Template picker */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:8}}>תבנית הודעה</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {templates.map(t=>(
                <button key={t.id} onClick={()=>setSelTpl(t.id)}
                  style={{padding:'6px 12px',border:`1.5px solid ${selTpl===t.id?'#e85d26':'#e5e7eb'}`,borderRadius:20,
                    background:selTpl===t.id?'#fff5f0':'white',fontFamily:'Heebo',fontSize:12,fontWeight:selTpl===t.id?700:500,
                    cursor:'pointer',color:selTpl===t.id?'#e85d26':'#374151'}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Subject (email only) */}
          {channel==='email'&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>נושא</div>
              <input value={subject} onChange={e=>setSubject(e.target.value)}
                style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:14,outline:'none'}}/>
            </div>
          )}

          {/* Body */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>תוכן ההודעה</div>
            <textarea value={body} onChange={e=>setBody(e.target.value)} rows={14}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,lineHeight:1.7,outline:'none',resize:'vertical'}}/>
          </div>

          {!hasContact&&(
            <div style={{background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#c94d1a',marginBottom:14}}>
              ⚠️ {channel==='email'?'לא קיימת כתובת מייל עבור איש קשר זה':'לא קיים מספר טלפון עבור איש קשר זה'}
            </div>
          )}

          {sent&&(
            <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px',fontSize:14,color:'#15803d',fontWeight:700,marginBottom:14,textAlign:'center'}}>
              ✅ ההודעה נפתחה לשליחה!
            </div>
          )}

          <div style={{display:'flex',gap:10}}>
            <button onClick={onClose} style={{flex:1,padding:'11px 0',background:'white',border:'2px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer',color:'#374151'}}>
              ביטול
            </button>
            <button onClick={handleSend} disabled={!hasContact}
              style={{flex:2,padding:'11px 0',background:hasContact?'#e85d26':'#d1d5db',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:800,fontSize:15,cursor:hasContact?'pointer':'not-allowed',
                boxShadow:hasContact?'0 4px 16px rgba(232,93,38,0.3)':'none'}}>
              {channel==='email'?'📧 פתח במייל →':'💬 פתח ב-WhatsApp →'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProgressRing({pct,size=110,stroke=10,color='#e85d26'}){
  const r=size/2-stroke;const circ=2*Math.PI*r;const offset=circ-(Math.min(pct,100)/100)*circ;
  return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:'stroke-dashoffset .8s ease'}}/>
  </svg>;
}
function Dashboard({data,onNav}){
  const now=new Date();const startOfYear=new Date(now.getFullYear(),0,1);
  const openJobs=data.jobs.filter(j=>j.status==='פתוח').length;
  const activeEmp=data.employers.filter(e=>e.status==='פעיל').length;
  const placed=data.candidates.filter(c=>c.status==='הוצב').length;
  const pendingCount=(data.pendingCandidates||[]).length;
  const expectedCommission=data.employers.reduce((sum,emp)=>sum+(emp.needs||[]).reduce((s,n)=>s+(parseFloat((n.fee||'0').replace(/,/g,''))||0)*(parseInt(n.count)||1),0),0);
  const earnedThisYear=data.candidates.filter(c=>c.status==='הוצב'&&c.appliedAt&&new Date(c.appliedAt)>=startOfYear).reduce((sum,c)=>{const job=data.jobs.find(j=>c.appliedJobs?.includes(j.id));const emp=job?data.employers.find(e=>e.id===job.employerId):null;const need=emp?.needs?.find(n=>n.role===c.role||n.role===job?.role);return sum+(parseFloat((need?.fee||'0').replace(/,/g,''))||0);},0);
  const commissionPct=expectedCommission>0?Math.round((earnedThisYear/expectedCommission)*100):0;
  const DOMAIN_COLORS=['#e85d26','#3b82f6','#16a34a','#f59e0b','#8b5cf6','#ec4899','#0891b2','#d97706'];
  const domainCommission=React.useMemo(()=>{
    const map={};
    data.employers.forEach(emp=>{(emp.needs||[]).forEach(n=>{const d=n.domain||'אחר';if(!map[d])map[d]={domain:d,expected:0,earned:0};map[d].expected+=(parseFloat((n.fee||'0').replace(/,/g,''))||0)*(parseInt(n.count)||1);});});
    data.candidates.filter(c=>c.status==='הוצב'&&c.appliedAt&&new Date(c.appliedAt)>=startOfYear).forEach(c=>{const job=data.jobs.find(j=>c.appliedJobs?.includes(j.id));const emp=job?data.employers.find(e=>e.id===job.employerId):null;const need=emp?.needs?.find(n=>n.role===c.role||n.role===job?.role);const fee=parseFloat((need?.fee||'0').replace(/,/g,''))||0;const d=job?.domain||c.domain||'אחר';if(!map[d])map[d]={domain:d,expected:0,earned:fee};else map[d].earned+=fee;});
    return Object.values(map).filter(x=>x.expected>0||x.earned>0).sort((a,b)=>b.expected-a.expected).slice(0,6);
  },[data]);
  const jobsByDomain=React.useMemo(()=>{const map={};data.jobs.filter(j=>j.status==='פתוח').forEach(j=>{const d=j.domain||'אחר';map[d]=(map[d]||0)+1;});return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([d,c],i)=>({domain:d,count:c,color:DOMAIN_COLORS[i%DOMAIN_COLORS.length]}));},[data]);
  const totalOpenDomain=jobsByDomain.reduce((s,x)=>s+x.count,0)||1;
  const topEmployers=React.useMemo(()=>data.employers.map(emp=>{const empJobs=data.jobs.filter(j=>j.employerId===emp.id&&j.status==='פתוח').length;const expFee=(emp.needs||[]).reduce((s,n)=>s+(parseFloat((n.fee||'0').replace(/,/g,''))||0)*(parseInt(n.count)||1),0);return{...emp,openJobs:empJobs,expFee};}).filter(e=>e.openJobs>0||e.expFee>0).sort((a,b)=>b.expFee-a.expFee).slice(0,5),[data]);
  const maxEmpFee=Math.max(...topEmployers.map(e=>e.expFee),1);
  const pipeline=[
    {label:'חדשים',count:data.candidates.filter(c=>c.status==='חדש'&&!(data.pendingCandidates||[]).includes(c.id)).length,accent:'#6b7280',grad:'linear-gradient(135deg,#f3f4f6,#e5e7eb)'},
    {label:'בתהליך',count:data.candidates.filter(c=>c.status==='בתהליך').length,accent:'#3b82f6',grad:'linear-gradient(135deg,#dbeafe,#bfdbfe)'},
    {label:'ראיון',count:data.candidates.filter(c=>c.status==='ראיון נקבע').length,accent:'#f59e0b',grad:'linear-gradient(135deg,#fef3c7,#fde68a)'},
    {label:'הוצבו',count:placed,accent:'#16a34a',grad:'linear-gradient(135deg,#dcfce7,#bbf7d0)'},
  ];
  const openJobsList=data.jobs.filter(j=>j.status==='פתוח').map(j=>{const emp=data.employers.find(e=>e.id===j.employerId);const cCount=data.candidates.filter(c=>(c.appliedJobs||[]).includes(j.id)).length;const maxC=Math.max(...data.jobs.filter(x=>x.status==='פתוח').map(x=>data.candidates.filter(c=>(c.appliedJobs||[]).includes(x.id)).length),1);return{...j,empName:emp?.name||'',cCount,barPct:Math.round((cCount/maxC)*100)};});
  const soon7=data.jobs.filter(j=>{if(j.status==='סגור'||!j.deadline)return false;const parts=j.deadline.split('/');if(parts.length!==3)return false;const d=new Date(parts[2],parts[1]-1,parts[0]);const diff=(d-now)/(1000*60*60*24);return diff>=0&&diff<=7;});
  const fmtMoney=n=>n>=1000000?`₪${(n/1000000).toFixed(1)}M`:n>=1000?`₪${Math.round(n/1000)}K`:`₪${Math.round(n)}`;
  const pctColor=p=>p>=80?'#16a34a':p>=40?'#f59e0b':'#e85d26';
  return <div style={{padding:28,maxWidth:1280}} className="mobile-pad">
    <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:8}}>
      <div><h1 style={{fontSize:32,fontWeight:900,color:'#1a1a2e',marginBottom:4}}>שלום 👋</h1><div style={{color:MUT,fontSize:14}}>{now.toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
      {pendingCount>0&&<div onClick={()=>onNav('candidates')} style={{cursor:'pointer',background:'#fff5f0',border:'2px solid #e85d26',borderRadius:12,padding:'10px 18px',display:'flex',alignItems:'center',gap:10,animation:'pendingPulse 1.8s ease-in-out infinite'}}><span style={{fontSize:20}}>🔔</span><div><div style={{fontWeight:800,fontSize:15,color:'#e85d26'}}>{pendingCount} מועמדים ממתינים</div><div style={{fontSize:12,color:MUT}}>לחץ לאישור</div></div></div>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}} className="mobile-grid-2">
      {[
        {label:'משרות פתוחות',value:openJobs,icon:'📋',bg:'#1a1a2e',fg:'white',sub:`מתוך ${data.jobs.length} סה"כ`,link:'jobs'},
        {label:'מעסיקים פעילים',value:activeEmp,icon:'🏢',bg:'linear-gradient(135deg,#3b82f6,#1d4ed8)',fg:'white',sub:`מתוך ${data.employers.length} סה"כ`,link:'employers'},

function AgreementUpload({form,setForm}){
  const [uploading,setUploading]=React.useState(false);
  const handleFile=async e=>{
    const file=e.target.files[0]; if(!file) return;
    setUploading(true);
    try{
      const ext=file.name.split('.').pop();
      const fname=`agreement-${form.id||('e'+Date.now())}-${Date.now()}.${ext}`;
      const uploadUrl=`${SB_URL}/storage/v1/object/job-images/${fname}`;
      const res=await fetch(uploadUrl,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},body:file});
      if(!res.ok){alert('שגיאה בהעלאת קובץ');return;}
      const publicUrl=`${SB_URL}/storage/v1/object/public/job-images/${fname}`;
      setForm(f=>({...f,agreementUrl:publicUrl,agreementName:file.name}));
    }catch(err){alert('שגיאה בהעלאת קובץ');console.warn(err);}
    finally{setUploading(false);}
  };
  return <label style={{display:'inline-flex',alignItems:'center',gap:8,cursor:uploading?'wait':'pointer',background:'white',border:'2px solid #333',borderRadius:4,padding:'8px 16px',fontSize:14,fontWeight:600,opacity:uploading?0.6:1}}>
    {uploading?'⏳ מעלה...':'📎 צרף הסכם השמה'}
    <input type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style={{display:'none'}} onChange={handleFile} disabled={uploading}/>
  </label>;
}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h1 style={{fontSize:28,fontWeight:800}}>🏢 מעסיקים</h1>
      <Btn variant="primary" onClick={openAdd}>+ מעסיק</Btn>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <SearchBar placeholder="חיפוש..." value={search} onChange={setSearch}/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {industries.map(ind=><Btn key={ind} onClick={()=>setIndFilter(ind)} style={{background:indFilter===ind?ACC:'white',color:indFilter===ind?'white':'#333',padding:'8px 14px',fontSize:13}}>{ind}</Btn>)}
      </div>
    </div>

    {/* Desktop table */}
    <div className="sbox desktop-only" style={{background:'#fff',overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:14,minWidth:700}}>
        <thead><tr style={{background:'#f0ede6',borderBottom:'2px solid #333'}}>
          {['שם חברה','ענף','איש קשר','טלפון','עיר','עובדים','ציפי הכנסה','סטטוס',''].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'right',fontSize:14,fontWeight:700,whiteSpace:'nowrap'}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {filtered.map(emp=>{
            const {tc,tf}=totals(emp);
            return <tr key={emp.id} style={{borderBottom:'1px dashed #ddd',background:'#fff',cursor:'pointer'}}
              onMouseEnter={e=>e.currentTarget.style.background='#fde8dc'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}
              onClick={()=>setDetail(emp)}>
              <td style={{padding:'10px 12px',fontWeight:600}}><div style={{display:'flex',alignItems:'center',gap:8}}><Avatar name={emp.name} size={28}/>{emp.name}</div></td>
              <td style={{padding:'10px 12px',color:MUT}}>{emp.industry}</td>
              <td style={{padding:'10px 12px'}}>{emp.contact}</td>
              <td style={{padding:'10px 12px',direction:'ltr'}}>{emp.phone}</td>
              <td style={{padding:'10px 12px'}}>{emp.city}</td>
              <td style={{padding:'10px 12px'}}><span style={{background:'#cce5ff',border:'1.5px solid #333',borderRadius:3,padding:'1px 8px',fontSize:13}}>{tc}</span></td>
              <td style={{padding:'10px 12px',color:ACC,fontWeight:600,fontSize:13}}>{emp.expectedIncome?`₪${emp.expectedIncome}`:tf?`₪${fmtNum(tf)}`:'—'}</td>
              <td style={{padding:'10px 12px'}}><Tag label={emp.status}/></td>
              <td style={{padding:'10px 12px'}} onClick={e=>e.stopPropagation()}>
                <div style={{display:'flex',gap:6}}>
                  <Btn onClick={()=>openEdit(emp)} style={{padding:'8px 14px',fontSize:13}}>עריכה</Btn>
                  <Btn onClick={()=>del(emp.id)} style={{padding:'3px 10px',fontSize:12,background:'#fde8dc'}}>🗑</Btn>
                </div>
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>

    {/* Mobile cards */}
    <div className="mobile-only">
      {filtered.map(emp=>{
        const {tc,tf}=totals(emp);
        return <div key={emp.id} className="sbox" style={{background:'#fff',padding:14,marginBottom:10}} onClick={()=>setDetail(emp)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <Avatar name={emp.name} size={40}/>
              <div><div style={{fontWeight:700,fontSize:16}}>{emp.name}</div><div style={{fontSize:12,color:MUT}}>{emp.industry} · {emp.city}</div></div>
            </div>
            <Tag label={emp.status}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'10px 0',borderTop:'1px dashed #eee',borderBottom:'1px dashed #eee',marginBottom:10}}>
            <div><div style={{fontSize:11,color:MUT}}>איש קשר</div><div style={{fontSize:13,fontWeight:600}}>{emp.contact}</div></div>
            <div><div style={{fontSize:11,color:MUT}}>טלפון</div><div style={{fontSize:13,fontWeight:600,direction:'ltr'}}>{emp.phone}</div></div>
            <div><div style={{fontSize:11,color:MUT}}>עובדים דרושים</div><div style={{fontSize:16,fontWeight:700,color:ACC}}>{tc}</div></div>
            <div><div style={{fontSize:11,color:MUT}}>ציפי הכנסה</div><div style={{fontSize:14,fontWeight:700,color:ACC}}>{tf?`₪${fmtNum(tf)}`:'—'}</div></div>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}} onClick={e=>e.stopPropagation()}>
            <Btn onClick={()=>openEdit(emp)} style={{padding:'8px 18px',fontSize:14}}>עריכה</Btn>
            <Btn onClick={()=>del(emp.id)} style={{padding:'8px 14px',fontSize:14,background:'#fde8dc'}}>🗑</Btn>
          </div>
        </div>;
      })}
    </div>

    {/* Detail modal */}
    {detail&&(()=>{
      const empJobs=data.jobs.filter(j=>j.employerId===detail.id);
      const {tc,tf}=totals(detail);
      return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setDetail(null)}>
        <div style={{background:'#f8f7f4',borderRadius:20,width:'96vw',maxWidth:1400,maxHeight:'96vh',overflow:'hidden',boxShadow:'0 32px 100px rgba(0,0,0,0.35)',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>

          {/* Header */}
          <div style={{background:'#1a1a2e',borderRadius:'20px 20px 0 0',padding:'14px 28px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:14,alignItems:'center'}}>
              <Avatar name={detail.name} size={52}/>
              <div>
                <div style={{color:'white',fontWeight:800,fontSize:22}}>{detail.name}</div>
                <div style={{color:'rgba(255,255,255,0.6)',fontSize:14,marginTop:2}}>{detail.industry} · {detail.city}</div>
              </div>
              <div style={{marginRight:8}}><Tag label={detail.status}/></div>
            </div>
            <button onClick={()=>setDetail(null)} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',width:36,height:36,borderRadius:18,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>

          {/* Body — 2 columns */}
          <div style={{overflow:'auto',flex:1,padding:'14px 22px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>

              {/* COL 1 */}
              <div style={{display:'flex',flexDirection:'column',gap:16}}>

                {/* פרטי מעסיק */}
                <div style={{background:'white',borderRadius:14,padding:'18px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'#fff5f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏢</div>
                    <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>פרטי המעסיק</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    {[['ענף',detail.industry],['איש קשר',detail.contact],['טלפון',detail.phone],['אימייל',detail.email],['עיר',detail.city]].map(([k,v])=>v?<div key={k} style={{background:'#f8f7f4',borderRadius:8,padding:'10px 12px'}}>
                      <div style={{fontSize:11,color:'#9ca3af',fontWeight:600,marginBottom:3}}>{k}</div>
                      <div style={{fontSize:13,fontWeight:600,color:'#1a1a2e'}}>{v}</div>
                    </div>:null)}
                  </div>
                </div>

                {/* צרכי כח אדם */}
                <div style={{background:'white',borderRadius:14,padding:'18px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'#eff6ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>👷</div>
                    <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>צרכי כח אדם</div>
                  </div>
                  {(detail.needs||[]).map((n,i)=><div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'8px 10px',background:'#f8f7f4',border:'1px dashed #ddd',borderRadius:8,marginBottom:6}}>
                    <div style={{flex:1}}><span style={{fontWeight:700,fontSize:13}}>{n.role||'—'}</span>{n.domain&&<span style={{fontSize:11,color:MUT,marginRight:6}}>({n.domain})</span>}</div>
                    <span style={{background:'#cce5ff',border:'1px solid #333',borderRadius:3,padding:'1px 8px',fontSize:12}}>{n.count} עובד/ת</span>
                    <span style={{background:'#d4edda',border:'1px solid #333',borderRadius:3,padding:'1px 8px',fontSize:12}}>₪{fmtNum(n.fee||'0')}</span>
                  </div>)}
                  {(!detail.needs||!detail.needs.length)&&<div style={{color:MUT,fontSize:13}}>לא הוגדרו צרכים</div>}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10,padding:10,background:'#fff5f0',borderRadius:8,border:'1px solid #fcd5c0'}}>
                    <div><div style={{fontSize:11,color:MUT}}>סה"כ עובדים</div><div style={{fontSize:20,fontWeight:700,color:ACC}}>{tc}</div></div>
                    <div><div style={{fontSize:11,color:MUT}}>ציפי הכנסה</div><div style={{fontSize:20,fontWeight:700,color:ACC}}>₪{fmtNum(tf)}</div></div>
                  </div>
                </div>

                {/* הערות */}
                {detail.notes&&<div style={{background:'white',borderRadius:14,padding:'18px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'#fffbeb',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📝</div>
                    <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>הערות</div>
                  </div>
                  <div style={{fontSize:14,color:'#374151',lineHeight:1.7,background:'#fffbeb',borderRadius:8,padding:'12px 14px',fontStyle:'italic'}}>"{detail.notes}"</div>
                </div>}

              </div>{/* end col1 */}

              {/* COL 2 */}
              <div style={{display:'flex',flexDirection:'column',gap:16}}>

                {/* משרות */}
                <div style={{background:'white',borderRadius:14,padding:'18px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'#faf5ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📋</div>
                    <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>משרות ({empJobs.length})</div>
                  </div>
                  {empJobs.map(j=><div key={j.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'#f8f7f4',borderRadius:8,marginBottom:6}}>
                    <div><div style={{fontWeight:600,fontSize:13}}>{j.title}</div><div style={{fontSize:11,color:MUT}}>{j.jobNumber} · {j.location}</div></div>
                    <Tag label={j.status}/>
                  </div>)}
                  {!empJobs.length&&<div style={{color:MUT,fontSize:13}}>אין משרות</div>}
                </div>

                {/* הסכם השמה */}
                <div style={{background:'white',borderRadius:14,padding:'18px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📄</div>
                    <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>הסכם השמה</div>
                  </div>
                  {detail.agreementUrl
                    ?<div style={{display:'flex',gap:10,alignItems:'center',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px'}}>
                        <span style={{fontSize:20}}>📋</span>
                        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:'#15803d'}}>הסכם מצורף</div><div style={{fontSize:12,color:'#6b7280'}}>{detail.agreementName||'קובץ הסכם'}</div></div>
                        <a href={detail.agreementUrl} target="_blank" rel="noreferrer" style={{padding:'7px 14px',background:'#16a34a',color:'white',borderRadius:8,textDecoration:'none',fontWeight:700,fontSize:13}}>פתח</a>
                        <a href={detail.agreementUrl} download style={{padding:'7px 10px',background:'#1a1a2e',color:'white',borderRadius:8,textDecoration:'none',fontWeight:700,fontSize:13}}>⬇️</a>
                      </div>
                    :<div style={{color:'#9ca3af',fontSize:13,background:'#f9fafb',borderRadius:8,padding:'10px 14px',border:'1px dashed #d1d5db'}}>לא צורף הסכם השמה עדיין</div>
                  }
                </div>

              </div>{/* end col2 */}

              {/* COL 3 */}
              <div style={{display:'flex',flexDirection:'column',gap:16}}>

                {/* יצירת קשר */}
                <div style={{background:'white',borderRadius:14,padding:'18px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'#f0f9ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>✉️</div>
                    <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>יצירת קשר</div>
                  </div>
                  {(()=>{
                    const contacts=(detail.contacts&&detail.contacts.length>0)?detail.contacts
                      :[{id:'legacy',name:detail.contact||'',role:'',phone:detail.phone||'',mobile:detail.phone||'',email:detail.email||'',isPrimary:true}];
                    return contacts.map(c=>(
                      <div key={c.id} style={{background:'#f8fafc',border:`1.5px solid ${c.isPrimary?'#fcd5c0':'#e5e7eb'}`,borderRadius:10,padding:'12px 14px',marginBottom:10}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                          <div style={{width:30,height:30,borderRadius:15,background:c.isPrimary?'#e85d26':'#6b7280',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:800,fontSize:13,flexShrink:0}}>
                            {c.name?c.name[0]:'?'}
                          </div>
                          <div>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <span style={{fontWeight:700,fontSize:13,color:'#1a1a2e'}}>{c.name||'—'}</span>
                              {c.isPrimary&&<span style={{fontSize:10,background:'#fff5f0',color:'#c94d1a',border:'1px solid #fcd5c0',borderRadius:4,padding:'1px 5px',fontWeight:700}}>ראשי</span>}
                            </div>
                            {c.role&&<div style={{fontSize:11,color:'#6b7280'}}>{c.role}</div>}
                          </div>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                          {c.email&&<button onClick={()=>setMsgTarget({emp:detail,contactId:c.id})}
                            style={{width:'100%',padding:'8px 0',background:'#eff6ff',border:'1.5px solid #bfdbfe',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:12,cursor:'pointer',color:'#1d4ed8'}}>
                            📧 {c.email}
                          </button>}
                          {(c.mobile||c.phone)&&<button onClick={()=>{const p=(c.mobile||c.phone||'').replace(/[-\s]/g,'').replace(/^0/,'972');window.open(`https://wa.me/${p}`,'_blank');}}
                            style={{width:'100%',padding:'8px 0',background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:12,cursor:'pointer',color:'#15803d'}}>
                            💬 {c.mobile||c.phone}
                          </button>}
                          <button onClick={()=>setMsgTarget({emp:detail,contactId:c.id})}
                            style={{width:'100%',padding:'8px 0',background:'#fff5f0',border:'1.5px solid #fcd5c0',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:12,cursor:'pointer',color:'#c94d1a'}}>
                            ✉️ הודעה עם תבנית
                          </button>
                        </div>
                      </div>
                    ));
                  })()}
                </div>

                {/* כפתורי פעולה */}
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>{
                    const title=prompt('כותרת המשימה:');
                    if(!title) return;
                    const t={id:'t'+Date.now(),title,description:'',dueDate:'',priority:'בינוני',status:'פתוח',candidateId:'',employerId:detail.id,createdAt:new Date().toISOString()};
                    setData(d=>({...d,tasks:[t,...(d.tasks||[])]}));
                    alert('✅ משימה נוספה!');
                  }} style={{flex:1,padding:'10px 0',background:'#eff6ff',border:'1.5px solid #bfdbfe',borderRadius:10,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer',color:'#1d4ed8'}}>
                    + הוסף משימה
                  </button>
                  <button onClick={()=>{setDetail(null);openEdit(detail);}} style={{flex:1,padding:'10px 0',background:'#1a1a2e',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>
                    ✏️ עריכה
                  </button>
                  <button onClick={()=>{if(confirm('למחוק מעסיק?')){del(detail.id);setDetail(null);}}} style={{padding:'10px 16px',background:'#fde8dc',color:'#c94d1a',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>
                    🗑
                  </button>
                </div>

              </div>{/* end col3 */}
            </div>{/* end grid */}
          </div>{/* end body */}
        </div>
      </div>;
    })()}

    {/* Add/Edit modal */}
    {(modal==='add'||modal==='edit')&&<Modal title={modal==='add'?'מעסיק חדש':'עריכת מעסיק'} onClose={()=>setModal(null)} wide={true}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

        {/* COL 1 */}
        <div>
          <FormCard title="פרטי המעסיק" icon="🏢" color="#fff5f0">
            <FormGrid>
              <FF label="שם חברה" value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))}/>
              <FF label="ענף" type="select" value={form.industry||'הייטק'} onChange={v=>setForm(f=>({...f,industry:v}))} options={['הייטק','תעשייה','פיננסים','קמעונאות','בריאות','חינוך','אחר']}/>
              <FF label="עיר" value={form.city||''} onChange={v=>setForm(f=>({...f,city:v}))}/>
              <FF label="סטטוס" type="select" value={form.status||'פעיל'} onChange={v=>setForm(f=>({...f,status:v}))} options={data.statuses?.employers?.length?data.statuses.employers:['פעיל','פסיבי']}/>
            </FormGrid>
          </FormCard>

          <FormCard title="אנשי קשר" icon="👤" color="#f0f9ff">
            {(form.contacts||[]).map((c,idx)=>(
              <div key={c.id||idx} style={{background:'#f8fafc',border:`2px solid ${c.isPrimary?'#e85d26':'#e5e7eb'}`,borderRadius:12,padding:'14px 16px',marginBottom:10,position:'relative'}}>
                {c.isPrimary&&<span style={{position:'absolute',top:10,left:14,fontSize:10,background:'#fff5f0',color:'#c94d1a',border:'1px solid #fcd5c0',borderRadius:4,padding:'2px 7px',fontWeight:700}}>ראשי ★</span>}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <FF label="שם מלא" value={c.name||''} onChange={v=>updContact(idx,{...c,name:v})}/>
                  <FF label="תפקיד / מחלקה" value={c.role||''} onChange={v=>updContact(idx,{...c,role:v})}/>
                  <FF label="טלפון קווי" value={c.phone||''} onChange={v=>updContact(idx,{...c,phone:v})}/>
                  <FF label="טלפון נייד" value={c.mobile||''} onChange={v=>updContact(idx,{...c,mobile:v})}/>
                  <FF label="דואל" type="email" value={c.email||''} onChange={v=>updContact(idx,{...c,email:v})}/>
                </div>
                <div style={{display:'flex',gap:8,marginTop:4}}>
                  {!c.isPrimary&&<button onClick={()=>setPrimaryContact(idx)}
                    style={{padding:'5px 12px',background:'#fff5f0',border:'1.5px solid #fcd5c0',borderRadius:7,fontFamily:'Heebo',fontSize:12,fontWeight:700,cursor:'pointer',color:'#c94d1a'}}>
                    ★ הגדר כראשי
                  </button>}
                  <button onClick={()=>delContact(idx)}
                    style={{padding:'5px 10px',background:'#fde8dc',border:'none',borderRadius:7,fontFamily:'Heebo',fontSize:12,fontWeight:700,cursor:'pointer',color:'#c94d1a',marginRight:'auto'}}>
                    🗑 הסר
                  </button>
                </div>
              </div>
            ))}
            {(!form.contacts||form.contacts.length===0)&&(
              <div style={{color:'#9ca3af',fontSize:13,padding:'10px 0',textAlign:'center'}}>טרם הוספו אנשי קשר</div>
            )}
            <Btn onClick={addContact} style={{fontSize:13,marginTop:4}}>+ הוסף איש קשר</Btn>
          </FormCard>

          <FormCard title="הערות" icon="📝" color="#fffbeb">
            <FF label="" type="textarea" value={form.notes||''} onChange={v=>setForm(f=>({...f,notes:v}))}/>
          </FormCard>
        </div>

        {/* COL 2 */}
        <div>
          <FormCard title="צרכי כח אדם" icon="👷" color="#eff6ff">
            {(form.needs||[]).map((n,idx)=><NeedRow key={n.id||idx} need={n} domains={data.jobDomains} onChange={val=>updNeed(idx,val)} onDel={()=>delNeed(idx)}/>)}

// ── IMAGE UPLOAD ──────────────────────────────────────────────────────────────
function ImgUpload({form,setForm}){
  const [uploading,setUploading]=React.useState(false);
  const compressImage=f=>new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(f);
    img.onload=()=>{
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob=>blob?res(blob):rej(new Error('compress failed')),'image/jpeg',0.82);
    };
    img.onerror=rej;
    img.src=url;
  });
  const handleImageChange=async e=>{
    const f=e.target.files[0];if(!f)return;
    setUploading(true);
    try{
      const jobId=form.id||('j'+Date.now());
      const filename=`job-${jobId}-${Date.now()}.jpg`;
      const compressed=await compressImage(f);
      const uploadUrl=`${SB_URL}/storage/v1/object/job-images/${filename}`;
      const res=await fetch(uploadUrl,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'image/jpeg','x-upsert':'true'},body:compressed});
      if(!res.ok){const e=await res.text();alert('שגיאה בהעלאת תמונה');console.warn(e);return;}
      const publicUrl=`${SB_URL}/storage/v1/object/public/job-images/${filename}`;
      setForm(fm=>({...fm,image:publicUrl,imageUrl:publicUrl}));
    }catch(err){alert('שגיאה בהעלאת תמונה');console.warn(err);}
    finally{setUploading(false);}
  };
  const previewUrl=form.imageUrl||form.image||'';
  return <div style={{marginBottom:16}}>
    <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>תמונה למשרה</div>
    <div style={{display:'flex',gap:12,alignItems:'center'}}>
      {previewUrl?<div style={{position:'relative'}}>
        <img src={previewUrl} alt="" style={{width:120,height:80,objectFit:'cover',border:'2px solid #333',borderRadius:3}}/>
        <button onClick={()=>setForm(f=>({...f,image:'',imageUrl:''}))} style={{position:'absolute',top:-8,left:-8,background:ACC,color:'white',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:12}}>✕</button>
      </div>:<div className="sbox" style={{width:120,height:80,background:'#f5f0e8',display:'flex',alignItems:'center',justifyContent:'center',color:MUT,fontSize:13}}>אין תמונה</div>}
      <label style={{cursor:uploading?'wait':'pointer',background:'white',border:'2px solid #333',borderRadius:3,padding:'7px 14px',fontSize:14,fontWeight:600,opacity:uploading?0.6:1}}>
        {uploading?'⏳ מעלה...':'📸 העלה תמונה'}
        <input type="file" accept="image/*" style={{display:'none'}} onChange={handleImageChange} disabled={uploading}/>
      </label>
    </div>
  </div>;
}

      </div>;
    })()}

    {(modal==='add'||modal==='edit')&&<Modal title={modal==='add'?`משרה חדשה – ${form.jobNumber}`:`עריכת משרה – ${form.jobNumber}`} onClose={()=>setModal(null)} wide={true}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

        {/* COL 1 */}
        <div>
          <FormCard title="תמונה ומיתוג" icon="🖼" color="#faf5ff">
            <ImgUpload form={form} setForm={setForm}/>
          </FormCard>

          <FormCard title="זיהוי משרה" icon="🔖" color="#fff5f0">
            <FormGrid>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>מספר משרה</label>
                <input value={form.jobNumber} readOnly style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:9,fontFamily:'Heebo',fontSize:14,background:'#f5f0e8',color:ACC,fontWeight:700}}/>
              </div>
              <FF label="שם המשרה" value={form.title||''} onChange={v=>setForm(f=>({...f,title:v}))}/>
              <FF label="כותרת פרסום" value={form.publishTitle||''} onChange={v=>setForm(f=>({...f,publishTitle:v}))} hint="הכותרת שתופיע בדף הנחיתה" full={true}/>
            </FormGrid>
          </FormCard>

          <FormCard title="פרטי המשרה" icon="📋" color="#eff6ff">
            <FormGrid>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>תחום</label>
                <select value={form.domain||''} onChange={e=>setForm(f=>({...f,domain:e.target.value,role:''}))} style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:9,fontFamily:'Heebo',fontSize:14}}>
                  <option value="">-- בחר תחום --</option>
                  {(data.jobDomains||[]).map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>תפקיד</label>
                <select value={form.role||''} onChange={e=>setForm(f=>({...f,role:e.target.value}))} disabled={!form.domain} style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:9,fontFamily:'Heebo',fontSize:14,background:!form.domain?'#f5f5f5':'white'}}>
                  <option value="">{form.domain?'-- בחר תפקיד --':'בחר תחום תחילה'}</option>
                  {(data.jobDomains||[]).find(d=>d.name===form.domain)?.roles.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <FF label="מעסיק" type="select" value={data.employers.find(e=>e.id===form.employerId)?.name||''} onChange={v=>setForm(f=>({...f,employerId:data.employers.find(e=>e.name===v)?.id||f.employerId}))} options={data.employers.map(e=>e.name)}/>
              <FF label="סוג משרה" type="select" value={form.type||'משרה מלאה'} onChange={v=>setForm(f=>({...f,type:v}))} options={['משרה מלאה','חצי משרה','משמרות','פרילנס','זמני']}/>
              <FF label="מיקום" value={form.location||''} onChange={v=>setForm(f=>({...f,location:v}))}/>
              <FF label="טווח שכר (₪)" value={form.salary||''} onChange={v=>setForm(f=>({...f,salary:v}))}/>
              <FF label="תאריך דדליין" type="date" value={form.deadline||''} onChange={v=>setForm(f=>({...f,deadline:v}))}/>
              <FF label="סטטוס" type="select" value={form.status||'פתוח'} onChange={v=>setForm(f=>({...f,status:v}))} options={data.statuses?.jobs?.length?data.statuses.jobs:['פתוח','ממתין','סגור']}/>
            </FormGrid>
          </FormCard>
        </div>

        {/* COL 2 */}
        <div>
          <FormCard title="תוכן המשרה" icon="📝" color="#fffbeb">
            <FF label="תיאור המשרה" type="textarea" value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))}/>
            <FF label="דרישות המשרה" type="textarea" value={form.requirements||''} onChange={v=>setForm(f=>({...f,requirements:v}))}/>
            <FF label="יתרונות" type="textarea" value={form.benefits||''} onChange={v=>setForm(f=>({...f,benefits:v}))}/>
          </FormCard>
        </div>
      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
        <Btn onClick={()=>setModal(null)}>ביטול</Btn>
        <Btn variant="primary" onClick={save}>שמירה</Btn>
      </div>
    </Modal>}
  </div>;
}

// ── CANDIDATES ───────────────────────────────────────────────────────────────
function Candidates({data,setData}){
  const [search,setSearch]=React.useState('');
  const [stFilter,setStFilter]=React.useState('הכל');
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({});
  const [detail,setDetail]=React.useState(null);
  const [msgTarget,setMsgTarget]=React.useState(null);
  const [jobSearch,setJobSearch]=React.useState('');
  const stages=['חדש','בתהליך','ראיון נקבע','הוצב'];
  const pendingIds=new Set(data.pendingCandidates||[]);
  const filtered=data.candidates.filter(c=>!pendingIds.has(c.id)&&(c.name.includes(search)||c.role.includes(search)||(c.city||'').includes(search))&&(stFilter==='הכל'||c.status===stFilter));
  const pendingList=(data.pendingCandidates||[]).map(id=>data.candidates.find(c=>c.id===id)).filter(Boolean);
  const openAdd=()=>{setForm({name:'',domain:'',role:'',phone:'',email:'',city:'',status:'חדש',experience:'',education:'',appliedJobs:[],cv:false,notes:''});setModal('add');};
  const openEdit=c=>{setForm({...c,appliedJobs:[...c.appliedJobs]});setModal('edit');};
  const save=()=>{
    const isAdd=modal==='add';
    const entry=mkLog('candidate',isAdd?'added':'updated',form.name);
    if(isAdd) setData(d=>({...d,candidates:[...d.candidates,{...form,id:'c'+Date.now()}],activityLog:[entry,...(d.activityLog||[])].slice(0,50)}));
    else setData(d=>({...d,candidates:d.candidates.map(c=>c.id===form.id?form:c),activityLog:[entry,...(d.activityLog||[])].slice(0,50)}));
    setModal(null);
  };
  const del=id=>{
    const cand=data.candidates.find(c=>c.id===id);
    if(confirm('למחוק מועמד?'))setData(d=>({...d,candidates:d.candidates.filter(c=>c.id!==id),activityLog:[mkLog('candidate','deleted',cand?.name||id),...(d.activityLog||[])].slice(0,50)}));
  };

  const approvePendingLocal=(cid)=>{
    const cand=data.candidates.find(c=>c.id===cid);
    setData(d=>({...d,
      pendingCandidates:(d.pendingCandidates||[]).filter(id=>id!==cid),
      candidates:d.candidates.map(c=>c.id===cid?{...c,pendingApproval:false}:c),
      activityLog:[mkLog('pending','approved',cand?.name||cid),...(d.activityLog||[])].slice(0,50)
    }));
  };
  const rejectPendingLocal=(cid)=>{
    const cand=data.candidates.find(c=>c.id===cid);
    setData(d=>({...d,
      pendingCandidates:(d.pendingCandidates||[]).filter(id=>id!==cid),
      candidates:d.candidates.filter(c=>c.id!==cid),
      activityLog:[mkLog('pending','rejected',cand?.name||cid),...(d.activityLog||[])].slice(0,50)
    }));
  };

  const [showAdvanced,setShowAdvanced]=React.useState(false);
  const [fDomain,setFDomain]=React.useState('');
  const [fCity,setFCity]=React.useState('');
  const [fCv,setFCv]=React.useState('הכל');
  const [fSource,setFSource]=React.useState('הכל');
  const [fDateFrom,setFDateFrom]=React.useState('');
  const [fDateTo,setFDateTo]=React.useState('');
  const [showExportMenu,setShowExportMenu]=React.useState(false);
  const allCities=[...new Set(data.candidates.map(c=>c.city).filter(Boolean))].sort();
  const allDomains=(data.jobDomains||[]).map(d=>d.name);
  const activeFilters=[fDomain,fCity,fCv!=='הכל'?fCv:'',fSource!=='הכל'?fSource:'',fDateFrom,fDateTo].filter(Boolean).length;
  const clearFilters=()=>{setFDomain('');setFCity('');setFCv('הכל');setFSource('הכל');setFDateFrom('');setFDateTo('');setStFilter('הכל');setSearch('');};
  const filteredAdv=filtered.filter(c=>{
    if(fDomain&&(c.domain||'')!==fDomain)return false;
    if(fCity&&(c.city||'')!==fCity)return false;
    if(fCv==='יש CV'&&!c.cv)return false;
    if(fCv==='אין CV'&&c.cv)return false;
    if(fSource==='דף נחיתה'&&c.source!=='landing_page')return false;
    if(fSource==='ידני'&&c.source==='landing_page')return false;
    if(fDateFrom&&c.appliedAt&&new Date(c.appliedAt)<new Date(fDateFrom))return false;
    if(fDateTo&&c.appliedAt&&new Date(c.appliedAt)>new Date(fDateTo+'T23:59:59'))return false;
    return true;
  });
  const exportCSV=()=>{
    const headers=['שם','טלפון','אימייל','עיר','תחום','תפקיד','ניסיון','השכלה','סטטוס','CV','מקור','תאריך הגשה','משרה'];
    const rows=filteredAdv.map(c=>{
      const job=data.jobs.find(j=>(c.appliedJobs||[]).includes(j.id));
      const vals=[c.name||'',c.phone||'',c.email||'',c.city||'',c.domain||'',c.role||'',c.experience||'',c.education||'',c.status||'',c.cv?'כן':'לא',c.source==='landing_page'?'נחיתה':'ידני',c.appliedAt?new Date(c.appliedAt).toLocaleDateString('he-IL'):'',job?job.publishTitle||job.title:''];
      return vals.map(v=>['"',String(v).split('"').join('""'),'"'].join('')).join(',');
    });
    const csvContent=[headers.join(','),...rows].join('\n');
    const blob=new Blob(['\uFEFF'+csvContent],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='candidates.csv';a.click();
    URL.revokeObjectURL(url);setShowExportMenu(false);
  };
    const exportExcel=()=>{
    const headers=['שם','טלפון','אימייל','עיר','תחום','תפקיד','ניסיון','השכלה','סטטוס','CV','מקור','תאריך הגשה','משרה'];
    const rows=filteredAdv.map(c=>{const job=data.jobs.find(j=>(c.appliedJobs||[]).includes(j.id));return [c.name||'',c.phone||'',c.email||'',c.city||'',c.domain||'',c.role||'',c.experience||'',c.education||'',c.status||'',c.cv?'כן':'לא',c.source==='landing_page'?'דף נחיתה':'ידני',c.appliedAt?new Date(c.appliedAt).toLocaleDateString('he-IL'):'',job?job.publishTitle||job.title:''];});
    const xmlRows=[headers,...rows].map(row=>'<Row>'+row.map(v=>'<Cell><Data ss:Type="String">'+String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</Data></Cell>').join('')+'</Row>').join('');
    const xml='<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="מועמדים"><Table>'+xmlRows+'</Table></Worksheet></Workbook>';
    const a=document.createElement('a');a.href='data:application/vnd.ms-excel;charset=utf-8,'+encodeURIComponent('﻿'+xml);a.download='candidates.xls';a.click();setShowExportMenu(false);
  };
  const selStyle={width:'100%',padding:'8px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,background:'white',outline:'none'};

  return <div style={{padding:28}} className="mobile-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h1 style={{fontSize:28,fontWeight:800}}>👥 מועמדים</h1>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <div style={{position:'relative'}}>
          <button onClick={()=>setShowExportMenu(v=>!v)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'white',color:'#1a1a2e',border:'2px solid #333',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>📥 ייצוא <span style={{fontSize:10}}>▼</span></button>
          {showExportMenu&&<div style={{position:'absolute',top:'calc(100% + 6px)',left:0,background:'white',border:'2px solid #333',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,0.15)',zIndex:200,minWidth:180,overflow:'hidden'}}>
            <div style={{padding:'8px 12px',fontSize:11,color:MUT,borderBottom:'1px solid #f0ede6',fontWeight:700}}>{filteredAdv.length} מועמדים לייצוא</div>
            <button onClick={exportCSV} style={{width:'100%',padding:'11px 16px',background:'none',border:'none',fontFamily:'Heebo',fontSize:14,fontWeight:600,cursor:'pointer',textAlign:'right',color:'#1a1a2e'}} onMouseEnter={e=>e.currentTarget.style.background='#f5f0e8'} onMouseLeave={e=>e.currentTarget.style.background='none'}>📄 ייצוא CSV</button>
            <button onClick={exportExcel} style={{width:'100%',padding:'11px 16px',background:'none',border:'none',fontFamily:'Heebo',fontSize:14,fontWeight:600,cursor:'pointer',textAlign:'right',color:'#1a1a2e'}} onMouseEnter={e=>e.currentTarget.style.background='#f5f0e8'} onMouseLeave={e=>e.currentTarget.style.background='none'}>📊 ייצוא Excel</button>
          </div>}
          {showExportMenu&&<div style={{position:'fixed',inset:0,zIndex:199}} onClick={()=>setShowExportMenu(false)}/>}
        </div>
        <Btn variant="primary" onClick={openAdd}>+ מועמד</Btn>
      </div>
    </div>

    {/* ── PENDING CANDIDATES SECTION ── */}
    {pendingList.length>0&&<div className="pending-blink" style={{border:'2px solid #e85d26',borderRadius:12,background:'#fff8f5',marginBottom:20,overflow:'hidden'}}>
      <div style={{background:'#e85d26',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:18}}>🔔</span>
          <span style={{color:'white',fontWeight:800,fontSize:15}}>מועמדים חדשים ממתינים לאישור</span>
          <span style={{background:'white',color:'#e85d26',borderRadius:20,padding:'1px 10px',fontWeight:900,fontSize:13}}>{pendingList.length}</span>
        </div>
      </div>
      <div style={{padding:12,display:'flex',flexDirection:'column',gap:10}}>
        {pendingList.map(c=>{
          const job=data.jobs.find(j=>c.appliedJobs?.includes(j.id));
          return <div key={c.id} style={{background:'white',borderRadius:10,padding:'12px 14px',border:'1px solid #fcd5c0',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div style={{width:42,height:42,borderRadius:21,background:'#e85d26',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:18,flexShrink:0}}>{c.name.charAt(0)}</div>
            <div style={{flex:1,minWidth:120}}>
              <div style={{fontWeight:800,fontSize:15,cursor:'pointer'}} onClick={()=>setDetail(c)}>{c.name}</div>
              <div style={{fontSize:12,color:'#888'}}>{c.role||c.domain}{job?` · ${job.publishTitle||job.title}`:''}</div>
              <div style={{fontSize:11,color:'#aaa',marginTop:2}}>{c.phone}{c.city?` · ${c.city}`:''}{c.cv?' · 📄 CV':''}</div>
            </div>
            <div style={{display:'flex',gap:8,flexShrink:0}}>
              <button onClick={()=>setDetail(c)} style={{padding:'7px 14px',background:'#1a1a2e',color:'white',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>👁 צפה</button>
              <button onClick={()=>rejectPendingLocal(c.id)} style={{padding:'7px 12px',background:'#fde8dc',color:'#c94d1a',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>✕</button>
            </div>
          </div>;
        })}
      </div>
    </div>}

    <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
      <SearchBar placeholder="חיפוש שם, תפקיד, עיר..." value={search} onChange={setSearch}/>
      <button onClick={()=>setShowAdvanced(v=>!v)} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',background:showAdvanced?'#1a1a2e':activeFilters>0?'#fff5f0':'white',color:showAdvanced?'white':activeFilters>0?ACC:'#333',border:'2px solid '+(showAdvanced?'#1a1a2e':activeFilters>0?ACC:'#333'),borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>🔍 סינון מתקדם{activeFilters>0&&<span style={{background:ACC,color:'white',borderRadius:20,padding:'0 6px',fontSize:11,fontWeight:800}}>{activeFilters}</span>}</button>
      {(activeFilters>0||stFilter!=='הכל'||search)&&<button onClick={clearFilters} style={{padding:'7px 12px',background:'#fde8dc',color:'#c94d1a',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>✕ נקה</button>}
      <span style={{marginRight:'auto',fontSize:13,color:MUT}}>מציג <strong style={{color:ACC}}>{filteredAdv.length}</strong> מתוך {data.candidates.filter(c=>!pendingIds.has(c.id)).length}</span>
    </div>
    {showAdvanced&&<div style={{background:'white',border:'1.5px solid #e5e7eb',borderRadius:12,padding:'16px 20px',marginBottom:14,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}} className="mobile-grid-1">
        <div><div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>תחום</div><select value={fDomain} onChange={e=>setFDomain(e.target.value)} style={selStyle}><option value="">כל התחומים</option>{allDomains.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
        <div><div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>עיר</div><select value={fCity} onChange={e=>setFCity(e.target.value)} style={selStyle}><option value="">כל הערים</option>{allCities.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        <div><div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>CV</div><select value={fCv} onChange={e=>setFCv(e.target.value)} style={selStyle}>{['הכל','יש CV','אין CV'].map(o=><option key={o}>{o}</option>)}</select></div>
        <div><div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>מקור</div><select value={fSource} onChange={e=>setFSource(e.target.value)} style={selStyle}>{['הכל','דף נחיתה','ידני'].map(o=><option key={o}>{o}</option>)}</select></div>
        <div><div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>מ-תאריך</div><input type="date" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)} style={selStyle}/></div>
        <div><div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:4}}>עד-תאריך</div><input type="date" value={fDateTo} onChange={e=>setFDateTo(e.target.value)} style={selStyle}/></div>
      </div>
    </div>}
    <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
      {['הכל','חדש','בתהליך','ראיון נקבע','הוצב'].map(s=><Btn key={s} onClick={()=>setStFilter(s)} style={{background:stFilter===s?ACC:'white',color:stFilter===s?'white':'#333',padding:'5px 8px',fontSize:11}}>{s}</Btn>)}
    </div>

    {/* Mobile list */}
    <div className="mobile-only">
      {stages.map(stage=>{
        const sc=data.candidates.filter(c=>!pendingIds.has(c.id)&&c.status===stage&&(search===''||c.name.includes(search)||c.role.includes(search)));
        if(!sc.length) return null;
        return <div key={stage} style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontSize:14,fontWeight:700,background:TAG_COLORS[stage]||'#e2e3e5',border:'1.5px solid #333',borderRadius:3,padding:'2px 10px'}}>{stage}</span>
            <span style={{fontSize:13,color:MUT}}>({sc.length})</span>
          </div>
          {sc.map(c=>{
            const jobs=data.jobs.filter(j=>c.appliedJobs.includes(j.id));
            return <div key={c.id} className="sbox" style={{background:'#fff',padding:14,marginBottom:8}} onClick={()=>setDetail(c)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <Avatar name={c.name} size={36}/>
                  <div><div style={{fontWeight:700,fontSize:15}}>{c.name}</div><div style={{fontSize:12,color:MUT}}>{c.domain?`${c.domain} › ${c.role}`:c.role}</div></div>
                </div>
                <Tag label={c.status}/>
              </div>
              <div style={{fontSize:12,color:'#555',marginBottom:6}}>📍 {c.city} · {c.experience}{c.cv&&<span style={{marginRight:8,background:'#e8f5e9',border:'1px solid #ccc',borderRadius:3,padding:'1px 5px'}}>📄 CV</span>}</div>
              {jobs[0]&&<div style={{fontSize:12,background:'#f0ede6',border:'1px solid #ddd',borderRadius:3,padding:'3px 8px',marginBottom:8}}>🔗 {jobs[0].title}</div>}
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}} onClick={e=>e.stopPropagation()}>
                <Btn onClick={()=>openEdit(c)} style={{padding:'6px 16px',fontSize:13}}>עריכה</Btn>
                <Btn onClick={()=>del(c.id)} style={{padding:'6px 14px',fontSize:13,background:'#fde8dc'}}>🗑</Btn>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>

    {/* Desktop table */}
    <div className="sbox desktop-only" style={{background:'#fff',overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:14,minWidth:700}}>
        <thead><tr style={{background:'#f0ede6',borderBottom:'2px solid #333'}}>

              <FF label="השכלה" value={form.education||''} onChange={v=>setForm(f=>({...f,education:v}))}/>

            </FormGrid>

                return !q||(j.title||'').toLowerCase().includes(q)||(j.publishTitle||'').toLowerCase().includes(q)||(j.jobNumber||'').toLowerCase().includes(q);

              return <>
                <input
                  value={jobSearch} onChange={e=>setJobSearch(e.target.value)}
                  placeholder="🔍 חפש משרה לפי שם או מספר..."
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:9,fontFamily:'Heebo',fontSize:13,marginBottom:10,outline:'none'}}

                <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:220,overflowY:'auto'}}>
                  {filtered.map(j=>{
                    const emp=data.employers.find(x=>x.id===j.employerId);
                    const chk=(form.appliedJobs||[]).includes(j.id);
                    return <label key={j.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:chk?'#eff6ff':'white',borderRadius:9,border:`1.5px solid ${chk?'#bfdbfe':'#e5e7eb'}`,cursor:'pointer',transition:'all .15s'}}>

                        <div style={{fontWeight:700,fontSize:13,color:'#1a1a2e'}}>{j.publishTitle||j.title}</div>
                        <div style={{fontSize:11,color:'#9ca3af'}}>{emp?.name||''} · {j.jobNumber}{j.location?` · ${j.location}`:''}</div>

                      <Tag label={j.status}/>

                  {filtered.length===0&&<div style={{color:'#9ca3af',fontSize:13,padding:'8px 0',textAlign:'center'}}>לא נמצאו משרות</div>}
                </div>
                {(form.appliedJobs||[]).length>0&&<div style={{marginTop:10,fontSize:12,color:'#e85d26',fontWeight:700}}>
                  ✅ {(form.appliedJobs||[]).length} משרות נבחרו
                </div>}
              </>;
            })()}
          </FormCard>

          <FormCard title="הערות" icon="📝" color="#fffbeb">
            <FF label="" type="textarea" value={form.notes||''} onChange={v=>setForm(f=>({...f,notes:v}))}/>
          </FormCard>
        </div>
      </div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
        <Btn onClick={()=>setModal(null)}>ביטול</Btn>
        <Btn variant="primary" onClick={save}>שמירה</Btn>
      </div>
    </Modal>}

    {msgTarget&&<MessageModal
      type="candidate"
      person={msgTarget.c}
      job={data.jobs.find(j=>msgTarget.c.appliedJobs?.includes(j.id))}
      employer={data.employers.find(e=>e.id===data.jobs.find(j=>msgTarget.c.appliedJobs?.includes(j.id))?.employerId)}
      onClose={()=>setMsgTarget(null)}
    />}
  </div>;
}

function DomainsTab({data,setData}){

  const [newD,setNewD]=React.useState('');
  const [newR,setNewR]=React.useState('');
  const [addD,setAddD]=React.useState(false);
  const [addR,setAddR]=React.useState(false);
  const domains=data.jobDomains||[];
  const active=domains.find(d=>d.id===sel);
  const addDomain=()=>{if(!newD.trim())return;const d={id:'d'+Date.now(),name:newD.trim(),roles:[]};setData(x=>({...x,jobDomains:[...x.jobDomains,d]}));setNewD('');setAddD(false);setSel(d.id);};

        <div style={{display:'flex',gap:6}}><Btn variant="primary" onClick={addDomain} style={{flex:1,fontSize:13}}>הוסף</Btn><Btn onClick={()=>setAddD(false)} style={{fontSize:13}}>ביטול</Btn></div>

        <div style={{fontSize:17,fontWeight:700,marginBottom:10}}>תפקידים: <span style={{color:ACC}}>{active.name}</span></div>

          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>

              <span style={{fontSize:14}}>{r}</span>
              <button onClick={()=>delRole(active.id,r)} style={{background:'none',border:'none',cursor:'pointer',color:'#999',fontSize:14}}>✕</button>
            </div>)}

            <input autoFocus value={newR} onChange={e=>setNewR(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addRole();if(e.key==='Escape')setAddR(false);}} placeholder="שם התפקיד..." style={{flex:1,border:'2px solid #333',borderRadius:3,padding:'7px 10px',fontFamily:'Heebo',fontSize:14}}/>
            <Btn variant="primary" onClick={addRole} style={{fontSize:13}}>הוסף</Btn>
            <Btn onClick={()=>setAddR(false)} style={{fontSize:13}}>ביטול</Btn>

        </div>
      </>:<div className="sbox" style={{background:'#fff',padding:40,textAlign:'center'}}><div style={{fontSize:36,marginBottom:12}}>👈</div><div style={{fontSize:17,color:MUT}}>בחר תחום לניהול תפקידים</div></div>}
    </div>
  </div>;
}

const PRIORITY_COLORS={'גבוה':'#fde8dc','בינוני':'#fff3cd','נמוך':'#f3f4f6'};

const STATUS_TEXT={'פתוח':'#1d4ed8','בתהליך':'#92400e','הושלם':'#15803d'};

function TaskModal({task,data,onSave,onClose,initialStatus}){

      </div>
      <div style={{padding:24}}>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>כותרת *</label>
          <input value={form.title} onChange={e=>set('title')(e.target.value)} placeholder="תיאור קצר של המשימה..." style={{width:'100%',padding:'10px 14px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:15,outline:'none'}} onFocus={e=>e.target.style.borderColor='#e85d26'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>תיאור</label>
          <textarea value={form.description} onChange={e=>set('description')(e.target.value)} placeholder="פרטים נוספים..." style={{width:'100%',padding:'10px 14px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:14,outline:'none',resize:'vertical',minHeight:80}} onFocus={e=>e.target.style.borderColor='#e85d26'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>תאריך יעד</label>
            <input type="date" value={form.dueDate} onChange={e=>set('dueDate')(e.target.value)} style={{width:'100%',padding:'9px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,outline:'none'}}/>
          </div>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>עדיפות</label>
            <select value={form.priority} onChange={e=>set('priority')(e.target.value)} style={{width:'100%',padding:'9px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,outline:'none'}}>
              {['גבוה','בינוני','נמוך'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>סטטוס</label>
            <select value={form.status} onChange={e=>set('status')(e.target.value)} style={{width:'100%',padding:'9px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,outline:'none'}}>
              {['פתוח','בתהליך','הושלם'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>שייך למועמד</label>
            <select value={form.candidateId||''} onChange={e=>set('candidateId')(e.target.value)} style={{width:'100%',padding:'9px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,outline:'none'}}>
              <option value="">— ללא שיוך —</option>
              {data.candidates.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:700,marginBottom:5,color:'#374151'}}>שייך למעסיק</label>
            <select value={form.employerId||''} onChange={e=>set('employerId')(e.target.value)} style={{width:'100%',padding:'9px 10px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,outline:'none'}}>
              <option value="">— ללא שיוך —</option>
              {data.employers.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}

          <button onClick={()=>isValid&&onSave(form)} disabled={!isValid} style={{padding:'10px 24px',background:isValid?'#e85d26':'#d1d5db',color:'white',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:isValid?'pointer':'not-allowed'}}>שמירה</button>
