const sb = supabase.createClient(SB_URL, SB_KEY);

async function saveToSupabase(data) {
  try {
    const { error } = await sb.from('crm_state').upsert({ id: 'main', data, updated_at: new Date().toISOString() });
    if (error) { console.warn('SB save error:', error); return false; }
    return true;
  } catch(e) { console.warn('SB save:', e); return false; }
}

async function loadFromSupabase() {
  try {
    const { data, error } = await sb.from('crm_state').select('data').eq('id','main').single();
    if (error || !data) return null;
    return data.data;
  } catch(e) { console.warn('SB load:', e); return null; }
}

async function uploadImageToStorage(base64, jobId) {
  try {
    const res = await fetch(base64);
    const blob = await res.blob();
    const ext = blob.type.includes('png') ? 'png' : 'jpg';
    const filename = `job-${jobId}.${ext}`;
    const { error } = await sb.storage.from('job-images').upload(filename, blob, { upsert: true, contentType: blob.type });
    if (error) { console.warn('Storage upload error:', error); return null; }
    const { data: urlData } = sb.storage.from('job-images').getPublicUrl(filename);
    return urlData.publicUrl;
  } catch(e) { console.warn('Upload exception:', e); return null; }
}

const fmtNum = s => (s||'').toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');

function Tag({label}){
  return <span style={{background:TAG_COLORS[label]||'#e2e3e5',border:'1.5px solid #333',borderRadius:3,padding:'1px 8px',fontSize:13,fontWeight:600}}>{label}</span>;
}

function Avatar({name,size=32}){
  const ini=(name||'').split(' ').map(w=>w[0]).join('').slice(0,2);
  const hue=(name||'').charCodeAt(0)*37%360;
  return <div style={{width:size,height:size,borderRadius:'50%',background:`hsl(${hue},45%,70%)`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*.38,border:'2px solid #333',flexShrink:0,color:'#222'}}>{ini}</div>;
}

function Btn({children,variant,onClick,style={}}){
  const pri=variant==='primary';
  return <button onClick={onClick} style={{background:pri?ACC:'white',color:pri?'white':'#333',border:'2px solid #333',borderRadius:3,padding:'6px 14px',cursor:'pointer',fontFamily:'Heebo,sans-serif',fontSize:14,fontWeight:600,...style}}
    onMouseDown={e=>e.currentTarget.style.transform='scale(0.97)'}
    onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
    onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>{children}</button>;
}

function SearchBar({placeholder,value,onChange}){
  return <div style={{position:'relative',flex:1,maxWidth:320}}>
    <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:16}}>🔍</span>

}

function Modal({title,onClose,children}){

      </div>
      {children}
    </div>
  </div>;
}

function FF({label,type='text',value,onChange,options,hint}){
  const s={width:'100%',padding:'7px 10px',border:'2px solid #333',borderRadius:3,fontFamily:'Heebo',fontSize:14};
  return <div style={{marginBottom:12}}>
    {label && <label style={{display:'block',fontSize:14,marginBottom:4,fontWeight:600}}>{label}</label>}
    {type==='select'?<select value={value} onChange={e=>onChange(e.target.value)} style={s}>{options.map(o=><option key={o}>{o}</option>)}</select>

    ...data.jobs.slice().reverse().slice(0,2).map(j=>{const e=data.employers.find(x=>x.id===j.employerId);return{text:`משרה: ${j.title}`,sub:e?.name||'',icon:'📋'};})
  ].slice(0,5);

      <h1 style={{fontSize:30,fontWeight:800,marginBottom:4}}>שלום 👋</h1>
      <div style={{color:MUT,fontSize:13}}>{new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}} className="mobile-grid-2">
      {stats.map(s=><div key={s.label} className="sbox" onClick={()=>onNav(s.link)} style={{background:s.color,padding:'16px 14px',cursor:'pointer'}}>

        <div style={{fontSize:32,fontWeight:800,lineHeight:1}}>{s.value}</div>
        <div style={{fontSize:14,color:'#444',marginTop:2}}>{s.label}</div>
      </div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}} className="mobile-grid-1">
      <div className="sbox" style={{background:'#fff',padding:18}}>
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:12,borderBottom:'2px dashed #ddd',paddingBottom:8}}>פעילות אחרונה</h3>
        {recent.map((a,i)=><div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:10,paddingBottom:10,borderBottom:i<recent.length-1?'1px dashed #eee':'none'}}>
          <span style={{fontSize:16}}>{a.icon}</span>
          <div><div style={{fontSize:13,fontWeight:600}}>{a.text}</div><div style={{fontSize:11,color:MUT}}>{a.sub}</div></div>
        </div>)}

// ── IMAGE UPLOAD ──────────────────────────────────────────────────────────────
function ImgUpload({form,setForm}){
  const [uploading,setUploading]=React.useState(false);
  const handleImageChange=async e=>{
    const f=e.target.files[0];if(!f)return;
    setUploading(true);
    try{
      const jobId=form.id||('j'+Date.now());
      const ext=f.type.includes('png')?'png':'jpg';
      const filename=`job-${jobId}.${ext}`;
      const uploadUrl=`${SB_URL}/storage/v1/object/job-images/${filename}`;
      const res=await fetch(uploadUrl,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':f.type,'x-upsert':'true'},body:f});
      if(!res.ok){const e=await res.text();alert('שגיאה בהעלאת תמונה');console.warn(e);return;}
      const publicUrl=`${SB_URL}/storage/v1/object/public/job-images/${filename}`;
      setForm(fm=>({...fm,image:publicUrl,imageUrl:publicUrl}));
    }catch(err){alert('שגיאה בהעלאת תמונה');console.warn(err);}
    finally{setUploading(false);}
  };
  const previewUrl=form.imageUrl||form.image||'';
  return <div style={{marginBottom:16}}>
    <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>תמונה למשרה</div>
    <div style={{display:'flex',gap:12,alignItems:'center'}}>
      {previewUrl?<div style={{position:'relative'}}>
        <img src={previewUrl} alt="" style={{width:120,height:80,objectFit:'cover',border:'2px solid #333',borderRadius:3}}/>
        <button onClick={()=>setForm(f=>({...f,image:'',imageUrl:''}))} style={{position:'absolute',top:-8,left:-8,background:ACC,color:'white',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:12}}>✕</button>
      </div>:<div className="sbox" style={{width:120,height:80,background:'#f5f0e8',display:'flex',alignItems:'center',justifyContent:'center',color:MUT,fontSize:13}}>אין תמונה</div>}
      <label style={{cursor:uploading?'wait':'pointer',background:'white',border:'2px solid #333',borderRadius:3,padding:'7px 14px',fontSize:14,fontWeight:600,opacity:uploading?0.6:1}}>
        {uploading?'⏳ מעלה...':'📸 העלה תמונה'}
        <input type="file" accept="image/*" style={{display:'none'}} onChange={handleImageChange} disabled={uploading}/>
      </label>
    </div>
  </div>;
}

          <Btn variant="primary" onClick={()=>window.open(getUrl(pubJob),'_blank')}>🚀 פתח דף נחיתה</Btn>
          <Btn onClick={()=>{
            const fullUrl=getUrl(pubJob);
            navigator.clipboard?.writeText(fullUrl).then(()=>alert('✅ הקישור הועתק!')).catch(()=>{
              // fallback
              const ta=document.createElement('textarea');
              ta.value=fullUrl;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
              alert('✅ הקישור הועתק!');
            });
          }}>📋 העתק קישור</Btn>
        </div>
        <div style={{marginTop:16,padding:12,background:'#fffbf0',border:'1px dashed #ccc',borderRadius:3,fontSize:13,color:'#666',textAlign:'right'}}>💡 שתף בפייסבוק, לינקדאין, ווטסאפ – המועמד ימלא טופס והנתונים יכנסו למערכת</div>
      </div>
    </Modal>}

    {detail&&(()=>{
      const emp=data.employers.find(e=>e.id===detail.employerId);
      const cands=data.candidates.filter(c=>c.appliedJobs.includes(detail.id));
      return <Modal title={detail.title} onClose={()=>setDetail(null)}>
        {detail.image&&<img src={detail.image} alt="" style={{width:'100%',height:160,objectFit:'cover',borderRadius:4,marginBottom:14,border:'2px solid #333'}}/>}
        <Sec title="🔖 זיהוי משרה">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="form-grid">
            {[['מספר',detail.jobNumber],['שם',detail.title],['כותרת פרסום',detail.publishTitle||'—'],['סטטוס',null]].map(([k,v])=><div key={k}>
              <div style={{fontSize:11,color:MUT}}>{k}</div>
              {k==='סטטוס'?<Tag label={detail.status}/>:<div style={{fontSize:14,fontWeight:600}}>{v}</div>}
            </div>)}
          </div>
        </Sec>
        <Sec title="📋 פרטי המשרה">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="form-grid">
            {[['מעסיק',emp?.name],['תחום',detail.domain],['תפקיד',detail.role],['סוג',detail.type],['מיקום',detail.location],['שכר',`₪${fmtNum(detail.salary)}`],['נוצרה',detail.createdAt],['דדליין',detail.deadline]].map(([k,v])=><div key={k}>
              <div style={{fontSize:11,color:MUT}}>{k}</div>
              <div style={{fontSize:14,fontWeight:500}}>{v||'—'}</div>
            </div>)}
          </div>
        </Sec>
        {(detail.description||detail.requirements||detail.benefits)&&<Sec title="📝 תוכן">
          {detail.description&&<div style={{marginBottom:10}}><div style={{fontWeight:600,fontSize:13,marginBottom:4}}>תיאור</div><div style={{fontSize:13,color:'#444',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{detail.description}</div></div>}
          {detail.requirements&&<div style={{marginBottom:10}}><div style={{fontWeight:600,fontSize:13,marginBottom:4}}>דרישות</div><div style={{fontSize:13,color:'#444',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{detail.requirements}</div></div>}
          {detail.benefits&&<div><div style={{fontWeight:600,fontSize:13,marginBottom:4}}>יתרונות</div><div style={{fontSize:13,color:'#444',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{detail.benefits}</div></div>}
        </Sec>}
        <Sec title={`👥 מועמדים (${cands.length})`}>
          {cands.map(c=><div key={c.id} className="sbox" style={{padding:'8px 12px',marginBottom:6,background:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><Avatar name={c.name} size={28}/><div><div style={{fontWeight:600,fontSize:14}}>{c.name}</div><div style={{fontSize:12,color:MUT}}>{c.domain?`${c.domain} › ${c.role}`:c.role}</div></div></div>
            <Tag label={c.status}/>
          </div>)}
          {!cands.length&&<div style={{color:MUT,fontSize:13}}>אין מועמדים עדיין</div>}
        </Sec>
      </Modal>;
    })()}

    {(modal==='add'||modal==='edit')&&<Modal title={modal==='add'?`משרה חדשה – ${form.jobNumber}`:`עריכת משרה – ${form.jobNumber}`} onClose={()=>setModal(null)}>
      <ImgUpload form={form} setForm={setForm}/>
      <Sec title="🔖 זיהוי משרה">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="form-grid">
          <div><label style={{display:'block',fontSize:14,fontWeight:600,marginBottom:4}}>מספר משרה</label><input value={form.jobNumber} readOnly style={{width:'100%',padding:'7px 10px',border:'2px solid #ccc',borderRadius:3,fontFamily:'Heebo',fontSize:14,background:'#f5f0e8',color:ACC,fontWeight:700}}/></div>
          <FF label="שם המשרה" value={form.title||''} onChange={v=>setForm(f=>({...f,title:v}))}/>
          <div style={{gridColumn:'1 / -1'}}><FF label="כותרת פרסום" value={form.publishTitle||''} onChange={v=>setForm(f=>({...f,publishTitle:v}))} hint="הכותרת שתופיע בדף הנחיתה"/></div>
        </div>
      </Sec>
      <Sec title="📋 פרטי המשרה">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="form-grid">
          <div>
            <label style={{display:'block',fontSize:14,fontWeight:600,marginBottom:4}}>תחום</label>
            <select value={form.domain||''} onChange={e=>setForm(f=>({...f,domain:e.target.value,role:''}))} style={{width:'100%',padding:'7px 10px',border:'2px solid #333',borderRadius:3,fontFamily:'Heebo',fontSize:14}}>
              <option value="">-- בחר תחום --</option>
              {(data.jobDomains||[]).map(d=><option key={d.id} value={d.name}>{d.name}</option>)}

          </div>
          <div>
            <label style={{display:'block',fontSize:14,fontWeight:600,marginBottom:4}}>תפקיד</label>
            <select value={form.role||''} onChange={e=>setForm(f=>({...f,role:e.target.value}))} disabled={!form.domain} style={{width:'100%',padding:'7px 10px',border:'2px solid #333',borderRadius:3,fontFamily:'Heebo',fontSize:14,background:!form.domain?'#f5f5f5':'white'}}>
              <option value="">{form.domain?'-- בחר תפקיד --':'בחר תחום תחילה'}</option>
              {(data.jobDomains||[]).find(d=>d.name===form.domain)?.roles.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <FF label="מעסיק" type="select" value={data.employers.find(e=>e.id===form.employerId)?.name||''} onChange={v=>setForm(f=>({...f,employerId:data.employers.find(e=>e.name===v)?.id||f.employerId}))} options={data.employers.map(e=>e.name)}/>
          <FF label="סוג משרה" type="select" value={form.type||'משרה מלאה'} onChange={v=>setForm(f=>({...f,type:v}))} options={['משרה מלאה','חצי משרה','משמרות','פרילנס','זמני']}/>
          <FF label="מיקום" value={form.location||''} onChange={v=>setForm(f=>({...f,location:v}))}/>
          <FF label="טווח שכר (₪)" value={form.salary||''} onChange={v=>setForm(f=>({...f,salary:v}))}/>
          <FF label="תאריך דדליין" type="date" value={form.deadline||''} onChange={v=>setForm(f=>({...f,deadline:v}))}/>
          <FF label="סטטוס" type="select" value={form.status||'פתוח'} onChange={v=>setForm(f=>({...f,status:v}))} options={['פתוח','ממתין','סגור']}/>

      </Sec>
      <Sec title="📝 תוכן המשרה">
        <FF label="תיאור המשרה" type="textarea" value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))}/>
        <FF label="דרישות המשרה" type="textarea" value={form.requirements||''} onChange={v=>setForm(f=>({...f,requirements:v}))}/>
        <FF label="יתרונות" type="textarea" value={form.benefits||''} onChange={v=>setForm(f=>({...f,benefits:v}))}/>
      </Sec>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
        <Btn onClick={()=>setModal(null)}>ביטול</Btn>

      </div>
    </Modal>}
  </div>;
}

// ── CANDIDATES ───────────────────────────────────────────────────────────────
function Candidates({data,setData}){
  const [search,setSearch]=React.useState('');
  const [stFilter,setStFilter]=React.useState('הכל');
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({});
  const [detail,setDetail]=React.useState(null);
  const stages=['חדש','בתהליך','ראיון נקבע','הוצב'];
  const filtered=data.candidates.filter(c=>(c.name.includes(search)||c.role.includes(search)||c.city.includes(search))&&(stFilter==='הכל'||c.status===stFilter));
  const openAdd=()=>{setForm({name:'',domain:'',role:'',phone:'',email:'',city:'',status:'חדש',experience:'',education:'',appliedJobs:[],cv:false,notes:''});setModal('add');};
  const openEdit=c=>{setForm({...c,appliedJobs:[...c.appliedJobs]});setModal('edit');};
  const save=()=>{
    if(modal==='add') setData(d=>({...d,candidates:[...d.candidates,{...form,id:'c'+Date.now()}]}));
    else setData(d=>({...d,candidates:d.candidates.map(c=>c.id===form.id?form:c)}));
    setModal(null);
  };
  const del=id=>{if(confirm('למחוק מועמד?'))setData(d=>({...d,candidates:d.candidates.filter(c=>c.id!==id)}));};

  return <div style={{padding:28}} className="mobile-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h1 style={{fontSize:28,fontWeight:800}}>👥 מועמדים</h1>
      <Btn variant="primary" onClick={openAdd}>+ מועמד</Btn>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <SearchBar placeholder="חיפוש..." value={search} onChange={setSearch}/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['הכל','חדש','בתהליך','ראיון נקבע','הוצב'].map(s=><Btn key={s} onClick={()=>setStFilter(s)} style={{background:stFilter===s?ACC:'white',color:stFilter===s?'white':'#333',padding:'5px 8px',fontSize:11}}>{s}</Btn>)}
      </div>
    </div>

    {/* Mobile list */}
    <div className="mobile-only">
      {stages.map(stage=>{
        const sc=data.candidates.filter(c=>c.status===stage&&(search===''||c.name.includes(search)||c.role.includes(search)));
        if(!sc.length) return null;
        return <div key={stage} style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontSize:14,fontWeight:700,background:TAG_COLORS[stage]||'#e2e3e5',border:'1.5px solid #333',borderRadius:3,padding:'2px 10px'}}>{stage}</span>
            <span style={{fontSize:13,color:MUT}}>({sc.length})</span>
          </div>
          {sc.map(c=>{
            const jobs=data.jobs.filter(j=>c.appliedJobs.includes(j.id));
            return <div key={c.id} className="sbox" style={{background:'#fff',padding:14,marginBottom:8}} onClick={()=>setDetail(c)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <Avatar name={c.name} size={36}/>
                  <div><div style={{fontWeight:700,fontSize:15}}>{c.name}</div><div style={{fontSize:12,color:MUT}}>{c.domain?`${c.domain} › ${c.role}`:c.role}</div></div>
                </div>
                <Tag label={c.status}/>
              </div>
              <div style={{fontSize:12,color:'#555',marginBottom:6}}>📍 {c.city} · {c.experience}{c.cv&&<span style={{marginRight:8,background:'#e8f5e9',border:'1px solid #ccc',borderRadius:3,padding:'1px 5px'}}>📄 CV</span>}</div>
              {jobs[0]&&<div style={{fontSize:12,background:'#f0ede6',border:'1px solid #ddd',borderRadius:3,padding:'3px 8px',marginBottom:8}}>🔗 {jobs[0].title}</div>}
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}} onClick={e=>e.stopPropagation()}>
                <Btn onClick={()=>openEdit(c)} style={{padding:'6px 16px',fontSize:13}}>עריכה</Btn>
                <Btn onClick={()=>del(c.id)} style={{padding:'6px 14px',fontSize:13,background:'#fde8dc'}}>🗑</Btn>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>

    {/* Desktop kanban */}
    <div className="desktop-only" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
      {stages.map(stage=>{
        const sc=filtered.filter(c=>c.status===stage);
        return <div key={stage}>
          <div className="sbox" style={{background:TAG_COLORS[stage]||'#e2e3e5',padding:'8px 12px',marginBottom:10,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:15,fontWeight:700}}>{stage}</span>
            <span style={{fontSize:14,background:'#fff',border:'1.5px solid #333',borderRadius:3,padding:'0 6px'}}>{sc.length}</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10,minHeight:200}}>
            {sc.map(c=>{
              const jobs=data.jobs.filter(j=>c.appliedJobs.includes(j.id));
              return <div key={c.id} className="sbox" style={{background:'#fff',padding:14,cursor:'pointer',transition:'transform .15s'}}
                onMouseEnter={e=>e.currentTarget.style.transform='translateY(-1px)'}
                onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}
                onClick={()=>setDetail(c)}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <Avatar name={c.name} size={32}/>
                  <div><div style={{fontWeight:700,fontSize:14}}>{c.name}</div><div style={{fontSize:12,color:MUT}}>{c.domain?`${c.domain} › ${c.role}`:c.role}</div></div>
                </div>
                <div style={{fontSize:12,color:'#555',marginBottom:6}}>📍 {c.city} · {c.experience}</div>
                {jobs[0]&&<div style={{fontSize:11,background:'#f0ede6',border:'1px solid #ddd',borderRadius:3,padding:'3px 6px',marginBottom:4}}>🔗 {jobs[0].title}</div>}
                {c.cv&&<span style={{fontSize:12,color:'#666',background:'#e8f5e9',border:'1px solid #ccc',borderRadius:3,padding:'2px 6px'}}>📄 CV</span>}
                <div style={{display:'flex',gap:4,marginTop:8,justifyContent:'flex-end'}} onClick={e=>e.stopPropagation()}>
                  <Btn onClick={()=>openEdit(c)} style={{padding:'2px 8px',fontSize:11}}>עריכה</Btn>
                  <Btn onClick={()=>del(c.id)} style={{padding:'2px 8px',fontSize:11,background:'#fde8dc'}}>🗑</Btn>
                </div>
              </div>;
            })}
          </div>
        </div>;
      })}
    </div>

    {detail&&<Modal title={detail.name} onClose={()=>setDetail(null)}>
      <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:16}}>
        <Avatar name={detail.name} size={60}/>
        <div><div style={{fontWeight:700,fontSize:18}}>{detail.name}</div><div style={{color:MUT,fontSize:14}}>{detail.domain?`${detail.domain} › ${detail.role}`:detail.role}</div><div style={{marginTop:6}}><Tag label={detail.status}/></div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}} className="form-grid">
        {[['תחום',detail.domain],['תפקיד',detail.role],['טלפון',detail.phone],['אימייל',detail.email],['עיר',detail.city],['ניסיון',detail.experience],['השכלה',detail.education],['CV',detail.cv?'✅ קיים':'❌ חסר']].map(([k,v])=><div key={k}>
          <div style={{fontSize:12,color:MUT}}>{k}</div>
          <div style={{fontSize:14,fontWeight:500}}>{v||'—'}</div>
        </div>)}
      </div>
      <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>משרות</div>
      {data.jobs.filter(j=>detail.appliedJobs.includes(j.id)).map(j=>{const e=data.employers.find(x=>x.id===j.employerId);return(
        <div key={j.id} className="sbox" style={{padding:'8px 12px',marginBottom:6,background:'#f9f9f6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{j.title}</div><div style={{fontSize:12,color:MUT}}>{e?.name}</div></div>
          <Tag label={j.status}/>
        </div>
      );})}
      {detail.notes&&<div className="sbox" style={{background:'#fffbf0',padding:10,marginTop:12}}><span style={{fontSize:14}}>📝 {detail.notes}</span></div>}
    </Modal>}

    {(modal==='add'||modal==='edit')&&<Modal title={modal==='add'?'מועמד חדש':'עריכת מועמד'} onClose={()=>setModal(null)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="form-grid">
        <FF label="שם מלא" value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))}/>
        <div>
          <label style={{display:'block',fontSize:14,fontWeight:600,marginBottom:4}}>תחום</label>
          <select value={form.domain||''} onChange={e=>setForm(f=>({...f,domain:e.target.value,role:''}))} style={{width:'100%',padding:'7px 10px',border:'2px solid #333',borderRadius:3,fontFamily:'Heebo',fontSize:14}}>
            <option value="">-- בחר תחום --</option>
            {(data.jobDomains||[]).map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
          </select>
        </div>
        <div>
          <label style={{display:'block',fontSize:14,fontWeight:600,marginBottom:4}}>תפקיד</label>
          <select value={form.role||''} onChange={e=>setForm(f=>({...f,role:e.target.value}))} disabled={!form.domain} style={{width:'100%',padding:'7px 10px',border:'2px solid #333',borderRadius:3,fontFamily:'Heebo',fontSize:14,background:!form.domain?'#f5f5f5':'white'}}>
            <option value="">{form.domain?'-- בחר תפקיד --':'בחר תחום תחילה'}</option>
            {(data.jobDomains||[]).find(d=>d.name===form.domain)?.roles.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        <FF label="טלפון" value={form.phone||''} onChange={v=>setForm(f=>({...f,phone:v}))}/>
        <FF label="אימייל" type="email" value={form.email||''} onChange={v=>setForm(f=>({...f,email:v}))}/>
        <FF label="עיר" value={form.city||''} onChange={v=>setForm(f=>({...f,city:v}))}/>
        <FF label="ניסיון" value={form.experience||''} onChange={v=>setForm(f=>({...f,experience:v}))}/>
        <FF label="השכלה" value={form.education||''} onChange={v=>setForm(f=>({...f,education:v}))}/>
        <FF label="סטטוס" type="select" value={form.status||'חדש'} onChange={v=>setForm(f=>({...f,status:v}))} options={['חדש','בתהליך','ראיון נקבע','הוצב']}/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>שייך למשרות</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {data.jobs.map(j=>{const chk=form.appliedJobs?.includes(j.id);return(
            <label key={j.id} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',background:chk?'#cce5ff':'#f0ede6',border:'1.5px solid #333',borderRadius:3,padding:'3px 8px',fontSize:13}}>
              <input type="checkbox" checked={!!chk} onChange={()=>setForm(f=>({...f,appliedJobs:chk?f.appliedJobs.filter(id=>id!==j.id):[...(f.appliedJobs||[]),j.id]}))}/>
              {j.title}
            </label>
          );})}
        </div>
      </div>
      <FF label="הערות" type="textarea" value={form.notes||''} onChange={v=>setForm(f=>({...f,notes:v}))}/>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
        <Btn onClick={()=>setModal(null)}>ביטול</Btn>
        <Btn variant="primary" onClick={save}>שמירה</Btn>
      </div>
    </Modal>}
  </div>;
}

// ── SETTINGS ─────────────────────────────────────────────────────────────────
function DomainsTab({data,setData}){
  const [sel,setSel]=React.useState(null);
  const [newD,setNewD]=React.useState('');
  const [newR,setNewR]=React.useState('');
  const [addD,setAddD]=React.useState(false);
  const [addR,setAddR]=React.useState(false);
  const domains=data.jobDomains||[];
  const active=domains.find(d=>d.id===sel);
  const addDomain=()=>{if(!newD.trim())return;const d={id:'d'+Date.now(),name:newD.trim(),roles:[]};setData(x=>({...x,jobDomains:[...x.jobDomains,d]}));setNewD('');setAddD(false);setSel(d.id);};
  const delDomain=id=>{if(!confirm('למחוק תחום?'))return;setData(x=>({...x,jobDomains:x.jobDomains.filter(d=>d.id!==id)}));if(sel===id)setSel(null);};
  const addRole=()=>{if(!newR.trim()||!sel)return;setData(x=>({...x,jobDomains:x.jobDomains.map(d=>d.id===sel?{...d,roles:[...d.roles,newR.trim()]}:d)}));setNewR('');setAddR(false);};
  const delRole=(did,r)=>setData(x=>({...x,jobDomains:x.jobDomains.map(d=>d.id===did?{...d,roles:d.roles.filter(x=>x!==r)}:d)}));
  return <div style={{display:'grid',gridTemplateColumns:'240px 1fr',gap:20,maxWidth:740}} className="mobile-grid-1">
    <div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:10}}>תחומים</div>
      <div className="sbox" style={{background:'#fff',overflow:'hidden'}}>
        {domains.map(d=><div key={d.id} onClick={()=>setSel(d.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',cursor:'pointer',borderBottom:'1px dashed #ddd',background:sel===d.id?'#fde8dc':'white',borderRight:sel===d.id?`3px solid ${ACC}`:'3px solid transparent'}}>

    </div>
  </div>;
}

      <Btn variant="primary">שמירת שינויים</Btn>
      <div style={{marginTop:28,borderTop:'2px dashed #ddd',paddingTop:20}}>

        <div style={{fontSize:13,color:MUT,marginBottom:14}}>ייצא את כל הנתונים לקובץ JSON, ואחר כך ייבא אותו בכל דפדפן או מכשיר.</div>

          <Btn variant="primary" onClick={()=>{

              <td style={{padding:'10px 12px',fontWeight:600}}><div style={{display:'flex',alignItems:'center',gap:8}}><Avatar name={u.name} size={26}/>{u.name}</div></td>
              <td style={{padding:'10px 12px',color:MUT}}>{u.email}</td>

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=React.useState(()=>localStorage.getItem('crm_page')||'dashboard');
  const [syncStatus,setSyncStatus]=React.useState('syncing');
  const [data,setData]=React.useState(()=>{
    try{
      const saved=localStorage.getItem('crm_data');
      if(!saved)return INIT;
      const p=JSON.parse(saved);
      let nextN=1;
      const jobs=(p.jobs||[]).map(j=>{
        const mj={domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j};
        if(!mj.jobNumber){mj.jobNumber='TG-'+String(nextN).padStart(3,'0');}
        const n=parseInt((mj.jobNumber||'').replace('TG-',''))||0;
        if(n>=nextN)nextN=n+1;
        return mj;
      });
      return{...p,jobs,candidates:(p.candidates||[]).map(c=>({domain:'',...c})),employers:(p.employers||[]).map(e=>({needs:[],...e})),jobDomains:p.jobDomains||INIT.jobDomains};
    }catch{return INIT;}
  });

  // Load from Supabase on startup
  React.useEffect(()=>{
    loadFromSupabase().then(sbData=>{
      if(sbData&&(sbData.employers?.length||sbData.jobs?.length||sbData.candidates?.length||sbData.jobDomains?.length)){
        const jobs=(sbData.jobs||[]).map(j=>({domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j}));
        const merged={...sbData,jobs,candidates:(sbData.candidates||[]).map(c=>({domain:'',...c})),employers:(sbData.employers||[]).map(e=>({needs:[],...e})),jobDomains:sbData.jobDomains?.length?sbData.jobDomains:INIT.jobDomains};
        setData(merged);
        localStorage.setItem('crm_data',JSON.stringify(merged));
        setSyncStatus('ok');
      }else{
        const local=JSON.parse(localStorage.getItem('crm_data')||'null');
        saveToSupabase(local||INIT).then(ok=>setSyncStatus(ok?'ok':'error'));
      }
    }).catch(()=>setSyncStatus('error'));
  },[]);

  // Auto-refresh from Supabase every 10 seconds
  React.useEffect(()=>{
    const interval=setInterval(()=>{
      loadFromSupabase().then(sbData=>{
        if(!sbData)return;
        const jobs=(sbData.jobs||[]).map(j=>({domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j}));
        const merged={...sbData,jobs,candidates:(sbData.candidates||[]).map(c=>({domain:'',...c})),employers:(sbData.employers||[]).map(e=>({needs:[],...e})),jobDomains:sbData.jobDomains?.length?sbData.jobDomains:INIT.jobDomains};
        setData(merged);
        localStorage.setItem('crm_data',JSON.stringify(merged));
        setSyncStatus('ok');
      }).catch(()=>{});
    },10000);
    return()=>clearInterval(interval);
  },[]);

  // Save to Supabase on data change (debounced 1s)
  const isFirst=React.useRef(true);
  const saveTimer=React.useRef(null);
  React.useEffect(()=>{
    if(isFirst.current){isFirst.current=false;return;}
    localStorage.setItem('crm_data',JSON.stringify(data));
    setSyncStatus('syncing');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      saveToSupabase(data).then(ok=>setSyncStatus(ok?'ok':'error'));
    },1000);
  },[data]);

  React.useEffect(()=>{localStorage.setItem('crm_page',page);},[page]);

  const syncBg=syncStatus==='ok'?'#d4edda':syncStatus==='error'?'#fde8dc':'#fff3cd';
  const syncMsg=syncStatus==='syncing'?'🔄 מסנכרן...':syncStatus==='ok'?'☁️ מסונכרן עם Supabase':'⚠️ שגיאת סנכרון';

  return <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f5f0e8'}}>
    <div id="desktop-sidebar"><Sidebar active={page} onNav={setPage}/></div>
    <div id="main-content" style={{flex:1,overflow:'auto',minWidth:0}}>
      <div style={{background:syncBg,padding:'3px 14px',fontSize:12,textAlign:'center',borderBottom:'1px solid #ddd'}}>{syncMsg}</div>
      {page==='dashboard'&&<Dashboard data={data} onNav={setPage}/>}
      {page==='employers'&&<Employers data={data} setData={setData}/>}
      {page==='jobs'&&<Jobs data={data} setData={setData}/>}
      {page==='candidates'&&<Candidates data={data} setData={setData}/>}
      {page==='settings'&&<Settings data={data} setData={setData}/>}
    </div>
    <nav id="mobile-nav">
      {NAV.map(item=>(
        <button key={item.id} className={`mnav-btn${page===item.id?' active':''}`} onClick={()=>setPage(item.id)}>
          <span>{item.icon}</span>
          <span>{item.label}</span>
        </button>
      ))}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
