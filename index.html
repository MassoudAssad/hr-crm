/* ── Dropdown item hover ── */

/* ── Dark mode: re-invert media elements so they stay readable ── */

<script>
(function(){
  var acc=localStorage.getItem('crm_accentColor')||'#e85d26';
  var zoom=localStorage.getItem('crm_zoom')||'100%';
  var dark=localStorage.getItem('crm_darkMode')==='1';
  var bold=localStorage.getItem('crm_boldText')==='1';
  var hc=localStorage.getItem('crm_highContrast')==='1';
  document.documentElement.style.setProperty('--acc',acc);
  function applyAll(){
    document.body.style.zoom=zoom;
    var f=[];
    if(dark)f.push('invert(0.92) hue-rotate(183deg)');
    if(hc)f.push('contrast(1.4)');
    document.body.style.filter=f.join(' ');
    if(dark)document.body.classList.add('dark-mode');
    if(bold)document.body.classList.add('bold-mode');
  }
  if(document.body)applyAll();
  else document.addEventListener('DOMContentLoaded',applyAll);
})();
</script>

async function saveToSupabase(data) {
  try {
    const { error } = await sb.from('crm_state').upsert({ id: 'main', data, updated_at: new Date().toISOString() });
    if (error) { console.warn('SB save error:', error); return false; }
    return true;
  } catch(e) { console.warn('SB save:', e); return false; }
}

async function loadFromSupabase() {
  try {
    const { data, error } = await sb.from('crm_state').select('data').eq('id','main').single();
    if (error || !data) return null;
    return data.data;
  } catch(e) { console.warn('SB load:', e); return null; }
}

async function uploadImageToStorage(base64, jobId) {
  try {
    const res = await fetch(base64);
    const blob = await res.blob();
    const ext = blob.type.includes('png') ? 'png' : 'jpg';
    const filename = `job-${jobId}.${ext}`;
    const { error } = await sb.storage.from('job-images').upload(filename, blob, { upsert: true, contentType: blob.type });
    if (error) { console.warn('Storage upload error:', error); return null; }
    const { data: urlData } = sb.storage.from('job-images').getPublicUrl(filename);
    return urlData.publicUrl;
  } catch(e) { console.warn('Upload exception:', e); return null; }
}

// ── STATUS HISTORY ────────────────────────────────────────────────────────────
function withStatusChange(oldItem, newItem) {
  if (!newItem) return newItem;
  const oldStatus = (oldItem||{}).status;
  const newStatus = newItem.status;
  if (oldStatus === newStatus) return newItem;
  const entry = { status: newStatus, changedAt: new Date().toISOString() };
  const prevHistory = oldItem?.statusHistory || [];
  return { ...newItem, statusHistory: [...prevHistory, entry] };
}
function fmtDateHe(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}

function Avatar({name,size=32}){
  const ini=(name||'').split(' ').map(w=>w[0]).join('').slice(0,2);

function Modal({title,onClose,children,wide=false}){
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)',zIndex:1000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'20px 12px',overflowY:'auto'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:'#f8f7f4',borderRadius:20,width:wide?'96vw':'560px',maxWidth:wide?1400:'560px',boxShadow:'0 32px 100px rgba(0,0,0,0.3)',display:'flex',flexDirection:'column',flexShrink:0,marginBottom:20}} onClick={e=>e.stopPropagation()}>
      <div style={{background:'#1a1a2e',borderRadius:'20px 20px 0 0',padding:'16px 24px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10}}>
        <div style={{color:'white',fontWeight:800,fontSize:18}}>{title}</div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',width:34,height:34,borderRadius:17,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      <div style={{padding:'16px 20px 20px'}}>
        {children}
      </div>
    </div>
  </div>;
}

function FormGrid({children}){
  return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px 16px',marginBottom:4}}>{children}</div>;
}

function FormCard({title,icon,color='#fff5f0',children}){
  return <div style={{background:'white',borderRadius:14,padding:'16px 18px',marginBottom:14,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
    {title&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
      <div style={{width:30,height:30,borderRadius:7,background:color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>{icon}</div>
      <div style={{fontWeight:800,fontSize:14,color:'#1a1a2e'}}>{title}</div>
    </div>}
    {children}
  </div>;
}

function FF({label,type='text',value,onChange,options,hint,full=false,aiHighlight=false}){
  const s={width:'100%',padding:'9px 12px',border:'2px solid #d1d5db',borderRadius:8,fontFamily:'Heebo',fontSize:13,color:'#1a1a2e',background:'#ffffff',outline:'none',boxSizing:'border-box'};
  const handleFocus=e=>{e.target.style.border='2px solid #1a3a6b';e.target.style.boxShadow='0 0 0 3px rgba(26,58,107,0.1)';};
  const handleBlur=e=>{e.target.style.border='2px solid #d1d5db';e.target.style.boxShadow='none';};
  return <div style={{marginBottom:10,gridColumn:full?'1 / -1':'auto'}}>
    {label&&<label style={{display:'block',fontSize:11,marginBottom:4,fontWeight:700,color:aiHighlight?'#2563eb':'#374151',textTransform:'uppercase',letterSpacing:'0.3px'}}>{label}{aiHighlight&&<span style={{marginRight:4,fontSize:10,color:'#3b82f6',fontWeight:800}}>✨ AI</span>}</label>}
    {type==='select'
      ?<select value={value} onChange={e=>onChange(e.target.value)} onFocus={handleFocus} onBlur={handleBlur} className={aiHighlight?'ai-filled':''} style={{...s,cursor:'pointer'}}>{options.map(o=><option key={o}>{o}</option>)}</select>
      :type==='textarea'
      ?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={3} onFocus={handleFocus} onBlur={handleBlur} className={aiHighlight?'ai-filled':''} style={{...s,resize:'vertical'}}/>
      :<input type={type} value={value} onChange={e=>onChange(e.target.value)} onFocus={handleFocus} onBlur={handleBlur} className={aiHighlight?'ai-filled':''} style={s}/>}
    {hint&&<div style={{fontSize:11,color:'#6b7280',marginTop:3}}>{hint}</div>}
  </div>;
}

function Sec({title,children}){
  return <div style={{background:'#f9f7f3',border:'1.5px solid #e0dbd0',borderRadius:4,padding:14,marginBottom:12}}>
    <div style={{fontSize:14,fontWeight:700,color:ACC,marginBottom:8,borderBottom:'1px dashed #ddd',paddingBottom:6}}>{title}</div>
    {children}
  </div>;
}

function MessageModal({ type, person, job, employer, candidate, onClose, initialContactId }) {
  // type: 'candidate' | 'employer'
  // Build contacts list: if employer has contacts array use it, else build from legacy fields
  const contacts = React.useMemo(() => {
    if (type === 'employer') {
      if (person.contacts && person.contacts.length > 0) return person.contacts;
      // fallback: build single contact from legacy fields
      return [{
        id: 'legacy',
        name: person.contact || person.name || '',
        role: '',
        phone: person.phone || '',
        mobile: person.phone || '',
        email: person.email || '',
        isPrimary: true
      }];
    }
    return [];
  }, [person, type]);

  const defaultContactId = initialContactId || contacts.find(c=>c.isPrimary)?.id || contacts[0]?.id || '';
  const [selContactId, setSelContactId] = React.useState(defaultContactId);
  const selContact = type === 'employer' ? (contacts.find(c=>c.id===selContactId) || contacts[0]) : null;

  const templates = MSG_TEMPLATES[type] || [];
  const [selTpl, setSelTpl] = React.useState(templates[0]?.id || '');
  const [channel, setChannel] = React.useState('email'); // 'email' | 'whatsapp'
  const [fromEmail, setFromEmail] = React.useState(FROM_EMAILS[0].email);
  const [subject, setSubject] = React.useState('');
  const [body, setBody] = React.useState('');
  const [sent, setSent] = React.useState(false);

  const tpl = templates.find(t => t.id === selTpl);

  // Effective person for templates (merge contact fields for employer)
  const effectivePerson = React.useMemo(() => {
    if (type === 'employer' && selContact) {
      return { ...person, contact: selContact.name, email: selContact.email, phone: selContact.mobile || selContact.phone };
    }
    return person;
  }, [person, selContact, type]);

  const refreshTemplate = (tplObj, ep) => {
    if (!tplObj) return;
    if (type === 'candidate') {
      setSubject(tplObj.subject(ep, job));
      setBody(tplObj.body(ep, job, employer));
    } else {
      setSubject(tplObj.subject(ep, candidate));
      setBody(tplObj.body(ep, candidate));
    }
  };

  React.useEffect(() => { if (tpl) refreshTemplate(tpl, effectivePerson); }, [selTpl]);
  React.useEffect(() => { if (tpl) refreshTemplate(tpl, effectivePerson); }, [selContactId]);
  React.useEffect(() => { if (tpl) refreshTemplate(tpl, effectivePerson); }, []);

  const phone = ((selContact ? (selContact.mobile||selContact.phone) : person.phone)||'').replace(/[-\s]/g,'').replace(/^0/,'972');
  const email = (selContact ? selContact.email : person.email) || '';

  const handleSend = () => {
    if (channel === 'email') {
      const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}&from=${encodeURIComponent(fromEmail)}`;
      window.open(gmailUrl, '_blank');
    } else {
      const wa = `https://wa.me/${phone}?text=${encodeURIComponent(body)}`;
      window.open(wa, '_blank');
    }
    setSent(true);
    setTimeout(() => { setSent(false); onClose(); }, 1200);
  };

  const hasContact = channel === 'email' ? !!email : !!phone;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:18,width:'100%',maxWidth:780,maxHeight:'96vh',overflow:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.3)'}}>
        {/* Header */}
        <div style={{background:'#1a1a2e',borderRadius:'18px 18px 0 0',padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#e85d26',fontSize:13,fontWeight:700,marginBottom:2}}>
              {type==='candidate'?'📧 שליחת הודעה למועמד':'📧 שליחת הודעה למעסיק'}
            </div>
            <div style={{color:'white',fontWeight:800,fontSize:18}}>{person.name}</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',width:34,height:34,borderRadius:17,cursor:'pointer',fontSize:18}}>✕</button>
        </div>

        <div style={{padding:'20px 24px'}}>
          {/* Contact selector — employer only, more than one contact */}
          {type==='employer' && contacts.length > 1 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:8}}>👤 בחר איש קשר</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {contacts.map(c=>{
                  const hasEmail=!!c.email;
                  const hasMobile=!!(c.mobile||c.phone);
                  const isSelected=selContactId===c.id;
                  return <button key={c.id} onClick={()=>setSelContactId(c.id)}
                    style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                      border:`2px solid ${isSelected?'#e85d26':'#e5e7eb'}`,borderRadius:10,
                      background:isSelected?'#fff5f0':'white',cursor:'pointer',textAlign:'right',
                      fontFamily:'Heebo',transition:'all .15s'}}>
                    <div style={{width:36,height:36,borderRadius:18,background:isSelected?'#e85d26':'#e5e7eb',
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                      color:isSelected?'white':'#6b7280',fontWeight:800,fontSize:14}}>
                      {c.name?c.name[0]:'?'}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontWeight:700,fontSize:14,color:isSelected?'#e85d26':'#1a1a2e'}}>{c.name}</span>
                        {c.isPrimary&&<span style={{fontSize:10,background:'#fef3c7',color:'#92400e',border:'1px solid #fcd34d',borderRadius:4,padding:'1px 6px',fontWeight:700}}>ראשי</span>}
                      </div>
                      {c.role&&<div style={{fontSize:12,color:'#6b7280',marginTop:1}}>{c.role}</div>}
                    </div>
                    <div style={{display:'flex',gap:6,flexShrink:0}}>
                      <span style={{fontSize:12,padding:'3px 7px',borderRadius:6,
                        background:hasEmail?'#eff6ff':'#f3f4f6',
                        color:hasEmail?'#1d4ed8':'#9ca3af',
                        border:`1px solid ${hasEmail?'#bfdbfe':'#e5e7eb'}`}}>
                        📧 {hasEmail?c.email:'אין מייל'}
                      </span>
                      <span style={{fontSize:12,padding:'3px 7px',borderRadius:6,
                        background:hasMobile?'#f0fdf4':'#f3f4f6',
                        color:hasMobile?'#15803d':'#9ca3af',
                        border:`1px solid ${hasMobile?'#86efac':'#e5e7eb'}`}}>
                        📱 {hasMobile?(c.mobile||c.phone):'אין נייד'}
                      </span>
                    </div>
                  </button>;
                })}
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:8,marginBottom:channel==='email'?8:18}}>
            {[{id:'email',icon:'📧',label:'מייל'},{id:'whatsapp',icon:'💬',label:'WhatsApp'}].map(ch=>(
              <button key={ch.id} onClick={()=>setChannel(ch.id)}
                style={{flex:1,padding:'10px 0',border:`2px solid ${channel===ch.id?'#e85d26':'#e5e7eb'}`,borderRadius:10,background:channel===ch.id?'#fff5f0':'white',
                  fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer',color:channel===ch.id?'#e85d26':'#374151',
                  transition:'all .15s'}}>
                {ch.icon} {ch.label}
                {ch.id==='email'&&email&&<span style={{display:'block',fontSize:11,color:'#9ca3af',fontWeight:400,marginTop:2}}>{email}</span>}
                {ch.id==='email'&&!email&&<span style={{display:'block',fontSize:11,color:'#fca5a5',fontWeight:400,marginTop:2}}>אין מייל</span>}
                {ch.id==='whatsapp'&&(selContact?selContact.mobile||selContact.phone:person.phone)&&<span style={{display:'block',fontSize:11,color:'#9ca3af',fontWeight:400,marginTop:2}}>{selContact?selContact.mobile||selContact.phone:person.phone}</span>}
                {ch.id==='whatsapp'&&!(selContact?selContact.mobile||selContact.phone:person.phone)&&<span style={{display:'block',fontSize:11,color:'#fca5a5',fontWeight:400,marginTop:2}}>אין טלפון</span>}
              </button>
            ))}
          </div>

          {channel==='email'&&<div style={{background:'#f8f9fa',border:'1.5px solid #e5e7eb',borderRadius:10,padding:'10px 14px',marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'#6b7280',marginBottom:8}}>📤 שלח מ:</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {FROM_EMAILS.map(f=>(
                <button key={f.email} onClick={()=>setFromEmail(f.email)}
                  style={{padding:'7px 14px',border:`2px solid ${fromEmail===f.email?'#e85d26':'#e5e7eb'}`,borderRadius:8,
                    background:fromEmail===f.email?'#fff5f0':'white',fontFamily:'Heebo',fontSize:13,
                    fontWeight:fromEmail===f.email?700:500,cursor:'pointer',
                    color:fromEmail===f.email?'#e85d26':'#374151',transition:'all .15s'}}>
                  {fromEmail===f.email&&'✓ '}{f.label}
                  <span style={{display:'block',fontSize:11,color:fromEmail===f.email?'#c94d1a':'#9ca3af',fontWeight:400,direction:'ltr'}}>{f.email}</span>
                </button>
              ))}
            </div>
          </div>}

          {/* Template picker */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:8}}>תבנית הודעה</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {templates.map(t=>(
                <button key={t.id} onClick={()=>setSelTpl(t.id)}
                  style={{padding:'6px 12px',border:`1.5px solid ${selTpl===t.id?'#e85d26':'#e5e7eb'}`,borderRadius:20,
                    background:selTpl===t.id?'#fff5f0':'white',fontFamily:'Heebo',fontSize:12,fontWeight:selTpl===t.id?700:500,
                    cursor:'pointer',color:selTpl===t.id?'#e85d26':'#374151'}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Subject (email only) */}
          {channel==='email'&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>נושא</div>
              <input value={subject} onChange={e=>setSubject(e.target.value)}
                style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:14,outline:'none'}}/>
            </div>
          )}

          {/* Body */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>תוכן ההודעה</div>
            <textarea value={body} onChange={e=>setBody(e.target.value)} rows={14}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #e5e7eb',borderRadius:8,fontFamily:'Heebo',fontSize:13,lineHeight:1.7,outline:'none',resize:'vertical'}}/>
          </div>

          {!hasContact&&(
            <div style={{background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#c94d1a',marginBottom:14}}>
              ⚠️ {channel==='email'?'לא קיימת כתובת מייל עבור איש קשר זה':'לא קיים מספר טלפון עבור איש קשר זה'}
            </div>
          )}

          {sent&&(
            <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px',fontSize:14,color:'#15803d',fontWeight:700,marginBottom:14,textAlign:'center'}}>
              ✅ ההודעה נפתחה לשליחה!
            </div>
          )}

          <div style={{display:'flex',gap:10}}>
            <button onClick={onClose} style={{flex:1,padding:'11px 0',background:'white',border:'2px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer',color:'#374151'}}>
              ביטול
            </button>
            <button onClick={handleSend} disabled={!hasContact}
              style={{flex:2,padding:'11px 0',background:hasContact?'#e85d26':'#d1d5db',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:800,fontSize:15,cursor:hasContact?'pointer':'not-allowed',
                boxShadow:hasContact?'0 4px 16px rgba(232,93,38,0.3)':'none'}}>
              {channel==='email'?'📧 פתח במייל →':'💬 פתח ב-WhatsApp →'}

function ProgressRing({pct,size=110,stroke=10,color='#e85d26'}){
  const r=size/2-stroke;const circ=2*Math.PI*r;const offset=circ-(Math.min(pct,100)/100)*circ;
  return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:'stroke-dashoffset .8s ease'}}/>
  </svg>;
}

function AgreementUpload({form,setForm}){
  const [uploading,setUploading]=React.useState(false);
  const handleFile=async e=>{
    const file=e.target.files[0]; if(!file) return;
    setUploading(true);
    try{
      const ext=file.name.split('.').pop();
      const fname=`agreement-${form.id||('e'+Date.now())}-${Date.now()}.${ext}`;
      const uploadUrl=`${SB_URL}/storage/v1/object/job-images/${fname}`;
      const res=await fetch(uploadUrl,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},body:file});
      if(!res.ok){alert('שגיאה בהעלאת קובץ');return;}
      const publicUrl=`${SB_URL}/storage/v1/object/public/job-images/${fname}`;
      setForm(f=>({...f,agreementUrl:publicUrl,agreementName:file.name}));
    }catch(err){alert('שגיאה בהעלאת קובץ');console.warn(err);}
    finally{setUploading(false);}
  };
  return <label style={{display:'inline-flex',alignItems:'center',gap:8,cursor:uploading?'wait':'pointer',background:'white',border:'2px solid #333',borderRadius:4,padding:'8px 16px',fontSize:14,fontWeight:600,opacity:uploading?0.6:1}}>
    {uploading?'⏳ מעלה...':'📎 צרף הסכם השמה'}
    <input type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style={{display:'none'}} onChange={handleFile} disabled={uploading}/>
  </label>;
}

function EmployerJobCard({j,candidates,fmtNum,onCandClick}){
  const STATUSES=['השמה מוצלחת','ראיון נקבע','בתהליך','חדש','דחייה'];
  const SS={
    'השמה מוצלחת':{bg:'#f0fdf4',border:'#86efac',color:'#15803d',chip:'#dcfce7',icon:'🏅'},
    'ראיון נקבע':{bg:'#faf5ff',border:'#d8b4fe',color:'#7c3aed',chip:'#f3e8ff',icon:'📅'},
    'בתהליך':{bg:'#eff6ff',border:'#bfdbfe',color:'#1d4ed8',chip:'#dbeafe',icon:'⚙️'},
    'חדש':{bg:'#f8fafc',border:'#cbd5e1',color:'#475569',chip:'#f1f5f9',icon:'🟢'},
    'דחייה':{bg:'#fef2f2',border:'#fca5a5',color:'#dc2626',chip:'#fee2e2',icon:'❌'},
  };
  const [activeTab,setActiveTab]=React.useState(null);
  const jCands=candidates.filter(c=>(c.appliedJobs||[]).includes(j.id));
  const counts={};
  STATUSES.forEach(s=>{counts[s]=jCands.filter(c=>c.status===s).length;});
  const tabs=STATUSES.filter(s=>counts[s]>0);
  const shown=activeTab?jCands.filter(c=>c.status===activeTab):[];
  return <div style={{background:'white',borderRadius:12,padding:'14px 18px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',border:'1px solid #f0f0f0'}}>
    <div style={{marginBottom:tabs.length>0?10:0}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <span style={{fontWeight:800,fontSize:15,color:'#111827',flex:1}}>{j.publishTitle||j.title}</span>
        {j.salary&&<span style={{fontSize:12,background:'#f1f5f9',color:'#475569',borderRadius:6,padding:'1px 7px',fontWeight:600}}>{'\u20aa'+fmtNum(j.salary)}</span>}
      </div>
      <div style={{fontSize:12,color:'#94a3b8',fontWeight:500}}>{j.jobNumber}{j.location?' · 📍'+j.location:''}</div>
    </div>
    {tabs.length>0&&<div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
      {tabs.map(s=>{
        const st=SS[s]||{bg:'#f8fafc',border:'#e2e8f0',color:'#64748b',chip:'#f1f5f9',icon:'●'};
        const active=activeTab===s;
        return <button key={s} onClick={()=>setActiveTab(active?null:s)}
          style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',
            background:active?st.bg:'white',border:'1.5px solid '+(active?st.border:'#e2e8f0'),
            borderRadius:20,cursor:'pointer',fontFamily:'Heebo',fontSize:12,fontWeight:700,
            color:active?st.color:'#64748b',transition:'all .15s',
            boxShadow:active?'0 1px 4px rgba(0,0,0,0.08)':'none'}}>
          <span style={{fontSize:13}}>{st.icon}</span>
          <span>{s}</span>
          <span style={{background:active?st.chip:'#f1f5f9',color:active?st.color:'#94a3b8',borderRadius:10,padding:'0 6px',fontSize:11,fontWeight:800,minWidth:18,textAlign:'center'}}>{counts[s]}</span>
        </button>;
      })}
    </div>}
    {activeTab&&shown.length>0&&<div style={{borderTop:'1px solid #f3f4f6',paddingTop:10,marginTop:10,display:'flex',flexWrap:'wrap',gap:6}}>
      {shown.map(c=>{
        const st=SS[activeTab]||{bg:'#f8fafc',border:'#e2e8f0',color:'#64748b'};
        const pd=activeTab==='השמה מוצלחת'&&c.placedAt?new Date(c.placedAt).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}):'';
        return <button key={c.id} onClick={()=>onCandClick(c)}
          style={{display:'flex',alignItems:'center',gap:7,padding:'5px 12px 5px 8px',
            background:st.bg,border:'1.5px solid '+st.border,borderRadius:20,
            cursor:'pointer',fontFamily:'Heebo',fontWeight:700,fontSize:13,color:st.color,
            boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}
          onMouseEnter={e=>e.currentTarget.style.filter='brightness(0.96)'}
          onMouseLeave={e=>e.currentTarget.style.filter=''}>
          <Avatar name={c.name} size={22}/>
          <span>{c.name}</span>
          {pd&&<span style={{fontSize:11,color:'#94a3b8',fontWeight:400}}>{pd}</span>}
        </button>;
      })}
    </div>}
  </div>;
}

                    <div style={{padding:'8px 12px',display:'flex',flexDirection:'column',gap:8}}>

          </div>
        </div>
      </div>;

})

// ── IMAGE UPLOAD ──────────────────────────────────────────────────────────────
function ImgUpload({form,setForm}){
  const [uploading,setUploading]=React.useState(false);
  const compressImage=f=>new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(f);
    img.onload=()=>{
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob=>blob?res(blob):rej(new Error('compress failed')),'image/jpeg',0.82);
    };
    img.onerror=rej;
    img.src=url;
  });
  const handleImageChange=async e=>{
    const f=e.target.files[0];if(!f)return;
    setUploading(true);
    try{
      const jobId=form.id||('j'+Date.now());
      const filename=`job-${jobId}-${Date.now()}.jpg`;
      const compressed=await compressImage(f);
      const uploadUrl=`${SB_URL}/storage/v1/object/job-images/${filename}`;
      const res=await fetch(uploadUrl,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'image/jpeg','x-upsert':'true'},body:compressed});
      if(!res.ok){const e=await res.text();alert('שגיאה בהעלאת תמונה');console.warn(e);return;}
      const publicUrl=`${SB_URL}/storage/v1/object/public/job-images/${filename}`;
      setForm(fm=>({...fm,image:publicUrl,imageUrl:publicUrl}));
    }catch(err){alert('שגיאה בהעלאת תמונה');console.warn(err);}
    finally{setUploading(false);}
  };
  const previewUrl=form.imageUrl||form.image||'';
  return <div style={{marginBottom:16}}>
    <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>תמונה למשרה</div>
    <div style={{display:'flex',gap:12,alignItems:'center'}}>
      {previewUrl?<div style={{position:'relative'}}>
        <img src={previewUrl} alt="" style={{width:120,height:80,objectFit:'cover',border:'2px solid #333',borderRadius:3}}/>
        <button onClick={()=>setForm(f=>({...f,image:'',imageUrl:''}))} style={{position:'absolute',top:-8,left:-8,background:ACC,color:'white',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:12}}>✕</button>
      </div>:<div className="sbox" style={{width:120,height:80,background:'#f0f2f5',display:'flex',alignItems:'center',justifyContent:'center',color:MUT,fontSize:13}}>אין תמונה</div>}
      <label style={{cursor:uploading?'wait':'pointer',background:'white',border:'2px solid #333',borderRadius:3,padding:'7px 14px',fontSize:14,fontWeight:600,opacity:uploading?0.6:1}}>
        {uploading?'⏳ מעלה...':'📸 העלה תמונה'}
        <input type="file" accept="image/*" style={{display:'none'}} onChange={handleImageChange} disabled={uploading}/>
      </label>
    </div>
  </div>;
}

// ── Job quota helpers (global scope) ──────────────────────────────────────
function placedCount(jobId,candidates){return(candidates||[]).filter(c=>(c.appliedJobs||[]).includes(jobId)&&c.status==='\u05d4\u05e9\u05de\u05d4 \u05de\u05d5\u05e6\u05dc\u05d7\u05ea').length;}
function jobQuota(j){return Math.max(1,parseInt(j?.hirQuota)||1);}

  const [locationFilter,setLocationFilter]=React.useState('הכל');
  const [showFilters,setShowFilters]=React.useState(false);
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({});
  const [detail,setDetail]=React.useState(null);
  const [detailForm,setDetailForm]=React.useState(null);
  const [detailDirty,setDetailDirty]=React.useState(false);
  const [candDetail,setCandDetail]=React.useState(null);
  const [pubJob,setPubJob]=React.useState(null);
  const [confirmDel,setConfirmDel]=React.useState(null);
  const openJobDetail=(j)=>{setDetail(j);setDetailForm({...j});setDetailDirty(false);};
  const jfSet=(field,val)=>{setDetailForm(f=>({...f,[field]:val}));setDetailDirty(true);};
  const saveJobDetail=async()=>{
    const updated={...detailForm};
    const placed=placedCount(updated.id,data.candidates);
    const quota=jobQuota(updated);
    if(quota>0){
      if(placed>=quota) updated.status='השמה מוצלחת';
      else if(placed>0&&updated.status!=='פתוח'&&updated.status!=='בתהליך'&&updated.status!=='ממתין') updated.status='גיוס חלקי';
    }
    setData(d=>({...d,jobs:d.jobs.map(j=>j.id===updated.id?updated:j),activityLog:[{id:'a'+Date.now(),type:'job',action:'updated',label:updated.publishTitle||updated.title,timestamp:new Date().toISOString()},...(d.activityLog||[])].slice(0,100)}));
    setDetail(updated);setDetailDirty(false);
  };
  const allDomainsJ=['הכל',...new Set(data.jobs.map(j=>j.domain).filter(Boolean))].sort((a,b)=>a==='הכל'?-1:b==='הכל'?1:a.localeCompare(b,'he'));
  const allEmps=['הכל',...new Set(data.jobs.map(j=>{const e=data.employers.find(x=>x.id===j.employerId);return e?.name||null;}).filter(Boolean))].sort((a,b)=>a==='הכל'?-1:b==='הכל'?1:a.localeCompare(b,'he'));
  const allTypes=['הכל',...new Set(data.jobs.map(j=>j.type).filter(Boolean))];
  const allLocations=['הכל',...new Set(data.jobs.map(j=>j.location).filter(Boolean))].sort((a,b)=>a==='הכל'?-1:b==='הכל'?1:a.localeCompare(b,'he'));
  const [roleFilterJ,setRoleFilterJ]=React.useState('הכל');
  const [salaryMin,setSalaryMin]=React.useState('');
  const [salaryMax,setSalaryMax]=React.useState('');
  const [aiFields]=React.useState({});
  const allRolesJ=React.useMemo(()=>{
    const base=domainFilter==='הכל'?(data.jobDomains||[]).flatMap(d=>d.roles||[]):(data.jobDomains||[]).find(d=>d.name===domainFilter)?.roles||[];
    return ['הכל',...new Set([...base,...data.jobs.filter(j=>domainFilter==='הכל'||j.domain===domainFilter).map(j=>j.role).filter(Boolean)])];
  },[domainFilter,data]);
  const parseSalaryNum=sal=>{const n=parseFloat((sal||'').replace(/[^0-9.]/g,''));return isNaN(n)?null:n;};
  const activeFiltersJ=[stFilter!=='הכל',domainFilter!=='הכל',empFilter!=='הכל',typeFilter!=='הכל',locationFilter!=='הכל',roleFilterJ!=='הכל',!!salaryMin,!!salaryMax].filter(Boolean).length;
  const resetFiltersJ=()=>{setStFilter('הכל');setDomainFilter('הכל');setEmpFilter('הכל');setTypeFilter('הכל');setLocationFilter('הכל');setRoleFilterJ('הכל');setSalaryMin('');setSalaryMax('');setSearch('');};

  const filtered=data.jobs.filter(j=>{
    const emp=data.employers.find(e=>e.id===j.employerId);
    const s=search.trim().toLowerCase();
    const matchSearch=!s||(j.title||'').toLowerCase().includes(s)||(j.publishTitle||'').toLowerCase().includes(s)||(emp?.name||'').toLowerCase().includes(s)||(j.location||'').toLowerCase().includes(s)||(j.domain||'').toLowerCase().includes(s)||(j.role||'').toLowerCase().includes(s);
    const matchStatus=stFilter==='הכל'||j.status===stFilter;
    const matchDomain=domainFilter==='הכל'||j.domain===domainFilter;
    const matchEmp=empFilter==='הכל'||(emp?.name||'')=== empFilter;
    const matchType=typeFilter==='הכל'||j.type===typeFilter;
    const matchLocation=locationFilter==='הכל'||j.location===locationFilter;
    const matchRole=roleFilterJ==='הכל'||j.role===roleFilterJ;
    const salNum=parseSalaryNum(j.salary);
    const minOk=!salaryMin||salNum===null||(salNum>=(parseSalaryNum(salaryMin)||0));
    const maxOk=!salaryMax||salNum===null||(salNum<=(parseSalaryNum(salaryMax)||Infinity));
    return matchSearch&&matchStatus&&matchDomain&&matchEmp&&matchType&&matchLocation&&matchRole&&minOk&&maxOk;
  });

  const nextNum=()=>{
    const nums=data.jobs.map(j=>parseInt((j.jobNumber||'').replace('TG-',''))||0);
    return 'TG-'+String(Math.max(0,...nums)+1).padStart(3,'0');

  const getUrl=job=>{
    return `https://jobs.topgroup4u.com/job/${job.id}`;

  const openAdd=()=>{setForm({jobNumber:nextNum(),title:'',publishTitle:'',domain:'',role:'',employerId:data.employers[0]?.id||'',type:'משרה מלאה',location:'',salary:'',commissionPct:'',status:data.defaults?.jobStatus||'פתוח',deadline:'',description:'',requirements:'',benefits:'',image:'',imageUrl:'',fee:'',reqExperience:'',reqEducation:'',reqLicense:'',reqMobility:'',reqLangHebrew:'',reqLangEnglish:'',reqLangArabic:'',reqLangRussian:'',reqGender:''});setModal('add');};
  const openEdit=j=>{setForm({...j});setModal('edit');};
  const save=()=>{
    const savedForm={...form, image: form.imageUrl||''};
    const isAdd=modal==='add';
    const entry=mkLog('job',isAdd?'added':'updated',savedForm.publishTitle||savedForm.title||savedForm.jobNumber);

    } else {
      setData(d=>({...d,jobs:d.jobs.map(j=>j.id===savedForm.id?withStatusChange(j,savedForm):j),activityLog:[entry,...(d.activityLog||[])].slice(0,50)}));

      if(detail?.id===savedForm.id) setDetail(withStatusChange(detail,savedForm));
    }
    setModal(null);
  };
  const del=id=>{
    const job=data.jobs.find(j=>j.id===id);
    setConfirmDel({id,name:job?.publishTitle||job?.title||job?.jobNumber||id});
  };
  const doDelJob=()=>{
    if(!confirmDel)return;
    const {id}=confirmDel;
    const job=data.jobs.find(j=>j.id===id);
    setData(d=>({...d,jobs:d.jobs.filter(j=>j.id!==id),activityLog:[mkLog('job','deleted',job?.publishTitle||job?.title||id),...(d.activityLog||[])].slice(0,50)}));
    setConfirmDel(null);
    if(detail?.id===id)setDetail(null);
  };


  return <div style={{padding:28}} className="mobile-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h1 style={{fontSize:28,fontWeight:800}}>📋 משרות</h1>

          🔽 סינון מתקדם
          {activeFiltersJ>0&&<span style={{background:ACC,color:'white',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:800}}>{activeFiltersJ}</span>}
        </button>
        {(search||activeFiltersJ>0)&&<button onClick={resetFiltersJ} style={{padding:'8px 12px',border:'2px solid #e85d26',borderRadius:3,background:'#fde8dc',color:ACC,fontFamily:'Heebo',fontSize:13,fontWeight:700,cursor:'pointer'}}>✕ נקה</button>}
        <span style={{marginRight:'auto',fontSize:13,color:'#888',fontWeight:600}}>{filtered.length} משרות</span>

function CvZoomViewer({url}){
  const [zoom,setZoom]=React.useState(1);
  const [pos,setPos]=React.useState({x:0,y:0});
  const [dragging,setDragging]=React.useState(false);
  const dragStart=React.useRef(null);
  const containerRef=React.useRef(null);

  // גלגל = זום
  const onWheel=React.useCallback((e)=>{
    e.preventDefault();
    const delta=e.deltaY>0?-0.12:0.12;
    setZoom(z=>Math.min(4,Math.max(0.4,parseFloat((z+delta).toFixed(2)))));
  },[]);

  React.useEffect(()=>{
    const el=containerRef.current;
    if(!el) return;
    el.addEventListener('wheel',onWheel,{passive:false});
    return()=>el.removeEventListener('wheel',onWheel);
  },[onWheel]);

  // גרירה עם כפתור ימין
  const onMouseDown=(e)=>{
    if(e.button!==2) return;
    e.preventDefault();
    setDragging(true);
    dragStart.current={mx:e.clientX,my:e.clientY,px:pos.x,py:pos.y};
  };
  const onMouseMove=(e)=>{
    if(!dragging||!dragStart.current) return;
    setPos({x:dragStart.current.px+(e.clientX-dragStart.current.mx),y:dragStart.current.py+(e.clientY-dragStart.current.my)});
  };
  const onMouseUp=()=>setDragging(false);
  const onContextMenu=(e)=>e.preventDefault();

  return <div ref={containerRef}
    onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp} onContextMenu={onContextMenu}
    style={{overflow:'hidden',borderRadius:8,border:'1px solid #e5e7eb',height:'calc(94vh - 210px)',minHeight:480,position:'relative',background:'#525659',cursor:dragging?'grabbing':'default',userSelect:'none'}}>

    {/* PDF */}
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-start',justifyContent:'center',overflow:'hidden'}}>
      <div style={{transform:`translate(${pos.x}px,${pos.y}px) scale(${zoom})`,transformOrigin:'top center',transition:dragging?'none':'transform .1s',willChange:'transform'}}>
        <iframe src={url+'#toolbar=0&navpanes=0&scrollbar=0&view=FitH'} style={{width:540,height:'calc(94vh - 180px)',minHeight:520,border:'none',display:'block',pointerEvents:'none'}} title="CV"/>
      </div>
    </div>

    {/* Overlay שקוף לתפיסת אירועים */}
    <div style={{position:'absolute',inset:0,zIndex:5,background:'transparent'}}
      onWheel={onWheel}
      onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp} onContextMenu={onContextMenu}/>

    {/* פס כלים */}
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6,padding:'5px 12px',background:'rgba(0,0,0,0.6)',position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',borderRadius:20,zIndex:10,backdropFilter:'blur(4px)'}}>
      <button onClick={()=>setZoom(z=>Math.max(0.4,parseFloat((z-0.15).toFixed(2))))}
        style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',width:28,height:28,borderRadius:14,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
      <span style={{color:'white',fontSize:12,fontWeight:700,minWidth:42,textAlign:'center'}}>{Math.round(zoom*100)}%</span>
      <button onClick={()=>setZoom(z=>Math.min(4,parseFloat((z+0.15).toFixed(2))))}
        style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',width:28,height:28,borderRadius:14,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
      <button onClick={()=>{setZoom(1);setPos({x:0,y:0});}}
        style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',borderRadius:10,cursor:'pointer',fontSize:11,padding:'3px 10px',fontFamily:'Heebo',marginRight:4}}>איפוס</button>
      <span style={{color:'rgba(255,255,255,0.5)',fontSize:10,marginRight:4}}>כפתור ימין = הזזה</span>
    </div>
  </div>;
}

function Candidates({data,setData}){
  const [search,setSearch]=React.useState('');
  const [stFilter,setStFilter]=React.useState('הכל');
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({});
  const [detail,setDetail]=React.useState(null);
  const [detailForm,setDetailForm]=React.useState(null); // editable copy of detail
  const [msgTarget,setMsgTarget]=React.useState(null);
  const [jobSearch,setJobSearch]=React.useState('');
  const [showJobPicker,setShowJobPicker]=React.useState(false);
  const [cvDrag,setCvDrag]=React.useState(false);
  const [cvParsing,setCvParsing]=React.useState(false);
  const [aiFields,setAiFields]=React.useState({});
  const [dupWarn,setDupWarn]=React.useState(null);
  const [cvBlobUrl,setCvBlobUrl]=React.useState('');
  const [cvPreviewHtml,setCvPreviewHtml]=React.useState('');

  const checkDupId=(idNum,currentId)=>{
    if(!idNum||!idNum.trim())return null;
    return data.candidates.find(c=>c.idNumber&&c.idNumber.trim()===idNum.trim()&&c.id!==currentId)||null;
  };

  // ── CV Parsing functions ──
  const extractTextFromFile=async(file)=>{
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='pdf'){
      const pdfjsLib=window.pdfjsLib;
      if(!pdfjsLib){console.warn('PDF.js not loaded');return '';}
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
      let text='';
      for(let i=1;i<=Math.min(pdf.numPages,5);i++){
        const page=await pdf.getPage(i);
        const tc=await page.getTextContent();
        text+=tc.items.map(s=>s.str).join(' ')+'\n';
      }
      return text;
    } else if(ext==='docx'||ext==='doc'){
      const ab=await file.arrayBuffer();
      const result=await mammoth.extractRawText({arrayBuffer:ab});
      return result.value;
    } else if(['jpg','jpeg','png','webp','gif'].includes(ext)){
      return new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=e=>resolve({type:'image',base64:e.target.result.split(',')[1],mediaType:file.type||'image/jpeg'});
        reader.readAsDataURL(file);
      });
    }
    return '';
  };

  const parseWithAI=async(input)=>{
    const domains=(data.jobDomains||[]).map(d=>d.name).join(', ');
    const prompt='אתה מנתח קורות חיים. חלץ את המידע הבא מהטקסט ותחזיר JSON בלבד ללא הסבר:\n{"name":"שם מלא","idNumber":"תעודת זהות מספרים בלבד","phone":"טלפון","email":"אימייל","city":"עיר","birthDate":"YYYY-MM-DD","gender":"זכר/נקבה/אחר","maritalStatus":"רווק/ה/נשוי/אה/גרוש/ה/אלמן/ה","drivingLicense":"יש/אין","education":"השכלה","experience":"ניסיון","domain":"תחום מתוך: '+domains+'","role":"תפקיד","minSalary":"שכר מינימום מספר בלבד","notes":"הערות","langHebrew":"שליטה בעברית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר","langEnglish":"שליטה באנגלית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר","langArabic":"שליטה בערבית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר","langRussian":"שליטה ברוסית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר","langAmharic":"שליטה באמהרית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר","langSpanish":"שליטה בספרדית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר","langFrench":"שליטה בצרפתית: שפת אם / טובה מאוד / טובה / בסיסית — ריק אם לא מוזכר"}\nהוראות שפות: חלץ רק שפות שמוזכרות במפורש. אל תניח עברית כשפת אם אלא אם כתוב. אם שדה לא נמצא השאר ריק.';
    const isImage=typeof input==='object'&&input.type==='image';
    const messageContent=isImage
      ?[{type:'image',source:{type:'base64',media_type:input.mediaType,data:input.base64}},{type:'text',text:prompt+'\nנתח את תמונת קורות החיים.'}]
      :prompt+'\n טקסט:\n'+input.slice(0,4000);
    const payload={model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:messageContent}]};
    let res;
    if(CLAUDE_API_KEY){
      res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':CLAUDE_API_KEY,'anthropic-version':'2023-06-01'},
        body:JSON.stringify(payload)
      });
    } else {
      res=await fetch('/.netlify/functions/claude-proxy',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
    }
    if(!res.ok){const err=await res.text();throw new Error('API '+res.status+': '+err.slice(0,200));}
    const data2=await res.json();
    const raw=data2?.content?.[0]?.text||'{}';
    try{return JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch{return {};}
  };

  const applyParsedFields=(parsed)=>{

    const fields=['name','idNumber','phone','email','city','birthDate','gender','maritalStatus','drivingLicense','education','experience','domain','role','minSalary','notes','langHebrew','langEnglish','langArabic','langRussian','langAmharic','langSpanish','langFrench'];

        {detail&&<div style={{position:'fixed',top:60,bottom:0,left:0,right:0,background:'#f4f6f8',zIndex:999,display:'flex',flexDirection:'column',overflow:'hidden'}}>

                          <button type="button"

function DomainsTab({data,setData}){
  const [sel,setSel]=React.useState(null);
  const [newD,setNewD]=React.useState('');
  const [newR,setNewR]=React.useState('');
  const [addD,setAddD]=React.useState(false);
  const [addR,setAddR]=React.useState(false);
  const domains=data.jobDomains||[];
  const active=domains.find(d=>d.id===sel);
  const addDomain=()=>{if(!newD.trim())return;const d={id:'d'+Date.now(),name:newD.trim(),roles:[]};setData(x=>({...x,jobDomains:[...x.jobDomains,d]}));setNewD('');setAddD(false);setSel(d.id);};
  const delDomain=id=>{if(!confirm('למחוק תחום?'))return;setData(x=>({...x,jobDomains:x.jobDomains.filter(d=>d.id!==id)}));if(sel===id)setSel(null);};
  const addRole=()=>{if(!newR.trim()||!sel)return;setData(x=>({...x,jobDomains:x.jobDomains.map(d=>d.id===sel?{...d,roles:[...d.roles,newR.trim()]}:d)}));setNewR('');setAddR(false);};
  const delRole=(did,r)=>setData(x=>({...x,jobDomains:x.jobDomains.map(d=>d.id===did?{...d,roles:d.roles.filter(x=>x!==r)}:d)}));
  return <div style={{display:'grid',gridTemplateColumns:'240px 1fr',gap:20,maxWidth:740}} className="mobile-grid-1">
    <div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:10}}>תחומים</div>
      <div className="sbox" style={{background:'#fff',overflow:'hidden'}}>
        {domains.map(d=><div key={d.id} onClick={()=>setSel(d.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',cursor:'pointer',borderBottom:'1px dashed #ddd',background:sel===d.id?'#fde8dc':'white',borderRight:sel===d.id?`3px solid ${ACC}`:'3px solid transparent'}}>
          <span style={{fontSize:15}}>{d.name} <span style={{fontSize:12,color:MUT}}>({d.roles.length})</span></span>
          <button onClick={e=>{e.stopPropagation();delDomain(d.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'#bbb',fontSize:14}}>✕</button>
        </div>)}
        {!domains.length&&<div style={{padding:14,color:MUT,fontSize:13}}>אין תחומים</div>}
      </div>
      {addD?<div className="sbox" style={{background:'#fff',padding:10,marginTop:10}}>
        <input autoFocus value={newD} onChange={e=>setNewD(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addDomain();if(e.key==='Escape')setAddD(false);}} placeholder="שם התחום..." style={{width:'100%',border:'2px solid #333',borderRadius:3,padding:'6px 10px',fontFamily:'Heebo',fontSize:14,marginBottom:8}}/>
        <div style={{display:'flex',gap:6}}><Btn variant="primary" onClick={addDomain} style={{flex:1,fontSize:13}}>הוסף</Btn><Btn onClick={()=>setAddD(false)} style={{fontSize:13}}>ביטול</Btn></div>
      </div>:<Btn onClick={()=>setAddD(true)} style={{marginTop:10,width:'100%',fontSize:14}}>+ הוסף תחום</Btn>}
    </div>
    <div>
      {active?<>
        <div style={{fontSize:17,fontWeight:700,marginBottom:10}}>תפקידים: <span style={{color:ACC}}>{active.name}</span></div>
        <div className="sbox" style={{background:'#fff',padding:14,minHeight:200}}>
          {!active.roles.length&&<div style={{color:MUT,fontSize:13,marginBottom:10}}>אין תפקידים – הוסף ראשון</div>}
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
            {active.roles.map(r=><div key={r} style={{display:'flex',alignItems:'center',gap:6,background:'#f0ede6',border:'2px solid #333',borderRadius:3,padding:'5px 12px'}}>
              <span style={{fontSize:14}}>{r}</span>
              <button onClick={()=>delRole(active.id,r)} style={{background:'none',border:'none',cursor:'pointer',color:'#999',fontSize:14}}>✕</button>
            </div>)}
          </div>
          {addR?<div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input autoFocus value={newR} onChange={e=>setNewR(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addRole();if(e.key==='Escape')setAddR(false);}} placeholder="שם התפקיד..." style={{flex:1,border:'2px solid #333',borderRadius:3,padding:'7px 10px',fontFamily:'Heebo',fontSize:14}}/>
            <Btn variant="primary" onClick={addRole} style={{fontSize:13}}>הוסף</Btn>
            <Btn onClick={()=>setAddR(false)} style={{fontSize:13}}>ביטול</Btn>
          </div>:<Btn onClick={()=>setAddR(true)} style={{fontSize:14}}>+ הוסף תפקיד</Btn>}
        </div>
      </>:<div className="sbox" style={{background:'#fff',padding:40,textAlign:'center'}}><div style={{fontSize:36,marginBottom:12}}>👈</div><div style={{fontSize:17,color:MUT}}>בחר תחום לניהול תפקידים</div></div>}
    </div>
  </div>;
}

const PRIORITY_COLORS={'גבוה':'#fde8dc','בינוני':'#fff3cd','נמוך':'#f3f4f6'};
const PRIORITY_TEXT={'גבוה':'#c94d1a','בינוני':'#92400e','נמוך':'#6b7280'};
const STATUS_COLORS={'פתוח':'#eff6ff','בתהליך':'#fff3cd','הושלם':'#f0fdf4'};
const STATUS_TEXT={'פתוח':'#1d4ed8','בתהליך':'#92400e','הושלם':'#15803d'};

function SearchSelect({value,onChange,options,placeholder,disabled,inputStyle}){
  const [search,setSearch]=React.useState('');
  const [open,setOpen]=React.useState(false);
  const getVal=o=>typeof o==='object'&&o!==null?o.value:o;
  const getLabel=o=>typeof o==='object'&&o!==null?o.label:o;
  const found=(options||[]).find(o=>getVal(o)===value);
  const displayVal=value?(found?getLabel(found):value):'';
  const term=search.trim().toLowerCase();
  const filtered=React.useMemo(()=>(options||[]).filter(o=>!term||String(getLabel(o)).toLowerCase().includes(term)),[options,term]);
  const IS={...inputStyle,paddingLeft:32,textAlign:'right',direction:'rtl',cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.45:1};
  return <div style={{position:'relative'}}>
    <input disabled={disabled} value={open?search:displayVal}
      onChange={e=>setSearch(e.target.value)}
      onFocus={()=>{setSearch('');setOpen(true);}}
      onBlur={()=>setTimeout(()=>{setOpen(false);setSearch('');},200)}
      placeholder={placeholder||'-- בחר --'} style={IS}/>
    <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#64748b',fontSize:11}}>▼</span>
    {open&&!disabled&&<div style={{position:'absolute',top:'100%',right:0,left:0,background:'white',border:'2px solid #94a3b8',borderRadius:10,zIndex:500,maxHeight:250,overflowY:'auto',boxShadow:'0 8px 24px rgba(0,0,0,0.13)',marginTop:3}}>
      <div onMouseDown={()=>{onChange('');setSearch('');setOpen(false);}} className="dd-item dd-placeholder" onMouseEnter={e=>e.currentTarget.style.background='#f3f4f6'} onMouseLeave={e=>e.currentTarget.style.background=''}>{placeholder||'-- הכל --'}</div>
      {filtered.length===0&&<div className="dd-item dd-empty">לא נמצאו תוצאות</div>}
      {filtered.map(o=><div key={getVal(o)} onMouseDown={()=>{onChange(getVal(o));setSearch('');setOpen(false);}}
        className={`dd-item${value===getVal(o)?' dd-selected':''}`} onMouseEnter={e=>e.currentTarget.style.background=value===getVal(o)?'#fde8dc':'#f3f4f6'} onMouseLeave={e=>e.currentTarget.style.background=value===getVal(o)?'#fff5f0':''}>{getLabel(o)}</div>)}
    </div>}
  </div>;
}

  const isValid=form.title.trim();
  const IS={width:'100%',padding:'10px 14px',border:'2px solid #94a3b8',borderRadius:8,fontFamily:'Heebo',fontSize:14,outline:'none',boxSizing:'border-box',color:'#111'};
  const onF=e=>{e.target.style.borderColor='#1a3a6b';e.target.style.boxShadow='0 0 0 3px rgba(26,58,107,0.1)';};
  const onB=e=>{e.target.style.borderColor='#94a3b8';e.target.style.boxShadow='none';};
  const Lbl=({t})=><label style={{display:'block',fontSize:12,fontWeight:700,marginBottom:5,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.4px'}}>{t}</label>;
  const SS_IS={...IS,paddingLeft:32,paddingRight:14};
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
    <div style={{background:'white',borderRadius:16,width:'100%',maxWidth:900,minHeight:600,boxShadow:'0 24px 80px rgba(0,0,0,0.3)',overflow:'visible',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
      {/* Header */}
      <div style={{background:'#1a3a6b',padding:'16px 24px',borderRadius:'16px 16px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{color:'white',fontWeight:800,fontSize:17}}>{task?.id?'✏️ עריכת משימה':'+ משימה חדשה'}</div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',width:32,height:32,borderRadius:16,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      {/* Body */}
      <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:18,flex:1,overflowY:'auto'}}>

        {/* Row 1: כותרת - full width */}
        <div>
          <Lbl t="כותרת *"/>
          <input value={form.title} onChange={e=>set('title')(e.target.value)} onFocus={onF} onBlur={onB}
            placeholder="תיאור קצר של המשימה..." style={IS}/>
        </div>

        {/* Row 2: מעסיק + מועמד */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div style={{position:'relative',zIndex:100}}>
            <Lbl t="שייך למעסיק"/>
            <SearchSelect value={form.employerId||''} onChange={v=>set('employerId')(v)}
              options={[{value:'',label:'— ללא שיוך —'},...data.employers.map(e=>({value:e.id,label:e.name}))]}
              placeholder="— ללא שיוך —" inputStyle={SS_IS}/>
          </div>
          <div style={{position:'relative',zIndex:100}}>
            <Lbl t="שייך למועמד"/>
            <SearchSelect value={form.candidateId||''} onChange={v=>set('candidateId')(v)}
              options={[{value:'',label:'— ללא שיוך —'},...data.candidates.map(c=>({value:c.id,label:c.name}))]}
              placeholder="— ללא שיוך —" inputStyle={SS_IS}/>
          </div>
        </div>

        {/* Row 3: תאריך + עדיפות + סטטוס */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
          <div>
            <Lbl t="תאריך יעד"/>
            <input type="date" value={form.dueDate||''} onChange={e=>set('dueDate')(e.target.value)} onFocus={onF} onBlur={onB} style={IS}/>
          </div>
          <div>
            <Lbl t="עדיפות"/>
            <select value={form.priority} onChange={e=>set('priority')(e.target.value)} onFocus={onF} onBlur={onB} style={{...IS,cursor:'pointer'}}>
              {['גבוה','בינוני','נמוך'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <Lbl t="סטטוס"/>
            <select value={form.status} onChange={e=>set('status')(e.target.value)} onFocus={onF} onBlur={onB} style={{...IS,cursor:'pointer'}}>
              {['פתוח','בתהליך','הושלם'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>

        {/* Row 4: תיאור - full width */}
        <div>
          <Lbl t="תיאור"/>

            style={{...IS,minHeight:120,resize:'vertical'}}/>
        </div>
      </div>
      {/* Footer */}
      <div style={{padding:'16px 24px',borderTop:'1px solid #f3f4f6',display:'flex',gap:10,justifyContent:'flex-end',flexShrink:0}}>

        <button onClick={()=>isValid&&onSave(form)} disabled={!isValid}
          style={{padding:'10px 28px',background:isValid?'#e85d26':'#d1d5db',color:'white',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:800,fontSize:14,cursor:isValid?'pointer':'not-allowed'}}>שמירה</button>
      </div>
    </div>
  </div>;
}

function TaskCard({t,data,onEdit,onDel,draggable,onDragStart}){
  const cand=t.candidateId?data.candidates.find(c=>c.id===t.candidateId):null;
  const emp=t.employerId?data.employers.find(e=>e.id===t.employerId):null;
  const done=t.status==='הושלם';
  const due=(()=>{if(!t.dueDate)return null;const date=new Date(t.dueDate);const today=new Date();today.setHours(0,0,0,0);const diff=Math.ceil((date-today)/(1000*60*60*24));if(diff<0)return{text:(Math.abs(diff)+' ימים באיחור'),color:'#dc2626'};if(diff===0)return{text:'היום',color:'#e85d26'};if(diff===1)return{text:'מחר',color:'#f59e0b'};return{text:date.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}),color:'#6b7280'};})();
  return <div draggable={draggable} onDragStart={onDragStart}
    style={{background:'white',borderRadius:12,padding:'14px 16px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',border:'1.5px solid #f0ede6',marginBottom:10,cursor:draggable?'grab':'default',opacity:done?0.78:1}}
    onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.13)'}
    onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.07)'}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
      <div style={{fontWeight:700,fontSize:14,color:done?'#9ca3af':'#1a1a2e',textDecoration:done?'line-through':'none',flex:1,lineHeight:1.4}}>{t.title}</div>
      <div style={{display:'flex',gap:4,flexShrink:0,marginRight:8}}>
        <button onClick={()=>onEdit(t)} style={{padding:'3px 7px',background:'#f3f4f6',border:'none',borderRadius:5,cursor:'pointer',fontSize:12}}>✏️</button>
        <button onClick={()=>onDel(t.id)} style={{padding:'3px 7px',background:'#fde8dc',border:'none',borderRadius:5,cursor:'pointer',fontSize:12}}>🗑</button>
      </div>
    </div>
    {t.description&&<div style={{fontSize:12,color:'#6b7280',marginBottom:8,lineHeight:1.55}}>{t.description}</div>}
    <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20,background:PRIORITY_COLORS[t.priority]||'#f3f4f6',color:PRIORITY_TEXT[t.priority]||'#6b7280'}}>{t.priority}</span>
      {due&&<span style={{fontSize:11,fontWeight:600,color:due.color}}>📅 {due.text}</span>}
      {cand&&<span style={{fontSize:11,background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:5,padding:'1px 6px',color:'#c94d1a',fontWeight:600}}>👤 {cand.name}</span>}
      {emp&&<span style={{fontSize:11,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:5,padding:'1px 6px',color:'#1d4ed8',fontWeight:600}}>🏢 {emp.name}</span>}

}

function KanbanBoard({tasks,data,onEdit,onDel,onStatusChange,onAddInCol}){
  const cols=[{id:'פתוח',label:'פתוח',color:'#eff6ff',accent:'#3b82f6',icon:'📋'},{id:'בתהליך',label:'בתהליך',color:'#fffbeb',accent:'#f59e0b',icon:'⏳'},{id:'הושלם',label:'הושלם',color:'#f0fdf4',accent:'#16a34a',icon:'✅'}];
  const [dragOver,setDragOver]=React.useState(null);

        style={{background:isOver?col.color:'#f5f0e8',borderRadius:16,padding:'0 0 8px',border:'2px dashed '+(isOver?col.accent:'transparent'),transition:'border .15s',minHeight:200}}>

            <span style={{fontSize:16}}>{col.icon}</span>
            <span style={{fontWeight:800,fontSize:14,color:col.accent}}>{col.label}</span>
            <span style={{background:col.accent,color:'white',borderRadius:20,padding:'0 7px',fontSize:11,fontWeight:800}}>{colTasks.length}</span>
          </div>
          <button onClick={()=>onAddInCol(col.id)} style={{background:col.accent,color:'white',border:'none',borderRadius:8,width:26,height:26,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800}}>+</button>

        </div>
      </div>;
    })}
  </div>;
}

  const saveTask=form=>{
    const isNew=!form.id;

    setData(d=>({...d,tasks:isNew?[t,...(d.tasks||[])]:(d.tasks||[]).map(x=>x.id===t.id?t:x)}));
    setModal(null);
  };
  const delTask=id=>setData(d=>({...d,tasks:(d.tasks||[]).filter(t=>t.id!==id)}));

  const COLS=[
    {key:'פתוח',label:'פתוח',color:'#3b82f6',bg:'#eff6ff',icon:'\u{1F4CB}'},

  const filtered=tasks.filter(t=>{

  const TaskCard=({t})=>{

        <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:6}}>

          </div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <button onClick={()=>setModal(t)} style={{background:'none',border:'none',cursor:'pointer',padding:3,color:'#94a3b8',fontSize:13}}>✏️</button>
            <button onClick={()=>{if(confirm('למחוק?'))delTask(t.id);}} style={{background:'none',border:'none',cursor:'pointer',padding:3,color:'#fca5a5',fontSize:13}}>🗑</button>

        </div>

        </div>

  };

;

        <div style={{fontSize:13,color:'#6b7280'}}>{tasks.filter(t=>t.status==='פתוח').length} פתוח · {tasks.filter(t=>t.status==='בתהליך').length} בתהליך · {tasks.filter(t=>t.status==='הושלם').length} הושלם</div>

      <div style={{width:1,background:'#e5e7eb',margin:'0 4px'}}/>
      {['הכל','גבוה','בינוני','נמוך'].map(p=><button key={p} onClick={()=>setPriorityFilter(p)} style={{padding:'5px 14px',border:'2px solid',borderColor:priorityFilter===p?PRIO_COLOR[p]||'#1a3a6b':'#e5e7eb',borderRadius:20,background:priorityFilter===p?(PRIO_BG[p]||'#f3f4f6'):'white',color:priorityFilter===p?(PRIO_COLOR[p]||'#1a3a6b'):'#374151',fontFamily:'Heebo',fontWeight:600,fontSize:13,cursor:'pointer'}}>{p==='הכל'?'כל עדיפות':p}</button>)}

            <span style={{fontSize:12,background:PRIO_BG[t.priority]||'#f3f4f6',color:pc,borderRadius:6,padding:'2px 9px',fontWeight:700}}>{t.priority}</span>

    {modal&&<TaskModal task={modal?.id?modal:null} data={data} onSave={saveTask} onClose={()=>setModal(null)} initialStatus={modal?.initialStatus||'פתוח'}/>}
  </div>;
}

// ── CANDIDATE HUNTER ──────────────────────────────────────────────────────────
function CandidateHunter({data}){
  const [domain,setDomain]=React.useState('');
  const [role,setRole]=React.useState('');
  const [city,setCity]=React.useState('');
  const [freeText,setFreeText]=React.useState('');
  const [includeHired,setIncludeHired]=React.useState(true);
  const [selJob,setSelJob]=React.useState('');
  const [results,setResults]=React.useState(null);
  const [searched,setSearched]=React.useState(false);

  const allCities=[...new Set(data.candidates.map(c=>c.city).filter(Boolean))].sort();
  const allDomains=[...new Set([
    ...(data.jobDomains||[]).map(d=>d.name),
    ...data.candidates.map(c=>c.domain).filter(Boolean)
  ])].sort();
  const allRoles=[...new Set([
    ...(data.jobDomains||[]).flatMap(d=>d.roles||[]),
    ...data.candidates.map(c=>c.role).filter(Boolean)
  ])].filter(r=>!domain||(data.jobDomains||[]).find(d=>d.name===domain)?.roles.includes(r)||data.candidates.some(c=>c.domain===domain&&c.role===r)).sort();

  const loadFromJob=()=>{
    const job=data.jobs.find(j=>j.id===selJob);
    if(!job) return;
    setDomain(job.domain||'');
    setRole(job.role||'');
    setCity('');
    setFreeText('');
  };

  const score=(c,ft)=>{
    let s=0;
    const cDomain=(c.domain||'').trim().toLowerCase();
    const cRole=(c.role||'').trim().toLowerCase();
    const cCity=(c.city||'').trim().toLowerCase();
    const sDomain=domain.trim().toLowerCase();
    const sRole=role.trim().toLowerCase();
    const sCity=city.trim().toLowerCase();
    if(sDomain){if(cDomain===sDomain)s+=35;else if(cDomain.includes(sDomain)||sDomain.includes(cDomain))s+=15;}else{s+=35;}
    if(sRole){if(cRole===sRole)s+=25;else if(cRole.includes(sRole)||sRole.includes(cRole))s+=12;}else{s+=25;}
    if(sCity){if(cCity===sCity||cCity.includes(sCity)||sCity.includes(cCity))s+=20;}else{s+=20;}
    if(ft){const hay=[c.name,c.role,c.domain,c.city,c.experience,c.education,c.notes].join(' ').toLowerCase();if(hay.includes(ft.toLowerCase()))s+=15;}
    return s;
  };

  const hunt=()=>{
    const ft=freeText.trim();
    if(!domain&&!role&&!city&&!ft){alert('יש להזין לפחות קריטריון אחד');return;}
    const sDomain=domain.trim().toLowerCase();
    const sRole=role.trim().toLowerCase();
    const sCity=city.trim().toLowerCase();
    const candidates=data.candidates.filter(c=>{
      if(!includeHired && c.status==='השמה מוצלחת') return false;
      if(sDomain){const cd=(c.domain||'').trim().toLowerCase();if(!cd.includes(sDomain)&&!sDomain.includes(cd))return false;}
      if(sRole){const cr=(c.role||'').trim().toLowerCase();if(!cr.includes(sRole)&&!sRole.includes(cr))return false;}
      if(sCity){const cc=(c.city||'').trim().toLowerCase();if(!cc.includes(sCity)&&!sCity.includes(cc))return false;}
      if(ft){const hay=[c.name,c.role,c.domain,c.city,c.experience,c.education,c.notes].join(' ').toLowerCase();if(!hay.includes(ft.toLowerCase()))return false;}
      return true;
    });
    const scored=candidates.map(c=>({...c,_score:score(c,ft)})).sort((a,b)=>b._score-a._score);
    setResults(scored);
    setSearched(true);
  };

  const reset=()=>{setDomain('');setRole('');setCity('');setFreeText('');setSelJob('');setResults(null);setSearched(false);};

  const tier=(s)=>s>=70?'high':s>=40?'mid':'low';
  const tierLabel={high:{label:'התאמה גבוהה',color:'#16a34a',bg:'#f0fdf4',border:'#86efac'},mid:{label:'התאמה חלקית',color:'#d97706',bg:'#fffbeb',border:'#fcd34d'},low:{label:'התאמה חלשה',color:'#6b7280',bg:'#f9fafb',border:'#e5e7eb'}};

  const high=results?results.filter(c=>tier(c._score)==='high'):[];
  const mid=results?results.filter(c=>tier(c._score)==='mid'):[];

  const [msgTarget,setMsgTarget]=React.useState(null);

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:9,border:'2px solid #94a3b8',background:'white',color:'#111827',fontFamily:'Heebo',fontSize:15,outline:'none',transition:'border-color .15s'};
  const labelStyle={fontSize:15,color:'#000000',fontWeight:800,marginBottom:7,display:'block'};

  return <div style={{padding:28,background:'#f1f5f9',minHeight:'calc(100vh - 60px)'}} className="mobile-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h1 style={{fontSize:28,fontWeight:800,color:'#111827'}}>🎯 צייד מועמדים</h1>
      {searched&&<Btn onClick={reset}>🔄 חיפוש חדש</Btn>}
    </div>

    <div style={{background:'white',borderRadius:16,padding:'24px 28px',marginBottom:24,border:'1px solid #e2e8f0',boxShadow:'0 8px 24px rgba(0,0,0,0.10)'}}>
      <div style={{fontWeight:900,fontSize:16,marginBottom:20,display:'flex',alignItems:'center',gap:8,color:'#000000'}}>
        <span>🔍</span> הגדר דרישות לצייד
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:18,marginBottom:18}}>
        {(()=>{
          const [dSearch,setDSearch]=React.useState('');
          const [dOpen,setDOpen]=React.useState(false);
          const dFiltered=allDomains.filter(d=>d.includes(dSearch));
          const IS2={...inputStyle,paddingLeft:32,textAlign:'right',direction:'rtl',cursor:'pointer'};
          return <div style={{position:'relative'}}>
            <label style={labelStyle}>תחום מקצועי</label>
            <div style={{position:'relative'}}>
              <input value={domain||dSearch}
                onFocus={()=>{setDOpen(true);if(domain)setDSearch('');}}
                onChange={e=>{setDSearch(e.target.value);setDomain('');setRole('');setDOpen(true);}}
                onBlur={()=>setTimeout(()=>{setDOpen(false);if(!domain)setDSearch('');},160)}
                placeholder="-- כל התחומים --" style={IS2}/>
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#64748b',fontSize:11}}>▼</span>
            </div>
            {dOpen&&<div style={{position:'absolute',top:'100%',right:0,left:0,background:'white',border:'2px solid #94a3b8',borderRadius:10,zIndex:200,maxHeight:260,overflowY:'auto',boxShadow:'0 8px 24px rgba(0,0,0,0.13)',marginTop:3}}>
              <div onMouseDown={()=>{setDomain('');setDSearch('');setRole('');setDOpen(false);}} className="dd-item dd-placeholder" onMouseEnter={e=>e.currentTarget.style.background='#f3f4f6'} onMouseLeave={e=>e.currentTarget.style.background=''}>-- כל התחומים --</div>
              {dFiltered.length===0&&<div className="dd-item dd-empty">לא נמצאו תוצאות</div>}
              {dFiltered.map(d=><div key={d} onMouseDown={()=>{setDomain(d);setDSearch('');setRole('');setDOpen(false);}}
                className={`dd-item${domain===d?' dd-selected':''}`} onMouseEnter={e=>e.currentTarget.style.background=domain===d?'#fde8dc':'#f3f4f6'} onMouseLeave={e=>e.currentTarget.style.background=domain===d?'#fff5f0':''}>{d}</div>)}
            </div>}
          </div>;
        })()}

        {(()=>{
          const [rSearch,setRSearch]=React.useState('');
          const [rOpen,setROpen]=React.useState(false);
          const rFiltered=allRoles.filter(r=>r.includes(rSearch));
          const IS2={...inputStyle,paddingLeft:32,textAlign:'right',direction:'rtl',cursor:domain?'pointer':'not-allowed',opacity:domain?1:0.45};
          return <div style={{position:'relative'}}>
            <label style={labelStyle}>תפקיד</label>
            <div style={{position:'relative'}}>
              <input value={role||rSearch} disabled={!domain}
                onFocus={()=>{if(domain){setROpen(true);if(role)setRSearch('');}}}

function Settings({data,setData}){
  const [tab,setTab]=React.useState('general');
  // General tab state
  const [company,setCompany]=React.useState(()=>data.company||{name:'טופ גרופ גיוס והשמה',email:'hr@topgroup4u.com',phone:''});
  const saveCompany=()=>{setData(d=>({...d,company}));alert('✅ פרטי החברה נשמרו!');};
  // Users tab state
  const [users,setUsers]=React.useState(()=>data.users||[{id:'u1',name:'מנהל מערכת',email:'admin@topgroup4u.com',role:'מנהל',status:'פעיל'}]);
  const [userModal,setUserModal]=React.useState(null);
  const [userForm,setUserForm]=React.useState({});
  const openAddUser=()=>{setUserForm({name:'',email:'',role:'רקרוטר',status:'פעיל'});setUserModal('add');};
  const openEditUser=u=>{setUserForm({...u});setUserModal('edit');};
  const saveUser=()=>{
    if(userModal==='add'){const nu={...userForm,id:'u'+Date.now()};setUsers(us=>[...us,nu]);setData(d=>({...d,users:[...users,nu]}));}
    else{const updated=users.map(u=>u.id===userForm.id?userForm:u);setUsers(updated);setData(d=>({...d,users:updated}));}
    setUserModal(null);
  };
  const delUser=id=>{if(!confirm('למחוק משתמש?'))return;const updated=users.filter(u=>u.id!==id);setUsers(updated);setData(d=>({...d,users:updated}));};
  // Statuses tab state
  const defaultStatuses={candidates:['חדש','בתהליך','ראיון נקבע','השמה מוצלחת','נדחה'],jobs:['פתוח','ממתין','סגור'],employers:['פעיל','פסיבי'],jobTypes:['משרה מלאה','חצי משרה','חלקית','משמרות','פרילנס','זמני']};
  const [statuses,setStatuses]=React.useState(()=>({...defaultStatuses,...(data.statuses||{})}));
  const DEFAULT_INDUSTRIES=['הייטק','תעשייה','פיננסים','קמעונאות','בריאות','חינוך','אחר'];
  const [industries,setIndustries]=React.useState(()=>data.industries||DEFAULT_INDUSTRIES);
  React.useEffect(()=>{if(data.industries)setIndustries(data.industries);},[data.industries]);
  const [newIndustry,setNewIndustry]=React.useState('');
  const addIndustry=()=>{const v=newIndustry.trim();if(!v||industries.includes(v))return;const updated=[...industries,v];setIndustries(updated);setData(d=>({...d,industries:updated,statuses:{...(d.statuses||{}),industries:updated}}));setNewIndustry('');};
  const delIndustry=name=>{if(industries.length<=1)return;const updated=industries.filter(i=>i!==name);setIndustries(updated);setData(d=>({...d,industries:updated,statuses:{...(d.statuses||{}),industries:updated}}));};
  const [newStatus,setNewStatus]=React.useState({candidates:'',jobs:'',employers:'',jobTypes:''});
  const addStatus=(key)=>{const v=(newStatus[key]||'').trim();if(!v)return;const updated={...statuses,[key]:[...(statuses[key]||[]),v]};setStatuses(updated);setData(d=>({...d,statuses:updated}));setNewStatus(n=>({...n,[key]:''}));};
  const delStatus=(key,item)=>{const updated={...statuses,[key]:(statuses[key]||[]).filter(s=>s!==item)};setStatuses(updated);setData(d=>({...d,statuses:updated}));};

  // Display settings — defaults always present, merged with Supabase data
  const DISPLAY_DEFAULTS={zoom:'100',highContrast:false,darkMode:false,boldText:false,accentColor:'#e85d26',colorScheme:'light',userName:'מנהל מערכת'};
  const [display,setDisplay]=React.useState(()=>({...DISPLAY_DEFAULTS,...(data.displaySettings||{})}));
  // Sync display state when data loads from Supabase — always merge with defaults
  React.useEffect(()=>{
    if(data.displaySettings) setDisplay({...DISPLAY_DEFAULTS,...data.displaySettings});
  },[data.displaySettings]);
  const [displaySaved,setDisplaySaved]=React.useState(false);
  const saveDisplay=()=>{
    const saved={...display};
    setData(d=>({...d,displaySettings:saved}));
    const zoomVal=(saved.zoom||'100')+'%';
    localStorage.setItem('crm_zoom',zoomVal);
    localStorage.setItem('crm_accentColor',saved.accentColor||'#e85d26');
    localStorage.setItem('crm_darkMode',saved.darkMode?'1':'0');
    localStorage.setItem('crm_boldText',saved.boldText?'1':'0');
    localStorage.setItem('crm_highContrast',saved.highContrast?'1':'0');
    document.body.style.zoom=zoomVal;
    const filters=[];
    if(saved.darkMode)filters.push('invert(0.92) hue-rotate(183deg)');
    if(saved.highContrast)filters.push('contrast(1.4)');
    document.body.style.filter=filters.join(' ');
    document.documentElement.style.setProperty('--acc',saved.accentColor||'#e85d26');
    document.body.classList.toggle('dark-mode',!!saved.darkMode);
    document.body.classList.toggle('bold-mode',!!saved.boldText);
    setDisplaySaved(true);
    setTimeout(()=>setDisplaySaved(false),3000);
  };

  // Defaults settings
  const [defaults,setDefaults]=React.useState(()=>data.defaults||{employerStatus:'פעיל',jobStatus:'פתוח',candidateStatus:'חדש',yearlyTarget:'',deadlineDays:'7',currency:'₪'});
  React.useEffect(()=>{if(data.defaults)setDefaults(data.defaults);},[data.defaults]);
  const [defaultsSaved,setDefaultsSaved]=React.useState(false);
  const saveDefaults=()=>{const saved={...defaults};setData(d=>({...d,defaults:saved}));setDefaultsSaved(true);setTimeout(()=>setDefaultsSaved(false),3000);};

  const tabs=[{id:'general',label:'כללי'},{id:'display',label:'🎨 תצוגה'},{id:'users',label:'משתמשים'},{id:'domains',label:'תחומים ותפקידים'},{id:'statuses',label:'סטטוסים'},{id:'defaults',label:'ברירות מחדל'},{id:'notifications',label:'התראות'}];
  return <div style={{padding:28}} className="mobile-pad">
    <h1 style={{fontSize:28,fontWeight:800,marginBottom:20}}>⚙ הגדרות מערכת</h1>
    <div style={{display:'flex',gap:0,marginBottom:24,borderBottom:'2px solid #333',overflowX:'auto'}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 16px',cursor:'pointer',fontSize:14,fontWeight:600,border:'none',borderBottom:tab===t.id?`3px solid ${ACC}`:'3px solid transparent',background:'none',color:tab===t.id?ACC:'#555',marginBottom:-2,whiteSpace:'nowrap'}}>{t.label}</button>)}
    </div>

    {tab==='general'&&<div className="sbox" style={{background:'#fff',padding:24,maxWidth:560}}>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:16}}>פרטי החברה</h3>
      <FF label="שם החברה" value={company.name||''} onChange={v=>setCompany(c=>({...c,name:v}))}/>
      <FF label="אימייל ראשי" value={company.email||''} onChange={v=>setCompany(c=>({...c,email:v}))}/>
      <FF label="טלפון" value={company.phone||''} onChange={v=>setCompany(c=>({...c,phone:v}))}/>
      <Btn variant="primary" onClick={saveCompany}>שמירת שינויים</Btn>
      <div style={{marginTop:28,borderTop:'2px dashed #ddd',paddingTop:20}}>
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:6}}>📦 גיבוי ושחזור נתונים</h3>
        <div style={{fontSize:13,color:MUT,marginBottom:14}}>ייצא את כל הנתונים לקובץ JSON, ואחר כך ייבא אותו בכל דפדפן או מכשיר.</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <Btn variant="primary" onClick={()=>{
            const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;a.download='topgroup-crm-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
          }}>⬇️ ייצא נתונים (JSON)</Btn>
          <label style={{cursor:'pointer',background:'white',border:'2px solid #333',borderRadius:3,padding:'6px 14px',fontSize:14,fontWeight:600}}>
            ⬆️ ייבא נתונים (JSON)
            <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
              const file=e.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const parsed=JSON.parse(ev.target.result);
                  if(!parsed.employers||!parsed.jobs||!parsed.candidates){alert('קובץ לא תקין');return;}
                  if(confirm(`ייבא ${parsed.employers.length} מעסיקים, ${parsed.jobs.length} משרות, ${parsed.candidates.length} מועמדים?\nהנתונים הנוכחיים יוחלפו!`)){
                    setData(parsed);
                    alert('✅ הנתונים יובאו בהצלחה!');
                  }
                }catch(err){alert('שגיאה בקריאת הקובץ');}
              };
              reader.readAsText(file);e.target.value='';
            }}/>
          </label>
        </div>
        <div style={{marginTop:12,padding:12,background:'#fffbf0',border:'1px dashed #e0d080',borderRadius:4,fontSize:13,color:'#666'}}>
          💡 <strong>הנתונים מסונכרנים אוטומטית עם Supabase בענן</strong>
        </div>
      </div>
