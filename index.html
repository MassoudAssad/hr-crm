// ── RESET PASSWORD ───────────────────────────────────────────────────────────
function ResetPasswordScreen({onDone}){
  const [password,setPassword]=React.useState('');
  const [confirm,setConfirm]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [error,setError]=React.useState('');
  const [success,setSuccess]=React.useState(false);

  const handleReset=async e=>{
    e.preventDefault();
    if(password.length<6){setError('הסיסמה חייבת להכיל לפחות 6 תווים');return;}
    if(password!==confirm){setError('הסיסמאות אינן תואמות');return;}
    setLoading(true);setError('');
    try{
      const {error:err}=await sb.auth.updateUser({password});
      if(err){setError(err.message);setLoading(false);return;}
      setSuccess(true);
      setTimeout(()=>onDone(),2000);
    }catch(e){setError('שגיאה בעדכון הסיסמה');setLoading(false);}
  };

  return <div style={{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{width:'100%',maxWidth:400}}>
      <div style={{textAlign:'center',marginBottom:40}}>
        <div style={{fontSize:42,fontWeight:900,color:'#e85d26',lineHeight:1}}>טופ גרופ</div>
        <div style={{fontSize:16,color:'rgba(255,255,255,0.5)',marginTop:6}}>גיוס והשמה · מערכת CRM</div>
      </div>
      <div style={{background:'white',borderRadius:20,padding:'32px 28px',boxShadow:'0 24px 80px rgba(0,0,0,0.4)'}}>
        {success
          ?<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:56,marginBottom:16}}>✅</div>
            <div style={{fontSize:20,fontWeight:800,color:'#16a34a',marginBottom:8}}>הסיסמה עודכנה!</div>
            <div style={{fontSize:14,color:'#6b7280'}}>מועבר למסך הכניסה...</div>
          </div>
          :<form onSubmit={handleReset}>
            <h2 style={{fontSize:22,fontWeight:800,color:'#1a1a2e',marginBottom:4}}>הגדרת סיסמה חדשה</h2>
            <p style={{fontSize:14,color:'#6b7280',marginBottom:24}}>בחר סיסמה חדשה לחשבון שלך</p>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>סיסמה חדשה</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="לפחות 6 תווים"
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontSize:15,outline:'none'}}
                onFocus={e=>e.target.style.borderColor='#e85d26'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>אישור סיסמה</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="הכנס שוב את הסיסמה"
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontSize:15,outline:'none'}}
                onFocus={e=>e.target.style.borderColor='#e85d26'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
            </div>
            {error&&<div style={{background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:8,padding:'10px 14px',fontSize:14,color:'#c94d1a',marginBottom:16,textAlign:'center'}}>⚠️ {error}</div>}
            <button type="submit" disabled={loading} style={{width:'100%',padding:'13px',background:loading?'#d1d5db':'#e85d26',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:800,fontSize:16,cursor:loading?'not-allowed':'pointer',boxShadow:loading?'none':'0 4px 16px rgba(232,93,38,0.35)'}}>
              {loading?'מעדכן...':'עדכן סיסמה'}
            </button>
          </form>
        }
      </div>
    </div>
  </div>;
}

  const [email,setEmail]=React.useState('');

  const [error,setError]=React.useState('');
  const [showPass,setShowPass]=React.useState(false);

  const handleLogin=async e=>{
    e.preventDefault();
    if(!email||!password){setError('נא למלא מייל וסיסמה');return;}
    setLoading(true);setError('');
    try{
      const {data,error:err}=await sb.auth.signInWithPassword({email,password});
      if(err){
        setError(err.message.includes('Invalid')?'מייל או סיסמה שגויים':err.message);
        setLoading(false);return;
      }
      onLogin(data.session);
    }catch(e){setError('שגיאת חיבור');setLoading(false);}
  };

  return <div style={{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{width:'100%',maxWidth:400}}>
      {/* Logo */}
      <div style={{textAlign:'center',marginBottom:40}}>
        <div style={{fontSize:42,fontWeight:900,color:'#e85d26',lineHeight:1}}>טופ גרופ</div>
        <div style={{fontSize:16,color:'rgba(255,255,255,0.5)',marginTop:6}}>גיוס והשמה · מערכת CRM</div>
      </div>

      {/* Card */}
      <div style={{background:'white',borderRadius:20,padding:'32px 28px',boxShadow:'0 24px 80px rgba(0,0,0,0.4)'}}>
        <h2 style={{fontSize:22,fontWeight:800,color:'#1a1a2e',marginBottom:4}}>כניסה למערכת</h2>
        <p style={{fontSize:14,color:'#6b7280',marginBottom:24}}>הכנס את פרטי הכניסה שלך</p>

        <form onSubmit={handleLogin}>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>כתובת מייל</label>
            <input
              type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="name@topgroup4u.com" autoComplete="email"
              style={{width:'100%',padding:'12px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontSize:15,outline:'none',transition:'border-color .2s',direction:'ltr',textAlign:'left'}}
              onFocus={e=>e.target.style.borderColor='#e85d26'}
              onBlur={e=>e.target.style.borderColor='#e5e7eb'}
            />
          </div>

          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>סיסמה</label>
            <div style={{position:'relative'}}>
              <input
                type={showPass?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)}
                placeholder="••••••••" autoComplete="current-password"
                style={{width:'100%',padding:'12px 40px 12px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontSize:15,outline:'none',transition:'border-color .2s',direction:'ltr',textAlign:'left'}}
                onFocus={e=>e.target.style.borderColor='#e85d26'}
                onBlur={e=>e.target.style.borderColor='#e5e7eb'}
              />
              <button type="button" onClick={()=>setShowPass(s=>!s)} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#9ca3af'}}>
                {showPass?'🙈':'👁'}
              </button>
            </div>
          </div>

          {error&&<div style={{background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:8,padding:'10px 14px',fontSize:14,color:'#c94d1a',marginBottom:16,textAlign:'center'}}>
            ⚠️ {error}
          </div>}

          <button type="submit" disabled={loading} style={{width:'100%',padding:'13px',background:loading?'#d1d5db':'#e85d26',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:800,fontSize:16,cursor:loading?'not-allowed':'pointer',transition:'all .2s',boxShadow:loading?'none':'0 4px 16px rgba(232,93,38,0.35)'}}>
            {loading?'מתחבר...':'כניסה למערכת →'}
          </button>
        </form>
      </div>

      <div style={{textAlign:'center',marginTop:20,fontSize:13,color:'rgba(255,255,255,0.3)'}}>
        🔒 גישה מאובטחת · טופ גרופ גיוס והשמה
      </div>
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=React.useState(null);
  const [authLoading,setAuthLoading]=React.useState(true);

  const [resetMode,setResetMode]=React.useState(false);

  React.useEffect(()=>{
    // Check for password reset token in URL hash
    const hash=window.location.hash;
    if(hash.includes('type=recovery')||hash.includes('access_token')){
      setResetMode(true);
      setAuthLoading(false);
      return;
    }
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='PASSWORD_RECOVERY'){setResetMode(true);setAuthLoading(false);return;}
      setSession(session);
      setAuthLoading(false);
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(authLoading) return <div style={{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{color:'rgba(255,255,255,0.5)',fontSize:16}}>טוען...</div>
  </div>;

  if(resetMode) return <ResetPasswordScreen onDone={()=>{setResetMode(false);window.location.hash='';}} />;
  if(!session) return <LoginScreen onLogin={s=>setSession(s)}/>;

  return <AppInner/>;
}

function AppInner(){
  const [page,setPage]=React.useState('dashboard');
  const [syncStatus,setSyncStatus]=React.useState('syncing');
  const [data,setData]=React.useState(()=>{
    try{
      const saved=localStorage.getItem('crm_data');
      if(!saved)return INIT;
      const p=JSON.parse(saved);
      let nextN=1;
      const jobs=(p.jobs||[]).map(j=>{
        const mj={domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j};
        if(!mj.jobNumber){mj.jobNumber='TG-'+String(nextN).padStart(3,'0');}
        const n=parseInt((mj.jobNumber||'').replace('TG-',''))||0;
        if(n>=nextN)nextN=n+1;
        return mj;
      });
      return{...p,jobs,candidates:(p.candidates||[]).map(c=>({domain:'',...c})),employers:(p.employers||[]).map(e=>({needs:[],...e})),jobDomains:p.jobDomains||INIT.jobDomains};
    }catch{return INIT;}
  });

  // Load from Supabase on startup
  React.useEffect(()=>{
    loadFromSupabase().then(sbData=>{
      if(sbData&&(sbData.employers?.length||sbData.jobs?.length||sbData.candidates?.length||sbData.jobDomains?.length)){
        const jobs=(sbData.jobs||[]).map(j=>({domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j}));
        const merged={
          ...sbData,
          jobs,
          candidates:(sbData.candidates||[]).map(c=>({domain:'',...c})),
          employers:(sbData.employers||[]).map(e=>({needs:[],...e})),
          jobDomains:sbData.jobDomains?.length?sbData.jobDomains:INIT.jobDomains,
          displaySettings:sbData.displaySettings||undefined,
          kpiColors:sbData.kpiColors||undefined,
          commissionBg:sbData.commissionBg||undefined,
          pipelineColors:sbData.pipelineColors||undefined,
          defaults:sbData.defaults||undefined,
        };
        setData(merged);
        localStorage.setItem('crm_data',JSON.stringify(merged));
        setSyncStatus('ok');
      }else{
        const local=JSON.parse(localStorage.getItem('crm_data')||'null');
        saveToSupabase(local||INIT).then(ok=>setSyncStatus(ok?'ok':'error'));
      }
    }).catch(()=>setSyncStatus('error'));
  },[]);

  // Auto-refresh from Supabase every 30 seconds (not 10 — avoid overwriting recent saves)
  const lastSaveTime=React.useRef(0);
  React.useEffect(()=>{
    const interval=setInterval(()=>{
      // Skip refresh if we saved in the last 5 seconds
      if(Date.now()-lastSaveTime.current<5000)return;
      loadFromSupabase().then(sbData=>{
        if(!sbData)return;
        const jobs=(sbData.jobs||[]).map(j=>({domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j}));
        const merged={
          ...sbData,
          jobs,
          candidates:(sbData.candidates||[]).map(c=>({domain:'',...c})),
          employers:(sbData.employers||[]).map(e=>({needs:[],...e})),
          jobDomains:sbData.jobDomains?.length?sbData.jobDomains:INIT.jobDomains,
          displaySettings:sbData.displaySettings||undefined,
          kpiColors:sbData.kpiColors||undefined,
          commissionBg:sbData.commissionBg||undefined,
          pipelineColors:sbData.pipelineColors||undefined,
          defaults:sbData.defaults||undefined,
        };
        setData(merged);
        localStorage.setItem('crm_data',JSON.stringify(merged));
        setSyncStatus('ok');
      }).catch(()=>{});
    },30000);
    return()=>clearInterval(interval);
  },[]);

  // Save to Supabase on data change (debounced 1s)
  // Apply display settings on data change
  React.useEffect(()=>{
    const ds=data.displaySettings||{};
    // Font size is fixed at 1.15rem — not controlled by settings
    document.body.style.filter=ds.highContrast?'contrast(1.25)':'';
    // Apply accent color via CSS variable
    const acc=ds.accentColor||'#e85d26';
    document.documentElement.style.setProperty('--acc',acc);
    // Derive light/dark variants
    document.documentElement.style.setProperty('--acc-light',acc+'22');
    document.documentElement.style.setProperty('--acc-dark',acc);
  },[data.displaySettings]);

  const isFirst=React.useRef(true);
  const saveTimer=React.useRef(null);
  React.useEffect(()=>{
    if(isFirst.current){isFirst.current=false;return;}
    localStorage.setItem('crm_data',JSON.stringify(data));
    setSyncStatus('syncing');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      lastSaveTime.current=Date.now();
      saveToSupabase(data).then(ok=>setSyncStatus(ok?'ok':'error'));
    },500);
  },[data]);

  // page intentionally starts at dashboard each session

  const syncBg=syncStatus==='ok'?'#d4edda':syncStatus==='error'?'#fde8dc':'#fff3cd';
  const syncMsg=syncStatus==='syncing'?'🔄 מסנכרן...':syncStatus==='ok'?'☁️ מסונכרן עם Supabase':'⚠️ שגיאת סנכרון';

  // Pending candidates (from landing page, await approval)
  const pending=(data.pendingCandidates||[]).map(id=>data.candidates.find(c=>c.id===id)).filter(Boolean);
  const [showPending,setShowPending]=React.useState(false);

  const approvePending=(cid)=>{
    const cand=data.candidates.find(c=>c.id===cid);
    setData(d=>({
      ...d,
      pendingCandidates:(d.pendingCandidates||[]).filter(id=>id!==cid),
      candidates:d.candidates.map(c=>c.id===cid?{...c,pendingApproval:false}:c),
      activityLog:[mkLog('pending','approved',cand?.name||cid),...(d.activityLog||[])].slice(0,50)
    }));
  };
  const [confirmRejectApp,setConfirmRejectApp]=React.useState(null);
  const rejectPending=(cid)=>{
    const cand2=data.candidates.find(c=>c.id===cid);
    setConfirmRejectApp({id:cid,name:cand2?.name||cid});
  };
  const doRejectPending=()=>{
    if(!confirmRejectApp)return;
    const {id:cid}=confirmRejectApp;
    const cand2=data.candidates.find(c=>c.id===cid);
    setData(d=>({
      ...d,
      pendingCandidates:(d.pendingCandidates||[]).filter(id=>id!==cid),
      candidates:d.candidates.filter(c=>c.id!==cid),
      activityLog:[mkLog('pending','rejected',cand2?.name||cid),...(d.activityLog||[])].slice(0,50)
    }));
    setConfirmRejectApp(null);
  };

  // Dashboard color states — live here so they survive navigation
  const defaultKpiColorsApp=['#1a1a2e','linear-gradient(135deg,#3b82f6,#1d4ed8)','linear-gradient(135deg,#8b5cf6,#6d28d9)','linear-gradient(135deg,#e85d26,#c94d1a)'];
  const defaultPipelineColorsApp=['linear-gradient(135deg,#f3f4f6,#e5e7eb)','linear-gradient(135deg,#dbeafe,#bfdbfe)','linear-gradient(135deg,#fef3c7,#fde68a)','linear-gradient(135deg,#dcfce7,#bbf7d0)'];
  const [kpiColors,setKpiColors]=React.useState(()=>data.kpiColors||defaultKpiColorsApp);
  const [commissionBg,setCommissionBg]=React.useState(()=>data.commissionBg||'linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)');
  const [pipelineColors,setPipelineColors]=React.useState(()=>data.pipelineColors||defaultPipelineColorsApp);
  // Sync from data when it loads from Supabase
  React.useEffect(()=>{
    if(data.kpiColors) setKpiColors(data.kpiColors);
    if(data.commissionBg) setCommissionBg(data.commissionBg);
    if(data.pipelineColors) setPipelineColors(data.pipelineColors);
  },[data.kpiColors,data.commissionBg,data.pipelineColors]);

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:'#f0f2f5'}}>
    <div id="desktop-topnav" className="desktop-only"><TopNav active={page} onNav={setPage} pending={pending.length} onPendingClick={()=>setShowPending(true)}/></div>
    <div id="main-content" style={{flex:1,overflow:'auto',minWidth:0,marginTop:60}}>
      <div style={{background:syncBg,padding:'3px 14px',fontSize:12,textAlign:'center',borderBottom:'1px solid #ddd'}}>{syncMsg}</div>
      {page==='dashboard'&&<Dashboard data={data} onNav={setPage} setData={setData}
        kpiColors={kpiColors} setKpiColors={setKpiColors}
        commissionBg={commissionBg} setCommissionBg={setCommissionBg}
        pipelineColors={pipelineColors} setPipelineColors={setPipelineColors}
      />}
      {page==='employers'&&<Employers data={data} setData={setData}/>}
      {page==='jobs'&&<Jobs data={data} setData={setData}/>}
      {page==='candidates'&&<Candidates data={data} setData={setData}/>}
      {page==='hunter'&&<CandidateHunter data={data}/>}
      {page==='tasks'&&<Tasks data={data} setData={setData}/>}
      {page==='settings'&&<Settings data={data} setData={setData}/>}
    </div>
    <nav id="mobile-nav">
      {NAV.map(item=>(
        <button key={item.id} className={`mnav-btn${page===item.id?' active':''}`} onClick={()=>setPage(item.id)}>
          <span>{item.icon}</span>
          {item.id==='candidates'&&pending.length>0
            ?<span style={{position:'relative'}}>{item.label}<span style={{position:'absolute',top:-8,left:-6,background:'#e85d26',color:'white',borderRadius:10,padding:'0 5px',fontSize:9,fontWeight:800}}>{pending.length}</span></span>
            :<span>{item.label}</span>
          }
        </button>
      ))}
    </nav>

    {/* Pending candidates modal */}
    {showPending&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'white',borderRadius:16,width:'100%',maxWidth:620,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{padding:'20px 24px',borderBottom:'2px solid #f0ede6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'white'}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800}}>🔔 מועמדים ממתינים לאישור</h2>
            <div style={{fontSize:13,color:'#888',marginTop:2}}>מועמדים שהגישו מועמדות דרך דף הנחיתה</div>
          </div>
          <button onClick={()=>setShowPending(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#888'}}>✕</button>
        </div>
        <div style={{padding:16}}>
          {pending.length===0
            ?<div style={{textAlign:'center',padding:40,color:'#aaa'}}>אין מועמדים ממתינים</div>
            :pending.map(c=>{
              const job=data.jobs.find(j=>c.appliedJobs?.includes(j.id));
              return <div key={c.id} style={{border:'2px solid #f0ede6',borderRadius:12,padding:16,marginBottom:12,background:'#fafaf8'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    <div style={{width:44,height:44,borderRadius:22,background:'#e85d26',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:17,flexShrink:0}}>
                      {c.name.charAt(0)}
                    </div>
                    <div>
                      <div style={{fontWeight:800,fontSize:16}}>{c.name}</div>
                      <div style={{fontSize:13,color:'#666'}}>{c.role||c.domain}</div>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'#aaa',textAlign:'left'}}>
                    {c.appliedAt?new Date(c.appliedAt).toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):''}
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:13,color:'#555',marginBottom:12}}>
                  {c.phone&&<span>📞 {c.phone}</span>}
                  {c.email&&<span>✉️ {c.email}</span>}
                  {c.city&&<span>📍 {c.city}</span>}
                  {c.experience&&<span>⏱ {c.experience}</span>}
                  {c.education&&<span>🎓 {c.education}</span>}
                  {c.cv&&<span style={{color:'#16a34a',fontWeight:600}}>📄 CV מצורף</span>}
                </div>
                {job&&<div style={{fontSize:12,background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:6,padding:'5px 10px',marginBottom:10,color:'#c94d1a',fontWeight:600}}>
                  🔗 משרה: {job.publishTitle||job.title} ({job.jobNumber})
                </div>}
                {c.notes&&<div style={{fontSize:13,color:'#555',background:'#f9fafb',borderRadius:6,padding:'8px 10px',marginBottom:10,fontStyle:'italic'}}>"{c.notes}"</div>}
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>approvePending(c.id)} style={{flex:1,padding:'9px 0',background:'#16a34a',color:'white',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer'}}>
                    ✅ אשר והוסף למועמדים
                  </button>
                  <button onClick={()=>rejectPending(c.id)} style={{padding:'9px 16px',background:'#fde8dc',color:'#c94d1a',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer'}}>
                    ✕ דחה
                  </button>
                </div>
              </div>;
            })
          }
        </div>
      </div>
    </div>}
    <ConfirmDialog
      open={!!confirmRejectApp}
      title="דחיית מועמד בהמתנה"
      message="האם אתה בטוח שברצונך לדחות את המועמד:"
      name={confirmRejectApp?.name}
      onConfirm={doRejectPending}
      onCancel={()=>setConfirmRejectApp(null)}
    />
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
