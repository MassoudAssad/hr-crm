function TaskCard({t,data,onEdit,onDel,draggable,onDragStart}){
  const cand=t.candidateId?data.candidates.find(c=>c.id===t.candidateId):null;
  const emp=t.employerId?data.employers.find(e=>e.id===t.employerId):null;
  const done=t.status==='הושלם';
  const due=(()=>{if(!t.dueDate)return null;const date=new Date(t.dueDate);const today=new Date();today.setHours(0,0,0,0);const diff=Math.ceil((date-today)/(1000*60*60*24));if(diff<0)return{text:(Math.abs(diff)+' ימים באיחור'),color:'#dc2626'};if(diff===0)return{text:'היום',color:'#e85d26'};if(diff===1)return{text:'מחר',color:'#f59e0b'};return{text:date.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}),color:'#6b7280'};})();
  return <div draggable={draggable} onDragStart={onDragStart}
    style={{background:'white',borderRadius:12,padding:'14px 16px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',border:'1.5px solid #f0ede6',marginBottom:10,cursor:draggable?'grab':'default',opacity:done?0.78:1}}
    onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.13)'}
    onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.07)'}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
      <div style={{fontWeight:700,fontSize:14,color:done?'#9ca3af':'#1a1a2e',textDecoration:done?'line-through':'none',flex:1,lineHeight:1.4}}>{t.title}</div>
      <div style={{display:'flex',gap:4,flexShrink:0,marginRight:8}}>
        <button onClick={()=>onEdit(t)} style={{padding:'3px 7px',background:'#f3f4f6',border:'none',borderRadius:5,cursor:'pointer',fontSize:12}}>✏️</button>
        <button onClick={()=>onDel(t.id)} style={{padding:'3px 7px',background:'#fde8dc',border:'none',borderRadius:5,cursor:'pointer',fontSize:12}}>🗑</button>
      </div>
    </div>
    {t.description&&<div style={{fontSize:12,color:'#6b7280',marginBottom:8,lineHeight:1.55}}>{t.description}</div>}
    <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20,background:PRIORITY_COLORS[t.priority]||'#f3f4f6',color:PRIORITY_TEXT[t.priority]||'#6b7280'}}>{t.priority}</span>
      {due&&<span style={{fontSize:11,fontWeight:600,color:due.color}}>📅 {due.text}</span>}
      {cand&&<span style={{fontSize:11,background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:5,padding:'1px 6px',color:'#c94d1a',fontWeight:600}}>👤 {cand.name}</span>}
      {emp&&<span style={{fontSize:11,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:5,padding:'1px 6px',color:'#1d4ed8',fontWeight:600}}>🏢 {emp.name}</span>}
    </div>
  </div>;
}

function KanbanBoard({tasks,data,onEdit,onDel,onStatusChange,onAddInCol}){
  const cols=[{id:'פתוח',label:'פתוח',color:'#eff6ff',accent:'#3b82f6',icon:'📋'},{id:'בתהליך',label:'בתהליך',color:'#fffbeb',accent:'#f59e0b',icon:'⏳'},{id:'הושלם',label:'הושלם',color:'#f0fdf4',accent:'#16a34a',icon:'✅'}];
  const [dragOver,setDragOver]=React.useState(null);
  const handleDrop=(e,colId)=>{e.preventDefault();const id=e.dataTransfer.getData('taskId');if(id){const t=tasks.find(x=>x.id===id);if(t&&t.status!==colId)onStatusChange(t,colId);}setDragOver(null);};
  return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,alignItems:'start'}}>
    {cols.map(col=>{
      const colTasks=tasks.filter(t=>t.status===col.id);
      const isOver=dragOver===col.id;
      return <div key={col.id} onDragOver={e=>{e.preventDefault();setDragOver(col.id);}} onDragLeave={()=>setDragOver(null)} onDrop={e=>handleDrop(e,col.id)}
        style={{background:isOver?col.color:'#f5f0e8',borderRadius:16,padding:'0 0 8px',border:'2px dashed '+(isOver?col.accent:'transparent'),transition:'border .15s',minHeight:200}}>
        <div style={{background:col.color,borderRadius:'14px 14px 0 0',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>{col.icon}</span>
            <span style={{fontWeight:800,fontSize:14,color:col.accent}}>{col.label}</span>
            <span style={{background:col.accent,color:'white',borderRadius:20,padding:'0 7px',fontSize:11,fontWeight:800}}>{colTasks.length}</span>
          </div>
          <button onClick={()=>onAddInCol(col.id)} style={{background:col.accent,color:'white',border:'none',borderRadius:8,width:26,height:26,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800}}>+</button>
        </div>
        <div style={{padding:'0 10px'}}>
          {colTasks.length===0&&<div style={{textAlign:'center',padding:'30px 0',color:'#bbb',fontSize:13}}>גרור לכאן או לחץ +</div>}
          {colTasks.map(t=><TaskCard key={t.id} t={t} data={data} onEdit={onEdit} onDel={onDel} draggable={true} onDragStart={e=>e.dataTransfer.setData('taskId',t.id)}/>)}
        </div>
      </div>;
    })}
  </div>;
}

function Tasks({data,setData}){
  const [modal,setModal]=React.useState(null); // null | {task?}
  const [filter,setFilter]=React.useState('הכל');
  const [priorityFilter,setPriorityFilter]=React.useState('הכל');
  const tasks=data.tasks||[];

  const [viewMode,setViewMode]=React.useState('kanban');
  const saveTask=form=>{
    const isNew=!form.id;
    const t=isNew?{...form,id:'t'+Date.now(),createdAt:new Date().toISOString()}:{...form};
    setData(d=>({...d,tasks:isNew?[t,...(d.tasks||[])]:(d.tasks||[]).map(x=>x.id===t.id?t:x)}));
    setModal(null);
  };
  const delTask=id=>{if(confirm('למחוק משימה?'))setData(d=>({...d,tasks:(d.tasks||[]).filter(t=>t.id!==id)}));};
  const changeStatus=(t,s)=>setData(d=>({...d,tasks:(d.tasks||[]).map(x=>x.id===t.id?{...x,status:s}:x)}));
  const toggleStatus=t=>{const next=t.status==='פתוח'?'בתהליך':t.status==='בתהליך'?'הושלם':'פתוח';changeStatus(t,next);};

  const filtered=tasks.filter(t=>(filter==='הכל'||t.status===filter)&&(priorityFilter==='הכל'||t.priority===priorityFilter));
  const openCount=tasks.filter(t=>t.status==='פתוח').length;
  const inProgCount=tasks.filter(t=>t.status==='בתהליך').length;
  const doneCount=tasks.filter(t=>t.status==='הושלם').length;

  const fmtDue=d=>{
    if(!d)return null;
    const date=new Date(d);
    const today=new Date(); today.setHours(0,0,0,0);
    const diff=Math.ceil((date-today)/(1000*60*60*24));
    if(diff<0) return {text:`${Math.abs(diff)} ימים באיחור`,color:'#dc2626'};
    if(diff===0) return {text:'היום',color:'#e85d26'};
    if(diff===1) return {text:'מחר',color:'#f59e0b'};
    return {text:date.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}),color:'#6b7280'};
  };

  return <div style={{padding:28}} className="mobile-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
      <div>
        <h1 style={{fontSize:28,fontWeight:900,color:'#1a1a2e',marginBottom:4}}>✅ משימות</h1>
        <div style={{fontSize:13,color:'#6b7280'}}>{openCount} פתוחות · {inProgCount} בתהליך · {doneCount} הושלמו</div>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <div style={{display:'flex',border:'2px solid #333',borderRadius:8,overflow:'hidden'}}>
          <button onClick={()=>setViewMode('kanban')} style={{padding:'7px 14px',background:viewMode==='kanban'?'#1a1a2e':'white',color:viewMode==='kanban'?'white':'#333',border:'none',fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>🗂 Kanban</button>
          <button onClick={()=>setViewMode('list')} style={{padding:'7px 14px',background:viewMode==='list'?'#1a1a2e':'white',color:viewMode==='list'?'white':'#333',border:'none',fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:'pointer'}}>☰ רשימה</button>
        </div>
        <button onClick={()=>setModal({initialStatus:'פתוח'})} style={{padding:'10px 20px',background:'#e85d26',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:700,fontSize:15,cursor:'pointer',boxShadow:'0 4px 12px rgba(232,93,38,0.3)'}}>+ משימה חדשה</button>
      </div>
    </div>

    {viewMode==='list'&&<div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
      {['הכל','פתוח','בתהליך','הושלם'].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:'6px 14px',border:'2px solid',borderColor:filter===s?'#e85d26':'#e5e7eb',borderRadius:20,background:filter===s?'#e85d26':'white',color:filter===s?'white':'#374151',fontFamily:'Heebo',fontWeight:600,fontSize:13,cursor:'pointer'}}>{s}</button>)}
      <div style={{width:1,background:'#e5e7eb',margin:'0 4px'}}/>
      {['הכל','גבוה','בינוני','נמוך'].map(p=><button key={p} onClick={()=>setPriorityFilter(p)} style={{padding:'6px 14px',border:'2px solid',borderColor:priorityFilter===p?'#1a1a2e':'#e5e7eb',borderRadius:20,background:priorityFilter===p?'#1a1a2e':'white',color:priorityFilter===p?'white':'#374151',fontFamily:'Heebo',fontWeight:600,fontSize:13,cursor:'pointer'}}>{p==='הכל'?'כל עדיפות':p}</button>)}
    </div>}

    {viewMode==='kanban'&&(tasks.length===0
      ?<div style={{textAlign:'center',padding:'60px 0',color:'#9ca3af'}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontSize:18,fontWeight:700}}>אין משימות</div><div style={{fontSize:14,marginTop:4}}>לחץ "+ משימה חדשה" להתחיל</div></div>
      :<KanbanBoard tasks={tasks} data={data} onEdit={t=>setModal({task:t})} onDel={delTask} onStatusChange={changeStatus} onAddInCol={s=>setModal({initialStatus:s})}/>
    )}
    {viewMode==='list'&&(<div style={{display:'flex',flexDirection:'column',gap:10}}>
      {filtered.map(t=>{
        const due=fmtDue(t.dueDate);
        const cand=t.candidateId?data.candidates.find(c=>c.id===t.candidateId):null;
        const emp=t.employerId?data.employers.find(e=>e.id===t.employerId):null;
        const done=t.status==='הושלם';
        return <div key={t.id} style={{background:'white',borderRadius:14,padding:'16px 20px',boxShadow:'0 2px 12px rgba(0,0,0,0.06)',border:`1.5px solid ${done?'#e5e7eb':'#f3f4f6'}`,opacity:done?0.75:1,display:'flex',gap:14,alignItems:'flex-start'}}>
          {/* Checkbox */}
          <button onClick={()=>toggleStatus(t)} style={{width:24,height:24,borderRadius:12,border:`2px solid ${done?'#16a34a':t.status==='בתהליך'?'#f59e0b':'#d1d5db'}`,background:done?'#16a34a':t.status==='בתהליך'?'#fffbeb':'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,color:'white',fontSize:13,transition:'all .2s'}}>
            {done?'✓':t.status==='בתהליך'?'…':''}
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:15,color:done?'#9ca3af':'#1a1a2e',textDecoration:done?'line-through':'none',flex:1}}>{t.title}</div>
              <div style={{display:'flex',gap:6,flexShrink:0,alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:20,background:PRIORITY_COLORS[t.priority]||'#f3f4f6',color:PRIORITY_TEXT[t.priority]||'#6b7280'}}>{t.priority}</span>
                <span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:20,background:STATUS_COLORS[t.status]||'#f3f4f6',color:STATUS_TEXT[t.status]||'#6b7280'}}>{t.status}</span>
              </div>
            </div>
            {t.description&&<div style={{fontSize:13,color:'#6b7280',marginBottom:8,lineHeight:1.6}}>{t.description}</div>}
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              {due&&<span style={{fontSize:12,fontWeight:600,color:due.color}}>📅 {due.text}</span>}
              {cand&&<span style={{fontSize:12,background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:6,padding:'2px 8px',color:'#c94d1a',fontWeight:600}}>👤 {cand.name}</span>}
              {emp&&<span style={{fontSize:12,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:6,padding:'2px 8px',color:'#1d4ed8',fontWeight:600}}>🏢 {emp.name}</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <button onClick={()=>setModal({task:t})} style={{padding:'6px 10px',background:'#f3f4f6',border:'none',borderRadius:6,cursor:'pointer',fontSize:13}}>✏️</button>
            <button onClick={()=>delTask(t.id)} style={{padding:'6px 10px',background:'#fde8dc',border:'none',borderRadius:6,cursor:'pointer',fontSize:13}}>🗑</button>
          </div>
        </div>
      })}
    </div>)}
  {modal!==null&&<TaskModal task={modal.task} initialStatus={modal.initialStatus} data={data} onSave={saveTask} onClose={()=>setModal(null)}/>}
  </div>
}


// ── CANDIDATE HUNTER ──────────────────────────────────────────────────────────
function CandidateHunter({data}){
  const [domain,setDomain]=React.useState('');
  const [role,setRole]=React.useState('');
  const [city,setCity]=React.useState('');
  const [freeText,setFreeText]=React.useState('');
  const [includeHired,setIncludeHired]=React.useState(true);
  const [selJob,setSelJob]=React.useState('');
  const [results,setResults]=React.useState(null);
  const [searched,setSearched]=React.useState(false);

  const allCities=[...new Set(data.candidates.map(c=>c.city).filter(Boolean))].sort();
  const allDomains=[...new Set([
    ...(data.jobDomains||[]).map(d=>d.name),
    ...data.candidates.map(c=>c.domain).filter(Boolean)
  ])].sort();
  const allRoles=[...new Set([
    ...(data.jobDomains||[]).flatMap(d=>d.roles||[]),
    ...data.candidates.map(c=>c.role).filter(Boolean)
  ])].filter(r=>!domain||(data.jobDomains||[]).find(d=>d.name===domain)?.roles.includes(r)||data.candidates.some(c=>c.domain===domain&&c.role===r)).sort();

  // Load from job
  const loadFromJob=()=>{
    const job=data.jobs.find(j=>j.id===selJob);
    if(!job) return;
    setDomain(job.domain||'');
    setRole(job.role||'');
    setCity('');
    setFreeText('');
  };

  // Scoring
  const score=(c,ft)=>{
    let s=0;
    const cDomain=(c.domain||'').trim().toLowerCase();
    const cRole=(c.role||'').trim().toLowerCase();
    const cCity=(c.city||'').trim().toLowerCase();
    const sDomain=domain.trim().toLowerCase();
    const sRole=role.trim().toLowerCase();
    const sCity=city.trim().toLowerCase();

    if(sDomain){
      if(cDomain===sDomain) s+=35;
      else if(cDomain.includes(sDomain)||sDomain.includes(cDomain)) s+=15;
    } else {
      s+=35; // no domain filter = full points
    }
    if(sRole){
      if(cRole===sRole) s+=25;
      else if(cRole.includes(sRole)||sRole.includes(cRole)) s+=12;
    } else {
      s+=25; // no role filter = full points
    }
    if(sCity){
      if(cCity===sCity||cCity.includes(sCity)||sCity.includes(cCity)) s+=20;
    } else {
      s+=20; // no city filter = full points
    }
    if(ft){
      const hay=[c.name,c.role,c.domain,c.city,c.experience,c.education,c.notes].join(' ').toLowerCase();
      if(hay.includes(ft.toLowerCase())) s+=15;
    }
    return s;
  };

  const hunt=()=>{
    const ft=freeText.trim();
    if(!domain&&!role&&!city&&!ft){alert('יש להזין לפחות קריטריון אחד');return;}
    const sDomain=domain.trim().toLowerCase();
    const sRole=role.trim().toLowerCase();
    const sCity=city.trim().toLowerCase();
    const candidates=data.candidates.filter(c=>{
      if(!includeHired && c.status==='הוצב') return false;
      // hard filters — if selected must match
      if(sDomain){
        const cd=(c.domain||'').trim().toLowerCase();
        if(!cd.includes(sDomain)&&!sDomain.includes(cd)) return false;
      }
      if(sRole){
        const cr=(c.role||'').trim().toLowerCase();
        if(!cr.includes(sRole)&&!sRole.includes(cr)) return false;
      }
      if(sCity){
        const cc=(c.city||'').trim().toLowerCase();
        if(!cc.includes(sCity)&&!sCity.includes(cc)) return false;
      }
      if(ft){
        const hay=[c.name,c.role,c.domain,c.city,c.experience,c.education,c.notes].join(' ').toLowerCase();
        if(!hay.includes(ft.toLowerCase())) return false;
      }
      return true;
    });
    const scored=candidates
      .map(c=>({...c,_score:score(c,ft)}))
      .sort((a,b)=>b._score-a._score);
    setResults(scored);
    setSearched(true);
  };

  const reset=()=>{setDomain('');setRole('');setCity('');setFreeText('');setRoleSearch('');setRoleOpen(false);setSelJob('');setResults(null);setSearched(false);};

  const tier=(s)=>s>=70?'high':s>=40?'mid':'low';
  const tierLabel={high:{label:'התאמה גבוהה',color:'#16a34a',bg:'#f0fdf4',border:'#86efac'},mid:{label:'התאמה חלקית',color:'#d97706',bg:'#fffbeb',border:'#fcd34d'},low:{label:'התאמה חלשה',color:'#6b7280',bg:'#f9fafb',border:'#e5e7eb'}};

  const high=results?results.filter(c=>tier(c._score)==='high'):[];
  const mid=results?results.filter(c=>tier(c._score)==='mid'):[];

  const [msgTarget,setMsgTarget]=React.useState(null);
  const [roleSearch,setRoleSearch]=React.useState('');
  const [roleOpen,setRoleOpen]=React.useState(false);

  const filteredRoles=allRoles.filter(r=>!roleSearch||r.includes(roleSearch));

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:9,border:'1.5px solid rgba(255,255,255,0.2)',background:'rgba(255,255,255,0.08)',color:'white',fontFamily:'Heebo',fontSize:14,outline:'none'};
  const labelStyle={fontSize:12,color:'rgba(255,255,255,0.55)',fontWeight:700,marginBottom:6,display:'block'};

  return <div style={{padding:28}} className="mobile-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h1 style={{fontSize:28,fontWeight:800}}>🎯 צייד מועמדים</h1>
      {searched&&<Btn onClick={reset}>🔄 חיפוש חדש</Btn>}
    </div>

    {/* Search panel */}
    <div className="sbox" style={{background:'#1a1a2e',borderRadius:16,padding:'24px 28px',marginBottom:24,color:'white'}}>
      <div style={{fontWeight:800,fontSize:15,marginBottom:20,display:'flex',alignItems:'center',gap:8}}>
        <span>🔍</span> הגדר דרישות לציד
      </div>

      {/* Grid 3 columns */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:18,marginBottom:18}}>

        {/* Domain dropdown */}
        <div>
          <label style={labelStyle}>תחום מקצועי</label>
          <select value={domain} onChange={e=>{setDomain(e.target.value);setRole('');setRoleSearch('');}}
            style={{...inputStyle,cursor:'pointer'}}>
            <option value="">-- כל התחומים --</option>
            {allDomains.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
        </div>

        {/* Role — searchable */}
        <div style={{position:'relative'}}>
          <label style={labelStyle}>תפקיד {domain&&<span style={{color:'rgba(255,255,255,0.4)',fontWeight:400}}>({allRoles.length} תפקידים)</span>}</label>
          <input
            value={role||roleSearch}
            onChange={e=>{setRoleSearch(e.target.value);setRole('');setRoleOpen(true);}}
            onFocus={()=>setRoleOpen(true)}
            onBlur={()=>setTimeout(()=>setRoleOpen(false),150)}
            placeholder={domain?'חפש תפקיד...':'בחר תחום תחילה'}
            disabled={!domain}
            style={{...inputStyle,opacity:domain?1:0.4,cursor:domain?'text':'not-allowed'}}/>
          {role&&<div style={{position:'absolute',left:10,top:'50%',transform:'translateY(-2px)',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:16}} onClick={()=>{setRole('');setRoleSearch('');}}>✕</div>}
          {roleOpen&&domain&&filteredRoles.length>0&&(
            <div style={{position:'absolute',top:'100%',right:0,left:0,background:'#2d2d44',borderRadius:10,border:'1px solid rgba(255,255,255,0.15)',zIndex:99,maxHeight:220,overflowY:'auto',boxShadow:'0 8px 32px rgba(0,0,0,0.4)',marginTop:4}}>
              {filteredRoles.map(r=>(
                <div key={r} onMouseDown={()=>{setRole(r);setRoleSearch('');setRoleOpen(false);}}
                  style={{padding:'10px 14px',cursor:'pointer',fontSize:13,color:'white',borderBottom:'1px solid rgba(255,255,255,0.06)',
                    background:role===r?'rgba(232,93,38,0.3)':'transparent'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.08)'}
                  onMouseLeave={e=>e.currentTarget.style.background=role===r?'rgba(232,93,38,0.3)':'transparent'}>
                  {r}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* City dropdown */}
        <div>
          <label style={labelStyle}>אזור / עיר</label>
          <select value={city} onChange={e=>setCity(e.target.value)}
            style={{...inputStyle,cursor:'pointer'}}>
            <option value="">-- כל האזורים --</option>
            {allCities.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>

      {/* Row 2: Load from job + free text + toggle + hunt */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:18}}>
        {/* Load from job */}
        <div>
          <label style={labelStyle}>טען ממשרה קיימת</label>
          <div style={{display:'flex',gap:8}}>
            <select value={selJob} onChange={e=>setSelJob(e.target.value)}
              style={{...inputStyle,flex:1,cursor:'pointer'}}>
              <option value="">-- בחר משרה --</option>
              {data.jobs.map(j=><option key={j.id} value={j.id}>{j.jobNumber} — {j.title} ({j.status})</option>)}
            </select>
            <button onClick={loadFromJob} disabled={!selJob}
              style={{padding:'10px 16px',background:selJob?'#e85d26':'rgba(255,255,255,0.1)',color:'white',border:'none',borderRadius:9,fontFamily:'Heebo',fontWeight:700,fontSize:13,cursor:selJob?'pointer':'not-allowed',flexShrink:0}}>
              טען
            </button>
          </div>
        </div>

        {/* Free text */}
        <div>
          <label style={labelStyle}>🔎 חיפוש חופשי</label>
          <input value={freeText} onChange={e=>setFreeText(e.target.value)}
            placeholder="שם, השכלה, הערות..."
            onKeyDown={e=>e.key==='Enter'&&hunt()}
            style={inputStyle}/>
        </div>
      </div>

      {/* Bottom row: toggle + hunt */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>setIncludeHired(v=>!v)}
            style={{width:40,height:22,borderRadius:11,background:includeHired?'#e85d26':'rgba(255,255,255,0.2)',border:'none',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
            <div style={{position:'absolute',top:3,right:includeHired?3:19,width:16,height:16,borderRadius:8,background:'white',transition:'right .2s'}}/>
          </button>
          <span style={{fontSize:13,color:'rgba(255,255,255,0.75)'}}>כולל מועמדים שהוצבו בעבר 🏅</span>
        </div>
        <button onClick={hunt}
          style={{padding:'11px 36px',background:'#e85d26',color:'white',border:'none',borderRadius:10,fontFamily:'Heebo',fontWeight:800,fontSize:16,cursor:'pointer',boxShadow:'0 4px 16px rgba(232,93,38,0.4)'}}>
          🎯 צייד!
        </button>
      </div>
    </div>

    {/* Results */}
    {searched&&results!==null&&(
      <div>
        {results.length===0
          ? <div className="sbox" style={{textAlign:'center',padding:40,color:MUT}}>
              <div style={{fontSize:48,marginBottom:12}}>🔍</div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>לא נמצאו מועמדים מתאימים</div>
              <div style={{fontSize:13}}>נסה להרחיב את קריטריוני החיפוש</div>
            </div>
          : <>
              <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
                <div style={{fontWeight:700,fontSize:16}}>נמצאו <span style={{color:ACC,fontSize:20}}>{results.length}</span> מועמדים</div>
                <div style={{display:'flex',gap:8}}>
                  {high.length>0&&<span style={{background:'#f0fdf4',color:'#16a34a',border:'1px solid #86efac',borderRadius:20,padding:'3px 10px',fontSize:12,fontWeight:700}}>🟢 {high.length} התאמה גבוהה</span>}
                  {mid.length>0&&<span style={{background:'#fffbeb',color:'#d97706',border:'1px solid #fcd34d',borderRadius:20,padding:'3px 10px',fontSize:12,fontWeight:700}}>🟡 {mid.length} התאמה חלקית</span>}
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {results.map(c=>{
                  const t=tierLabel[tier(c._score)];
                  const prevJob=c.status==='הוצב'?data.jobs.find(j=>c.appliedJobs?.includes(j.id)&&j.status!=='פתוח')||data.jobs.find(j=>c.appliedJobs?.includes(j.id)):null;
                  return <div key={c.id} style={{background:'white',borderRadius:14,padding:'16px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`1.5px solid ${t.border}`,display:'flex',alignItems:'center',gap:16}}>
                    {/* Score ring */}
                    <div style={{width:52,height:52,borderRadius:26,background:t.bg,border:`3px solid ${t.color}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <div style={{fontWeight:800,fontSize:15,color:t.color}}>{c._score}</div>
                    </div>
                    {/* Info */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>{c.name}</span>
                        <Tag label={c.status}/>
                        {c.status==='הוצב'&&<span style={{fontSize:11,background:'#fef3c7',color:'#92400e',border:'1px solid #fcd34d',borderRadius:4,padding:'1px 6px',fontWeight:700}}>🏅 הוצב</span>}
                        <span style={{fontSize:11,background:t.bg,color:t.color,border:`1px solid ${t.border}`,borderRadius:4,padding:'1px 6px',fontWeight:700}}>{t.label}</span>
                      </div>
                      <div style={{display:'flex',gap:16,fontSize:12,color:MUT,flexWrap:'wrap'}}>
                        {c.domain&&<span>🏷 {c.domain}</span>}
                        {c.role&&<span>👤 {c.role}</span>}
                        {c.city&&<span>📍 {c.city}</span>}
                        {c.experience&&<span>⏱ {c.experience}</span>}
                        {prevJob&&<span style={{color:'#7c3aed',fontWeight:600}}>📌 הושם ב: {prevJob.title}</span>}
                      </div>
                    </div>
                    {/* Score bars */}
                    <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:120}}>
                      {[['תחום',domain&&c.domain===domain?35:0,35],['תפקיד',role&&c.role===role?25:0,25],['אזור',!city||c.city===city?20:0,20]].map(([lbl,val,max])=>(
                        <div key={lbl} style={{display:'flex',alignItems:'center',gap:6}}>
                          <div style={{fontSize:10,color:MUT,width:32,textAlign:'right'}}>{lbl}</div>
                          <div style={{flex:1,height:6,background:'#f0ede6',borderRadius:3,overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${(val/max)*100}%`,background:val===max?'#16a34a':'#e5e7eb',borderRadius:3,transition:'width .3s'}}/>
                          </div>
                        </div>
                      ))}
                    </div>
                    {/* Actions */}
                    <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                      <button onClick={()=>setMsgTarget(c)}
                        style={{padding:'8px 14px',background:'#fff5f0',border:'1.5px solid #fcd5c0',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:12,cursor:'pointer',color:'#c94d1a',whiteSpace:'nowrap'}}>
                        ✉️ שלח הצעה
                      </button>
                      {c.phone&&<button onClick={()=>{const p=(c.phone||'').replace(/[-\s]/g,'').replace(/^0/,'972');window.open(`https://wa.me/${p}`,'_blank');}}
                        style={{padding:'8px 14px',background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:12,cursor:'pointer',color:'#15803d',whiteSpace:'nowrap'}}>
                        💬 WhatsApp
                      </button>}
                    </div>
                  </div>;
                })}
              </div>
            </>
        }
      </div>
    )}

    {!searched&&<div style={{textAlign:'center',padding:'60px 0',color:MUT}}>
      <div style={{fontSize:64,marginBottom:16}}>🎯</div>
      <div style={{fontWeight:700,fontSize:18,marginBottom:8,color:'#1a1a2e'}}>מוכן לצוד מועמדים</div>
      <div style={{fontSize:14}}>הגדר דרישות למעלה ולחץ "צייד!" כדי למצוא את המועמדים המתאימים ביותר</div>
    </div>}

    {msgTarget&&<MessageModal
      type="candidate"
      person={msgTarget}
      job={data.jobs.find(j=>msgTarget.appliedJobs?.includes(j.id))}
      employer={null}
      candidate={msgTarget}
      onClose={()=>setMsgTarget(null)}
    />}
  </div>;
}

function Settings({data,setData}){
  const [tab,setTab]=React.useState('general');
  // General tab state
  const [company,setCompany]=React.useState(()=>data.company||{name:'טופ גרופ גיוס והשמה',email:'hr@topgroup4u.com',phone:''});
  const saveCompany=()=>{setData(d=>({...d,company}));alert('✅ פרטי החברה נשמרו!');};
  // Users tab state
  const [users,setUsers]=React.useState(()=>data.users||[{id:'u1',name:'מנהל מערכת',email:'admin@topgroup4u.com',role:'מנהל',status:'פעיל'}]);
  const [userModal,setUserModal]=React.useState(null);
  const [userForm,setUserForm]=React.useState({});
  const openAddUser=()=>{setUserForm({name:'',email:'',role:'רקרוטר',status:'פעיל'});setUserModal('add');};
  const openEditUser=u=>{setUserForm({...u});setUserModal('edit');};
  const saveUser=()=>{
    if(userModal==='add'){const nu={...userForm,id:'u'+Date.now()};setUsers(us=>[...us,nu]);setData(d=>({...d,users:[...users,nu]}));}
    else{const updated=users.map(u=>u.id===userForm.id?userForm:u);setUsers(updated);setData(d=>({...d,users:updated}));}
    setUserModal(null);
  };
  const delUser=id=>{if(!confirm('למחוק משתמש?'))return;const updated=users.filter(u=>u.id!==id);setUsers(updated);setData(d=>({...d,users:updated}));};
  // Statuses tab state
  const defaultStatuses={candidates:['חדש','בתהליך','ראיון נקבע','הוצב','נדחה'],jobs:['פתוח','ממתין','סגור'],employers:['פעיל','פסיבי']};
  const [statuses,setStatuses]=React.useState(()=>data.statuses||defaultStatuses);
  const [newStatus,setNewStatus]=React.useState({candidates:'',jobs:'',employers:''});
  const addStatus=(key)=>{const v=newStatus[key].trim();if(!v)return;const updated={...statuses,[key]:[...statuses[key],v]};setStatuses(updated);setData(d=>({...d,statuses:updated}));setNewStatus(n=>({...n,[key]:''}));};
  const delStatus=(key,item)=>{const updated={...statuses,[key]:statuses[key].filter(s=>s!==item)};setStatuses(updated);setData(d=>({...d,statuses:updated}));};

  const tabs=[{id:'general',label:'כללי'},{id:'users',label:'משתמשים'},{id:'domains',label:'תחומים ותפקידים'},{id:'statuses',label:'סטטוסים'},{id:'notifications',label:'התראות'}];

function ResetPasswordScreen({onDone}){
  const [password,setPassword]=React.useState('');
  const [confirm,setConfirm]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [error,setError]=React.useState('');
  const [success,setSuccess]=React.useState(false);

  const handleReset=async e=>{
    e.preventDefault();
    if(password.length<6){setError('הסיסמה חייבת להכיל לפחות 6 תווים');return;}
    if(password!==confirm){setError('הסיסמאות אינן תואמות');return;}
    setLoading(true);setError('');
    try{
      const {error:err}=await sb.auth.updateUser({password});
      if(err){setError(err.message);setLoading(false);return;}
      setSuccess(true);
      setTimeout(()=>onDone(),2000);
    }catch(e){setError('שגיאה בעדכון הסיסמה');setLoading(false);}
  };

  return <div style={{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{width:'100%',maxWidth:400}}>
      <div style={{textAlign:'center',marginBottom:40}}>
        <div style={{fontSize:42,fontWeight:900,color:'#e85d26',lineHeight:1}}>טופ גרופ</div>
        <div style={{fontSize:16,color:'rgba(255,255,255,0.5)',marginTop:6}}>גיוס והשמה · מערכת CRM</div>
      </div>
      <div style={{background:'white',borderRadius:20,padding:'32px 28px',boxShadow:'0 24px 80px rgba(0,0,0,0.4)'}}>
        {success
          ?<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:56,marginBottom:16}}>✅</div>
            <div style={{fontSize:20,fontWeight:800,color:'#16a34a',marginBottom:8}}>הסיסמה עודכנה!</div>
            <div style={{fontSize:14,color:'#6b7280'}}>מועבר למסך הכניסה...</div>
          </div>
          :<form onSubmit={handleReset}>
            <h2 style={{fontSize:22,fontWeight:800,color:'#1a1a2e',marginBottom:4}}>הגדרת סיסמה חדשה</h2>
            <p style={{fontSize:14,color:'#6b7280',marginBottom:24}}>בחר סיסמה חדשה לחשבון שלך</p>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>סיסמה חדשה</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="לפחות 6 תווים"
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontSize:15,outline:'none'}}
                onFocus={e=>e.target.style.borderColor='#e85d26'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:'block',fontSize:13,fontWeight:700,color:'#374151',marginBottom:6}}>אישור סיסמה</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="הכנס שוב את הסיסמה"
                style={{width:'100%',padding:'12px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontFamily:'Heebo',fontSize:15,outline:'none'}}
                onFocus={e=>e.target.style.borderColor='#e85d26'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
            </div>
            {error&&<div style={{background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:8,padding:'10px 14px',fontSize:14,color:'#c94d1a',marginBottom:16,textAlign:'center'}}>⚠️ {error}</div>}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=React.useState(null);
  const [authLoading,setAuthLoading]=React.useState(true);

  const [resetMode,setResetMode]=React.useState(false);

  React.useEffect(()=>{
    // Check for password reset token in URL hash
    const hash=window.location.hash;
    if(hash.includes('type=recovery')||hash.includes('access_token')){
      setResetMode(true);
      setAuthLoading(false);
      return;
    }
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='PASSWORD_RECOVERY'){setResetMode(true);setAuthLoading(false);return;}
      setSession(session);
      setAuthLoading(false);
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(authLoading) return <div style={{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{color:'rgba(255,255,255,0.5)',fontSize:16}}>טוען...</div>
  </div>;

  if(resetMode) return <ResetPasswordScreen onDone={()=>{setResetMode(false);window.location.hash='';}} />;
  if(!session) return <LoginScreen onLogin={s=>setSession(s)}/>;

  return <AppInner/>;
}

function AppInner(){
  const [page,setPage]=React.useState(()=>localStorage.getItem('crm_page')||'dashboard');
  const [syncStatus,setSyncStatus]=React.useState('syncing');
  const [data,setData]=React.useState(()=>{
    try{
      const saved=localStorage.getItem('crm_data');
      if(!saved)return INIT;
      const p=JSON.parse(saved);
      let nextN=1;
      const jobs=(p.jobs||[]).map(j=>{
        const mj={domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j};
        if(!mj.jobNumber){mj.jobNumber='TG-'+String(nextN).padStart(3,'0');}
        const n=parseInt((mj.jobNumber||'').replace('TG-',''))||0;
        if(n>=nextN)nextN=n+1;
        return mj;
      });
      return{...p,jobs,candidates:(p.candidates||[]).map(c=>({domain:'',...c})),employers:(p.employers||[]).map(e=>({needs:[],...e})),jobDomains:p.jobDomains||INIT.jobDomains};
    }catch{return INIT;}
  });

  // Load from Supabase on startup
  React.useEffect(()=>{
    loadFromSupabase().then(sbData=>{
      if(sbData&&(sbData.employers?.length||sbData.jobs?.length||sbData.candidates?.length||sbData.jobDomains?.length)){
        const jobs=(sbData.jobs||[]).map(j=>({domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j}));
        const merged={...sbData,jobs,candidates:(sbData.candidates||[]).map(c=>({domain:'',...c})),employers:(sbData.employers||[]).map(e=>({needs:[],...e})),jobDomains:sbData.jobDomains?.length?sbData.jobDomains:INIT.jobDomains};
        setData(merged);
        localStorage.setItem('crm_data',JSON.stringify(merged));
        setSyncStatus('ok');
      }else{
        const local=JSON.parse(localStorage.getItem('crm_data')||'null');
        saveToSupabase(local||INIT).then(ok=>setSyncStatus(ok?'ok':'error'));
      }
    }).catch(()=>setSyncStatus('error'));
  },[]);

  // Auto-refresh from Supabase every 10 seconds
  React.useEffect(()=>{
    const interval=setInterval(()=>{
      loadFromSupabase().then(sbData=>{
        if(!sbData)return;
        const jobs=(sbData.jobs||[]).map(j=>({domain:'',role:'',description:'',requirements:'',benefits:'',image:'',publishTitle:'',...j}));
        const merged={...sbData,jobs,candidates:(sbData.candidates||[]).map(c=>({domain:'',...c})),employers:(sbData.employers||[]).map(e=>({needs:[],...e})),jobDomains:sbData.jobDomains?.length?sbData.jobDomains:INIT.jobDomains};
        setData(merged);
        localStorage.setItem('crm_data',JSON.stringify(merged));
        setSyncStatus('ok');
      }).catch(()=>{});
    },10000);
    return()=>clearInterval(interval);
  },[]);

  // Save to Supabase on data change (debounced 1s)
  const isFirst=React.useRef(true);
  const saveTimer=React.useRef(null);
  React.useEffect(()=>{
    if(isFirst.current){isFirst.current=false;return;}
    localStorage.setItem('crm_data',JSON.stringify(data));
    setSyncStatus('syncing');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      saveToSupabase(data).then(ok=>setSyncStatus(ok?'ok':'error'));
    },1000);
  },[data]);

  React.useEffect(()=>{localStorage.setItem('crm_page',page);},[page]);

  const syncBg=syncStatus==='ok'?'#d4edda':syncStatus==='error'?'#fde8dc':'#fff3cd';
  const syncMsg=syncStatus==='syncing'?'🔄 מסנכרן...':syncStatus==='ok'?'☁️ מסונכרן עם Supabase':'⚠️ שגיאת סנכרון';

  // Pending candidates (from landing page, await approval)
  const pending=(data.pendingCandidates||[]).map(id=>data.candidates.find(c=>c.id===id)).filter(Boolean);
  const [showPending,setShowPending]=React.useState(false);

  const approvePending=(cid)=>{
    const cand=data.candidates.find(c=>c.id===cid);
    setData(d=>({
      ...d,
      pendingCandidates:(d.pendingCandidates||[]).filter(id=>id!==cid),
      candidates:d.candidates.map(c=>c.id===cid?{...c,pendingApproval:false}:c),
      activityLog:[mkLog('pending','approved',cand?.name||cid),...(d.activityLog||[])].slice(0,50)
    }));
  };
  const rejectPending=(cid)=>{
    const cand2=data.candidates.find(c=>c.id===cid);
    setData(d=>({
      ...d,
      pendingCandidates:(d.pendingCandidates||[]).filter(id=>id!==cid),
      candidates:d.candidates.filter(c=>c.id!==cid),
      activityLog:[mkLog('pending','rejected',cand2?.name||cid),...(d.activityLog||[])].slice(0,50)
    }));
  };

  return <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f5f0e8'}}>
    <div id="desktop-sidebar"><Sidebar active={page} onNav={setPage}/></div>
    <div id="main-content" style={{flex:1,overflow:'auto',minWidth:0}}>
      <div style={{background:syncBg,padding:'3px 14px',fontSize:12,textAlign:'center',borderBottom:'1px solid #ddd'}}>{syncMsg}</div>
      {page==='dashboard'&&<Dashboard data={data} onNav={setPage}/>}
      {page==='employers'&&<Employers data={data} setData={setData}/>}
      {page==='jobs'&&<Jobs data={data} setData={setData}/>}
      {page==='candidates'&&<Candidates data={data} setData={setData}/>}
      {page==='hunter'&&<CandidateHunter data={data}/>}
      {page==='tasks'&&<Tasks data={data} setData={setData}/>}
      {page==='settings'&&<Settings data={data} setData={setData}/>}
    </div>
    <nav id="mobile-nav">
      {NAV.map(item=>(
        <button key={item.id} className={`mnav-btn${page===item.id?' active':''}`} onClick={()=>setPage(item.id)}>
          <span>{item.icon}</span>
          {item.id==='candidates'&&pending.length>0
            ?<span style={{position:'relative'}}>{item.label}<span style={{position:'absolute',top:-8,left:-6,background:'#e85d26',color:'white',borderRadius:10,padding:'0 5px',fontSize:9,fontWeight:800}}>{pending.length}</span></span>
            :<span>{item.label}</span>
          }
        </button>
      ))}
    </nav>

    {/* Pending candidates modal */}
    {showPending&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'white',borderRadius:16,width:'100%',maxWidth:620,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{padding:'20px 24px',borderBottom:'2px solid #f0ede6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'white'}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800}}>🔔 מועמדים ממתינים לאישור</h2>
            <div style={{fontSize:13,color:'#888',marginTop:2}}>מועמדים שהגישו מועמדות דרך דף הנחיתה</div>
          </div>
          <button onClick={()=>setShowPending(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#888'}}>✕</button>
        </div>
        <div style={{padding:16}}>
          {pending.length===0
            ?<div style={{textAlign:'center',padding:40,color:'#aaa'}}>אין מועמדים ממתינים</div>
            :pending.map(c=>{
              const job=data.jobs.find(j=>c.appliedJobs?.includes(j.id));
              return <div key={c.id} style={{border:'2px solid #f0ede6',borderRadius:12,padding:16,marginBottom:12,background:'#fafaf8'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    <div style={{width:44,height:44,borderRadius:22,background:'#e85d26',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:17,flexShrink:0}}>
                      {c.name.charAt(0)}
                    </div>
                    <div>
                      <div style={{fontWeight:800,fontSize:16}}>{c.name}</div>
                      <div style={{fontSize:13,color:'#666'}}>{c.role||c.domain}</div>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'#aaa',textAlign:'left'}}>
                    {c.appliedAt?new Date(c.appliedAt).toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):''}
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:13,color:'#555',marginBottom:12}}>
                  {c.phone&&<span>📞 {c.phone}</span>}
                  {c.email&&<span>✉️ {c.email}</span>}
                  {c.city&&<span>📍 {c.city}</span>}
                  {c.experience&&<span>⏱ {c.experience}</span>}
                  {c.education&&<span>🎓 {c.education}</span>}
                  {c.cv&&<span style={{color:'#16a34a',fontWeight:600}}>📄 CV מצורף</span>}
                </div>
                {job&&<div style={{fontSize:12,background:'#fff5f0',border:'1px solid #fcd5c0',borderRadius:6,padding:'5px 10px',marginBottom:10,color:'#c94d1a',fontWeight:600}}>
                  🔗 משרה: {job.publishTitle||job.title} ({job.jobNumber})
                </div>}
                {c.notes&&<div style={{fontSize:13,color:'#555',background:'#f9fafb',borderRadius:6,padding:'8px 10px',marginBottom:10,fontStyle:'italic'}}>"{c.notes}"</div>}
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>approvePending(c.id)} style={{flex:1,padding:'9px 0',background:'#16a34a',color:'white',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer'}}>
                    ✅ אשר והוסף למועמדים
                  </button>
                  <button onClick={()=>rejectPending(c.id)} style={{padding:'9px 16px',background:'#fde8dc',color:'#c94d1a',border:'none',borderRadius:8,fontFamily:'Heebo',fontWeight:700,fontSize:14,cursor:'pointer'}}>
                    ✕ דחה
                  </button>
                </div>
              </div>;
            })
          }
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
