<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופ גרופ – דרושים</title>

<meta property="og:type" content="website">
<meta property="og:site_name" content="טופ גרופ גיוס והשמה">
<meta property="og:title" content="משרה חדשה – טופ גרופ גיוס והשמה">
<meta property="og:description" content="הצטרף לצוות שלנו! הגש מועמדות עכשיו דרך טופ גרופ גיוס והשמה">
<meta property="og:image" content="https://crm-hr.topgroup4u.com/og-default.png">
<meta property="og:url" content="https://crm-hr.topgroup4u.com">
<meta property="og:locale" content="he_IL">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="משרה חדשה – טופ גרופ">
<meta name="twitter:description" content="הגש מועמדות עכשיו">
<meta name="twitter:image" content="https://crm-hr.topgroup4u.com/og-default.png">

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --accent: #e85d26;
  --accent-dark: #c94d1a;
  --dark: #1a1a2e;
  --muted: #6b7280;
  --bg: #f8f7f4;
  --white: #ffffff;
  --border: #e5e7eb;
  --success: #16a34a;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--dark); direction: rtl; }

.hero-wrap { max-width: 780px; margin: 28px auto 0; padding: 0 20px; }
.hero-brand-bar { background: #1a1a2e; border-radius: '14px 14px 0 0'; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-radius: 14px 14px 0 0; }
.hero-brand-logo { color: var(--accent); font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
.hero-brand-sub { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 500; }
.hero { position: relative; width: 100%; height: 320px; overflow: hidden; background: var(--dark); border-radius: 0 0 14px 14px; }
.hero-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.6; }
.hero-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4e 50%, #e85d26 100%); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,26,46,0.92) 0%, rgba(26,26,46,0.15) 60%, transparent 100%); }
.hero-content { position: absolute; bottom: 0; right: 0; left: 0; padding: 24px 28px; }
.hero-brand-name { display: none; }
.hero-job-title { color: white; font-size: 30px; font-weight: 900; line-height: 1.15; }
.hero-job-number { color: rgba(255,255,255,0.45); font-size: 12px; margin-top: 6px; }
.hero-badge { display: none; }

.tags-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 40px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 58px; }
.tag { display: inline-flex; align-items: center; gap: 6px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 20px; padding: 6px 14px; font-size: 14px; color: #374151; font-weight: 500; }
.tag-salary { background: #fff5f0; border-color: #fcd5c0; color: var(--accent-dark); font-weight: 700; }
.tag-company { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

.page { max-width: 780px; margin: 0 auto; padding: 32px 20px 80px; }

.section-card { background: var(--white); border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
.section-header { display: flex; align-items: center; gap: 12px; padding: 22px 28px 0; margin-bottom: 14px; }
.section-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.si-orange { background: #fff5f0; }
.si-blue { background: #eff6ff; }
.si-green { background: #f0fdf4; }
.section-title-txt { font-size: 18px; font-weight: 800; color: var(--dark); }
.section-divider { height: 2px; background: linear-gradient(to left, transparent, #f3f4f6 80%); margin: 0 28px 18px; }
.section-body { padding: 0 28px 24px; font-size: 15px; color: #374151; line-height: 1.85; white-space: pre-wrap; }

.form-card { background: var(--white); border-radius: 16px; box-shadow: var(--shadow-lg); padding: 32px 28px; margin-bottom: 20px; border-top: 4px solid var(--accent); }
.form-headline { font-size: 24px; font-weight: 900; color: var(--dark); margin-bottom: 4px; }
.form-subline { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 13px; font-weight: 700; color: #374151; }
.form-input { padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Heebo'; font-size: 15px; color: var(--dark); background: #fafafa; transition: all .2s; outline: none; }
.form-input:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3px rgba(232,93,38,0.1); }
.form-textarea { resize: vertical; min-height: 100px; }

.cv-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: all .2s; background: #fafafa; }
.cv-zone:hover { border-color: var(--accent); background: #fff8f5; }
.cv-zone.has-file { border-color: var(--success); background: #f0fdf4; border-style: solid; }
.cv-zone-icon { font-size: 38px; margin-bottom: 10px; }
.cv-zone-text { font-size: 15px; font-weight: 600; color: #374151; }
.cv-zone-sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }
.cv-filename { font-size: 13px; color: var(--success); font-weight: 700; margin-top: 8px; display: none; }

.form-error { display: none; background: #fff5f0; border: 1px solid #fcd5c0; border-radius: 8px; padding: 12px 16px; font-size: 14px; color: var(--accent-dark); margin-bottom: 16px; }

.submit-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-family: 'Heebo'; font-size: 17px; font-weight: 800; cursor: pointer; transition: all .2s; box-shadow: 0 4px 16px rgba(232,93,38,0.3); }
.submit-btn:hover:not(:disabled) { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,93,38,0.4); }
.submit-btn:disabled { background: #d1d5db; cursor: not-allowed; transform: none; box-shadow: none; }

.success-card { background: var(--white); border-radius: 16px; box-shadow: var(--shadow-lg); padding: 56px 28px; text-align: center; }
.success-icon { font-size: 72px; margin-bottom: 20px; display: block; animation: pop .4s ease; }
@keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.15)} 100%{transform:scale(1)} }
.success-title { font-size: 28px; font-weight: 900; color: var(--success); margin-bottom: 12px; }
.success-body { font-size: 16px; color: var(--muted); line-height: 1.7; }

.back-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 100;
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(8px);
  border: none;
  color: white;
  border-radius: 50px;
  padding: 10px 18px;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  text-decoration: none;
  transition: background .2s;
}
.back-btn:hover { background: rgba(26,26,46,1); }

.footer { text-align: center; color: #9ca3af; font-size: 13px; padding: 20px 0 40px; border-top: 1px solid var(--border); margin-top: 8px; }
.footer strong { color: var(--accent); }

.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; }
.spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .hero { height: 220px; }
  .hero-wrap { padding: 0 12px; margin-top: 16px; }
  .hero-content { padding: 16px 18px; }
  .hero-job-title { font-size: 22px; }
  .tags-bar { padding: 0 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .section-header { padding: 18px 20px 0; }
  .section-body { padding: 0 20px 20px; }
  .form-card { padding: 24px 16px; }
}
</style>
</head>
<body>

<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:15px;color:#9ca3af">טוען משרה...</div>
  </div>
</div>

<script>
(function(){
  const SB_URL = 'https://rdzmwtixtfenmojeugyx.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkem13dGl4dGZlbm1vamV1Z3l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjcxODUsImV4cCI6MjA5MjM0MzE4NX0.FUHtMO-wRs0B0weWGuDxSbXflx7RsVOGVYbC7kUrn0M';
  const sb = supabase.createClient(SB_URL, SB_KEY);
  const root = document.getElementById('root');

  function getJobId() {
    const p = new URLSearchParams(window.location.search);
    if (p.get('id')) return p.get('id');
    const m = window.location.pathname.match(/\/job\/(.+)/);
    if (m) return m[1];
    return null;
  }

  function getJobFromBase64() {
    try {
      const m = window.location.search.match(/[?&]job=([^&]+)/);
      if (m) {
        const d = decodeURIComponent(m[1]);
        try { return JSON.parse(decodeURIComponent(escape(atob(d)))); }
        catch(e) { return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(d), c=>c.charCodeAt(0)))); }
      }
      const h = window.location.hash.slice(1);
      if (h) return JSON.parse(decodeURIComponent(escape(atob(h))));
    } catch(e) {}
    return null;
  }

  async function init() {
    const jobId = getJobId();
    if (jobId) {
      try {
        const { data, error } = await sb.from('crm_state').select('data').eq('id','main').single();
        if (!error && data?.data?.jobs) {
          const job = data.data.jobs.find(j => j.id === jobId);
          if (job) { renderJob(job); return; }
        }
      } catch(e) {}
      showError(); return;
    }
    const job = getJobFromBase64();
    if (job) { renderJob(job); return; }
    showError();
  }

  function showError() {
    root.innerHTML = `<div style="max-width:500px;margin:80px auto;padding:20px;text-align:center">
      <div style="font-size:64px;margin-bottom:20px">😕</div>
      <div style="font-size:24px;font-weight:800;margin-bottom:10px">המשרה לא נמצאה</div>
      <div style="font-size:15px;color:#6b7280">הקישור שגוי – פנה למגייס שלך לקבלת קישור מעודכן.</div>
    </div>`;
  }

  function fmt(s) { return (s||'').replace(/\B(?=(\d{3})+(?!\d))/g,','); }

  function renderJob(job) {
    document.title = `${job.publishTitle||job.title} – טופ גרופ גיוס והשמה`;

    const tags = [
      job.location    ? `<div class="tag">📍 ${job.location}</div>` : '',
      job.type        ? `<div class="tag">💼 ${job.type}</div>` : '',
      job.domain      ? `<div class="tag">🏷 ${job.domain}</div>` : '',
      job.role        ? `<div class="tag">👤 ${job.role}</div>` : '',
      job.salary      ? `<div class="tag tag-salary">₪ ${fmt(job.salary)}</div>` : '',
      job.employerName? `<div class="tag tag-company">🏢 ${job.employerName}</div>` : '',
    ].filter(Boolean).join('');

    const heroMedia = job.imageUrl
      ? `<img src="${job.imageUrl}" class="hero-img" alt="" onerror="this.outerHTML='<div class=hero-placeholder></div>'">`
      : `<div class="hero-placeholder"></div>`;

    const sections = [
      job.description  ? {icon:'📋',cls:'si-orange',title:'תיאור המשרה',   text:job.description}  : null,
      job.requirements ? {icon:'✅',cls:'si-blue',  title:'דרישות המשרה',   text:job.requirements} : null,
      job.benefits     ? {icon:'🎁',cls:'si-green', title:'מה אנחנו מציעים',text:job.benefits}     : null,
    ].filter(Boolean).map(s=>`
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon ${s.cls}">${s.icon}</div>
          <div class="section-title-txt">${s.title}</div>
        </div>
        <div class="section-divider"></div>
        <div class="section-body">${s.text}</div>
      </div>`).join('');

    root.innerHTML = `
      <div class="hero-wrap">
        <div class="hero-brand-bar">
          <div class="hero-brand-logo">טופ גרופ גיוס והשמה</div>
          <div class="hero-brand-sub">מצאנו את התפקיד המתאים לך</div>
        </div>
        <div class="hero">
          ${heroMedia}
          <div class="hero-overlay"></div>
          <div class="hero-content">
            <div class="hero-job-title">${job.publishTitle||job.title}</div>
            <div class="hero-job-number">${job.jobNumber||''}</div>
          </div>
        </div>
      </div>

      <div class="tags-bar" style="max-width:780px;margin:0 auto;padding:0 20px">${tags}</div>

      <div class="page">
        ${sections}

        <div class="form-card" id="form-card">
          <div class="form-headline">הגשת מועמדות</div>
          <div class="form-subline">מלא את הפרטים ונחזור אליך בהקדם 🚀</div>
          <form id="apply-form" novalidate>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">שם מלא *</label><input class="form-input" name="name" required placeholder="ישראל ישראלי"/></div>
              <div class="form-group"><label class="form-label">טלפון *</label><input class="form-input" name="phone" required placeholder="05X-XXXXXXX"/></div>
              <div class="form-group"><label class="form-label">דוא"ל *</label><input class="form-input" type="email" name="email" required placeholder="name@email.com"/></div>
              <div class="form-group"><label class="form-label">עיר מגורים</label><input class="form-input" name="city" placeholder="תל אביב"/></div>
              <div class="form-group"><label class="form-label">ניסיון רלוונטי</label><input class="form-input" name="experience" placeholder="3 שנים בתחום..."/></div>
              <div class="form-group"><label class="form-label">השכלה</label><input class="form-input" name="education" placeholder="תואר ראשון / תעודה..."/></div>
              <div class="form-group full">
                <label class="form-label">ספר/י לנו קצת על עצמך</label>
                <textarea class="form-input form-textarea" name="notes" placeholder="מה מניע אותך להגיש מועמדות למשרה זו?"></textarea>
              </div>
              <div class="form-group full">
                <label class="form-label">קורות חיים (CV)</label>
                <div class="cv-zone" id="cv-drop" onclick="document.getElementById('cv-input').click()">
                  <div class="cv-zone-icon">📄</div>
                  <div class="cv-zone-text">לחץ להעלאת קובץ CV</div>
                  <div class="cv-zone-sub">PDF, Word – עד 5MB</div>
                  <div class="cv-filename" id="cv-name"></div>
                </div>
                <input type="file" id="cv-input" accept=".pdf,.doc,.docx" style="display:none"/>
              </div>
            </div>
            <div class="form-error" id="form-error"></div>
            <button type="submit" class="submit-btn" id="submit-btn">שלח מועמדות ←</button>
          </form>
        </div>

        <div class="footer"><strong>טופ גרופ</strong> גיוס והשמה &nbsp;·&nbsp; ${job.jobNumber||''}</div>
      </div>`;

    // CV
    let cvFileName = '';
    document.getElementById('cv-input').addEventListener('change', function(){
      const f = this.files[0]; if (!f) return;
      cvFileName = f.name;
      document.getElementById('cv-drop').classList.add('has-file');
      const el = document.getElementById('cv-name');
      el.textContent = '✅ ' + f.name; el.style.display = 'block';
    });

    // Submit
    document.getElementById('apply-form').addEventListener('submit', async function(e){
      e.preventDefault();
      const f = this;
      const errEl = document.getElementById('form-error');
      const btn   = document.getElementById('submit-btn');
      errEl.style.display = 'none';

      const name  = f.name.value.trim();
      const phone = f.phone.value.trim();
      const email = f.email.value.trim();
      if (!name||!phone||!email) {
        errEl.textContent = 'נא למלא את כל השדות המחויבים (*)';
        errEl.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'שולח...';

      const candidate = {
        id: 'c'+Date.now(), name, phone, email,
        city: f.city.value.trim(),
        experience: f.experience.value.trim(),
        education: f.education.value.trim(),
        notes: f.notes.value.trim(),
        cv: !!cvFileName,
        domain: job.domain||'', role: job.role||job.title||'',
        status: 'חדש', appliedJobs: [job.id],
        source: 'landing_page', jobNumber: job.jobNumber,
        pendingApproval: true,
        appliedAt: new Date().toISOString(),
      };

      try {
        // Upload CV to Supabase Storage if file exists
        let cvUrl = '';
        if (cvFileName) {
          const cvFile = document.getElementById('cv-input').files[0];
          if (cvFile) {
            const ext = cvFile.name.split('.').pop();
            const fname = `cv-${candidate.id}.${ext}`;
            const { error: uploadErr } = await sb.storage.from('job-images').upload(fname, cvFile, { upsert: true, contentType: cvFile.type });
            if (!uploadErr) {
              const { data: urlData } = sb.storage.from('job-images').getPublicUrl(fname);
              cvUrl = urlData.publicUrl;
              candidate.cvUrl = cvUrl;
            }
          }
        }

        const { data: rows } = await sb.from('crm_state').select('data').eq('id','main').single();
        const existing = rows?.data || {};
        const candidates = existing.candidates || [];

        if (candidates.some(c => c.phone===phone && c.appliedJobs?.includes(job.id))) {
          errEl.textContent = 'כבר הגשת מועמדות למשרה זו עם מספר טלפון זה.';
          errEl.style.display = 'block'; btn.disabled=false; btn.textContent='שלח מועמדות ←'; return;
        }

        const updatedJobs = (existing.jobs||[]).map(j =>
          j.id===job.id ? {...j, candidates:[...(j.candidates||[]),candidate.id]} : j
        );

        await sb.from('crm_state').update({
          data: {
            ...existing,
            candidates: [...candidates, candidate],
            jobs: updatedJobs,
            pendingCandidates: [...(existing.pendingCandidates||[]), candidate.id],
          },
          updated_at: new Date().toISOString()
        }).eq('id','main');

      } catch(err) { console.error(err); }

      setTimeout(() => {
        document.getElementById('form-card').innerHTML = `
          <div class="success-card">
            <span class="success-icon">🎉</span>
            <div class="success-title">המועמדות התקבלה!</div>
            <div class="success-body">
              תודה <strong>${name}</strong>!<br/>
              קיבלנו את פרטיך למשרת <strong>${job.publishTitle||job.title}</strong>.<br/>
              נציג מטופ גרופ יצור איתך קשר בהקדם.
            </div>
          </div>`;
      }, 500);
    });
  }

  init();
})();
</script>
</body>
</html>
